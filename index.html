// 返信先URLから「○○を開く」ラベルとアクセント色を判定
// 詳細欄(note)内のURLを抽出し、表示ラベルを決める。
// 同じ行でURLの前に書いた語があれば、それを表示名に使う（例: 「見積書 https://...」）。
// 無ければ Google系は種別名（ファイル名はブラウザからは取得不可）、その他はドメイン名。
function gDocKind(url) {
  if (/docs\.google\.com\/spreadsheets/.test(url)) return "スプレッドシート";
  if (/docs\.google\.com\/document/.test(url)) return "ドキュメント";
  if (/docs\.google\.com\/presentation/.test(url)) return "スライド";
  if (/(drive|forms)\.google\.com/.test(url)) return url.includes("forms") ? "フォーム" : "ドライブ";
  return null;
}
// 共有（PWA share_target）で受け取った内容を「リンク」か「本文」に判定する。
// URLを除いた本文が実質的にあれば text（received行き）、無ければ link（links行き）。
function classifyShare(intent) {
  const text = (intent && intent.text) || "";
  const url = (intent && intent.url) || "";
  const raw = [text, url].filter(Boolean).join("\n");
  const links = extractLinks(raw).map((l) => ({ url: l.url, label: l.label || urlAutoLabel(l.url) }));
  const body = String(text).replace(/https?:\/\/[^\s　]+/g, "").trim();
  const kind = body.length >= 8 ? "text" : "link";
  return { kind, links, body: kind === "text" ? text.trim() : "" };
}

// 共有内容をどの案件に入れるか選ぶピッカー（PWA共有からの着信時）
// ===== 全体検索モーダル（Ctrl+K / ヘッダ🔍） =====
// 案件名・詳細・タスク名・タスク詳細・リンクを横断検索。0文字時は最近開いた案件を表示。
function kanaNorm(s) {
  return (s || "").toLowerCase()
    .replace(/[\u3041-\u3096]/g, (c) => String.fromCharCode(c.charCodeAt(0) + 0x60)) // ひらがな→カタカナ
    .replace(/[\uFF21-\uFF3A\uFF41-\uFF5A\uFF10-\uFF19]/g, (c) => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)); // 全角英数→半角
}
function SearchModal({ projects, recentIds, onPick, onClose }) {
  const [q, setQ] = useState("");
  const [sel, setSel] = useState(0);
  const nq = kanaNorm(q.trim());
  const searchable = useMemo(() => projects.filter((p) => p.id !== INBOX_ID).map((p) => ({
    p,
    hay: kanaNorm([
      p.company, p.note, p.work,
      ...(p.tasks || []).map((t) => (t.title || "") + " " + (t.note || "")),
      ...(p.links || []).map((l) => (l.label || "") + " " + (l.url || "")),
    ].join(" ")),
  })), [projects]);
  let results;
  if (!nq) {
    const byId = new Map(projects.map((p) => [p.id, p]));
    results = recentIds.map((id) => byId.get(id)).filter(Boolean);
    if (results.length === 0) results = projects.filter((p) => p.id !== INBOX_ID && p.status !== "完了").slice(0, 8);
  } else {
    results = searchable.filter((x) => x.hay.includes(nq)).map((x) => x.p)
      .sort((a, b) => {
        // 案件名先頭一致→案件名部分一致→その他 の順
        const an = kanaNorm(a.company), bn = kanaNorm(b.company);
        const rank = (n) => n.startsWith(nq) ? 0 : n.includes(nq) ? 1 : 2;
        return rank(an) - rank(bn);
      }).slice(0, 12);
  }
  const selClamp = Math.min(sel, Math.max(0, results.length - 1));
  const onKey = (e) => {
    if (e.key === "ArrowDown") { e.preventDefault(); setSel((v) => Math.min(v + 1, results.length - 1)); }
    else if (e.key === "ArrowUp") { e.preventDefault(); setSel((v) => Math.max(v - 1, 0)); }
    else if (e.key === "Enter") { e.preventDefault(); if (results[selClamp]) onPick(results[selClamp]); }
    else if (e.key === "Escape") { e.preventDefault(); onClose(); }
  };
  const stDot = { "進行中": "#C0C9D6", "相手待ち": "#D9A23B", "支払い待ち": "#51CF66", "完了": "#51CF66" };
  return (
    <>
      <div style={S.scrim} onClick={onClose} />
      <div style={S.searchModal}>
        <div style={S.searchInputRow}>
          <Search size={17} color={C.ink3} strokeWidth={2.2} style={{ flexShrink: 0 }} />
          <input autoFocus style={S.searchInput} placeholder="案件・タスク・リンクを検索"
            value={q} onChange={(e) => { setQ(e.target.value); setSel(0); }} onKeyDown={onKey} />
          <button style={S.iconBtn} onClick={onClose}><X size={17} /></button>
        </div>
        {!nq && results.length > 0 && <div style={S.searchSectionLabel}>最近開いた案件</div>}
        <div style={S.searchList}>
          {results.map((p, i) => (
            <button key={p.id}
              style={{ ...S.searchItem, ...(i === selClamp ? S.searchItemSel : {}) }}
              onMouseEnter={() => setSel(i)}
              onClick={() => onPick(p)}>
              <span style={{ ...S.searchItemDot, background: stDot[p.status] || C.ink3 }} />
              <span style={S.searchItemName}>{p.company || "（無題）"}</span>
              {Number(p.reward) > 0 && <span style={S.searchItemMeta}>{yenMan(p.reward)}</span>}
              <span style={{ ...S.searchItemMeta, color: stDot[p.status] || C.ink3 }}>{p.status}</span>
            </button>
          ))}
          {nq && results.length === 0 && <div style={S.searchEmpty}>見つかりませんでした</div>}
        </div>
      </div>
    </>
  );
}

}

// 内容に合わせて高さを自動調整するテキストエリア。長いタスク名を折り返して全体表示する用途。
// Enter による改行はデフォルト動作。Enter で閉じたい呼び出し元は onKeyDown で e.preventDefault() する。
function AutoHeightTextarea({ value, style, ...rest }) {
  const ref = useRef(null);
  const resize = () => {
    const el = ref.current; if (!el) return;
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  };
  useEffect(() => { resize(); }, [value]);
  useEffect(() => {
    // マウント直後にも一度、フォント読み込み後の高さで再計算
    const id = setTimeout(resize, 30);
    return () => clearTimeout(id);
  }, []);
  return (
    <textarea ref={ref} value={value} rows={1}
      onInput={resize}
      style={{ overflow: "hidden", resize: "none", wordBreak: "break-word", whiteSpace: "pre-wrap", ...style }}
      {...rest} />
  );
}

function extractLinks(text) {
  if (!text) return [];
  const out = [];
  for (const rawLine of String(text).split(/\r?\n/)) {
    const re = /https?:\/\/[^\s　]+/g;
    let m, first = true;
    while ((m = re.exec(rawLine))) {
      const url = m[0].replace(/[)\]＞」｝、。，．,.]+$/, ""); // 末尾の句読点・閉じ括弧を除去
      let label = "";
      if (first) {
        label = rawLine.slice(0, m.index)
          .replace(/[\s　:：｜|/・>＞=＝\-—–]+$/, "")
          .replace(/^[・\-\s　•]+/, "").trim();
      }
      if (!label) {
        const k = gDocKind(url);
        if (k) label = "Google " + k;
        else { try { label = new URL(url).hostname.replace(/^www\./, ""); } catch { label = url; } }
      }
      out.push({ url, label });
      first = false;
    }
  }
  return out;
}
function NoteLinks({ text, indent = 0 }) {
  const links = extractLinks(text);
  if (!links.length) return null;
  return (
    <div style={{ ...S.noteLinkRow, marginLeft: indent }}>
      {links.map((l, i) => (
        <a key={i} href={l.url} target="_blank" rel="noopener noreferrer" style={S.noteLinkChip}
          onClick={(e) => e.stopPropagation()} title={l.url}>
          <Link2 size={13} color={C.accent} strokeWidth={2.2} style={{ flexShrink: 0 }} />
          <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{l.label}</span>
        </a>
      ))}
    </div>
  );
}
function linkInfo(url) {

  if (url.includes("crowdworks")) return { label: "クラウドワークスを開く", short: "CW", color: "#6B8AFF" };
  if (url.includes("lancers")) return { label: "ランサーズを開く", short: "ランサーズ", color: "#6B8AFF" };
  if (url.includes("coconala")) return { label: "ココナラを開く", short: "ココナラ", color: "#6B8AFF" };
  return { label: "返信先を開く", short: "開く", color: C.accent };
}
// 案件リンク（links[]）のラベル/短縮名を決める。ユーザー指定ラベルを最優先、無ければURLから推定。
// アイコン表示のため、ラベルは短く（CW / Lancers / Coconala / Docs / Sheet / Slide）。
function urlAutoLabel(url) {
  if (!url) return "";
  if (/claude\.ai/.test(url)) return "Claude";
  if (/github\.com/.test(url)) return "GitHub";
  if (/vercel\.app/.test(url)) return "公開";
  if (/chatwork/.test(url)) return "Chatwork";
  if (/crowdworks/.test(url)) return "CW";
  if (/lancers/.test(url)) return "Lancers";
  if (/coconala/.test(url)) return "Coconala";
  if (/docs\.google\.com\/document/.test(url)) return "Docs";
  if (/docs\.google\.com\/spreadsheets/.test(url)) return "Sheet";
  if (/docs\.google\.com\/presentation/.test(url)) return "Slide";
  if (/drive\.google\.com/.test(url)) return "Drive";
  const g = gDocKind(url); if (g) return g;
  try { return new URL(url).hostname.replace(/^www\./, ""); } catch { return url; }
}
function linkLabelOf(l) { return (l && l.label && l.label.trim()) ? l.label.trim() : urlAutoLabel(l && l.url); }

// ---- ② Claudeリンク：Androidスマホではアプリ（intent://）で開く。失敗時はブラウザにフォールバック ----
function isAndroidUA() { try { return /Android/i.test(navigator.userAgent || ""); } catch { return false; } }
function claudeIntentUrl(url) {
  try {
    const u = new URL(url);
    if (!/(^|\.)claude\.ai$/i.test(u.hostname)) return null;
    return "intent://" + u.hostname + u.pathname + u.search +
      "#Intent;scheme=https;package=com.anthropic.claude;S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
  } catch { return null; }
}

// ==================== やり取りログ（Phase 1） ====================
// msg = { id, at:"YYYY-MM-DD HH:mm"（不明なら""）, who:"me"|"client"|"", name, body, src, partial }
const ME_NAMES = ["Infosuccess", "インフォサクセス", "高崎"];
const isMeName = (s) => ME_NAMES.some((n) => (s || "").startsWith(n));
const normBody = (s) => (s || "").replace(/\s+/g, " ").trim();
const fmtLogAt = (at) => {
  if (!at) return "日時不明";
  const m = at.match(/^(\d{4})-(\d{2})-(\d{2})(?: (\d{2}:\d{2}))?/);
  return m ? `${+m[2]}/${+m[3]}${m[4] ? " " + m[4] : ""}` : at;
};

// --- クラウドワークス形式 ---
function parseCWLog(text, clientHint) {
  const lines = text.split(/\r?\n/).map((s) => s.trim());
  const dateRe = /^(\d{4})年(\d{1,2})月(\d{1,2})日\s+(\d{1,2}):(\d{2})$/;
  let client = "";
  for (const ln of lines) { const m = ln.match(/^(.+?)さんとの(契約詳細|メッセージ)/); if (m) { client = m[1]; break; } }
  if (!client) client = clientHint || "";
  const noise = /^(問題報告|スター付きメッセージ一覧|メッセージを探す|違反報告をする|テンプレートを作成|新着メッセージの通知設定をする|ここにメッセージ|選択されていません|送信)$/;
  const mkAt = (m) => `${m[1]}-${String(m[2]).padStart(2, "0")}-${String(m[3]).padStart(2, "0")} ${String(m[4]).padStart(2, "0")}:${m[5]}`;
  // ヘッダからクライアント名が取れない場合の推定用：同じ行が2回以上出現する短い行は「名前行」とみなす
  const lineCount = {};
  for (const l of lines) { if (l && l.length <= 25) lineCount[l] = (lineCount[l] || 0) + 1; }
  const out = [];
  for (let i = 0; i < lines.length; i++) {
    const dm = lines[i].match(dateRe);
    if (!dm) continue;
    const prev = lines[i - 1] || "";
    const looksName = prev && prev.length <= 25 && !/[。、．，！？!?…]/.test(prev) && (lineCount[prev] || 0) >= 2 && !isMeName(prev) && (!client || !prev.startsWith(client));
    const nameOnly = ME_NAMES.includes(prev) || (client && prev === client) || looksName;
    if (nameOnly) {
      // 展開形式：名前行→日付行→本文（次ブロックまで）
      const body = [];
      for (let j = i + 1; j < lines.length; j++) {
        const l = lines[j];
        if (!l) { if (body.length) body.push(""); continue; }
        if (/^Loading_\d+x\d+$/.test(l)) continue; // CWの添付サムネイル読み込みプレースホルダ
        if (noise.test(l) || dateRe.test(l)) break;
        if (dateRe.test(lines[j + 1] || "") && (isMeName(l) || (client && l.startsWith(client)))) break;
        body.push(l);
      }
      const b = body.join("\n").trim();
      if (b) out.push({ who: isMeName(prev) ? "me" : "client", name: prev, at: mkAt(dm), body: b, partial: false });
    } else if (prev && !noise.test(prev)) {
      // 折りたたみ形式：名前＋本文（省略あり）→日付行
      let who = "", name = "", body = prev;
      if (isMeName(prev)) { who = "me"; for (const n of ME_NAMES) { if (prev.startsWith(n)) { name = n; body = prev.slice(n.length); break; } } }
      else if (client && prev.startsWith(client)) { who = "client"; name = client; body = prev.slice(client.length); }
      if (!who) continue; // 名前を特定できない行はスキップ
      const partial = /(\.\.\.|…)$/.test(body);
      body = body.replace(/(\.\.\.|…)$/, "").trim();
      if (body) out.push({ who, name, at: mkAt(dm), body, partial });
    }
  }
  return { entries: out, client };
}

// --- ランサーズ形式 ---
function parseLancersLog(text) {
  const lines = text.split(/\r?\n/).map((s) => s.trim());
  const dayRe = /^(\d{4})\/(\d{1,2})\/(\d{1,2})$/;
  const timeRe = /^(\d{1,2}):(\d{2})$/;
  const iconRe = /のアイコン$/;
  const stopRe = /^(開封済み|メッセージを入力してください|送信|保存|ビデオ通話|情報)$/;
  let curDay = "";
  const out = [];
  for (let i = 0; i < lines.length; i++) {
    const dm = lines[i].match(dayRe);
    if (dm) { curDay = `${dm[1]}-${String(dm[2]).padStart(2, "0")}-${String(dm[3]).padStart(2, "0")}`; continue; }
    const tm = (lines[i + 1] || "").match(timeRe);
    if (tm && lines[i] && !iconRe.test(lines[i]) && !timeRe.test(lines[i]) && !stopRe.test(lines[i]) && lines[i].length <= 60) {
      const rawName = lines[i];
      const name = rawName.replace(/\(.+?\)$/, "").trim();
      const who = isMeName(rawName) || isMeName(name) ? "me" : "client";
      const body = [];
      for (let j = i + 2; j < lines.length; j++) {
        const l = lines[j];
        if (l === "") { if (body.length) body.push(""); continue; }
        if (iconRe.test(l) || dayRe.test(l) || stopRe.test(l)) break;
        if (timeRe.test(lines[j + 1] || "") && l.length <= 60 && !/[。、]/.test(l)) break; // 次の名前行らしき行
        body.push(l);
      }
      const b = body.join("\n").trim();
      const at = curDay ? `${curDay} ${String(tm[1]).padStart(2, "0")}:${tm[2]}` : "";
      if (b) out.push({ who, name, at, body: b, partial: false });
      i = i + 1;
    }
  }
  return { entries: out, client: "" };
}

// --- Chatwork Web形式（PCブラウザの全選択コピー） ---
// 構造: "2026年6月17日"（日付見出し）→ 名前が2行連続 → 本文 → 末尾に "6月17日 14:51"（時刻行）
// 連投時は2通目以降の名前が省略される。リアクション(bow等＋数字)・返信元・ルーム一覧はノイズ。
function parseChatworkWebLog(text) {
  const lines = text.split(/\r?\n/).map((s) => s.trim());
  const secRe = /^(\d{4})年(\d{1,2})月(\d{1,2})日$/;
  const tsRe = /^(?:(\d{1,2})月(\d{1,2})日\s+)?(\d{1,2}):(\d{2})$/;
  const emojiRe = /^(bow|roger|clap|beer|smile|lol|please|dance|yes|no|sweat|blush|whew|cracker|star|flex|h|shake|devil|heart)$/i;
  let i = lines.findIndex((l) => secRe.test(l));
  if (i < 0) return { entries: [] };
  let year = null, curM = null, curD = null;
  const out = [];
  let buf = [];
  for (; i < lines.length; i++) {
    const l = lines[i];
    const sm = l.match(secRe);
    if (sm) { year = +sm[1]; curM = +sm[2]; curD = +sm[3]; buf = []; continue; }
    if (/^Loadingメッセージを読み込んでいます/.test(l)) { buf = []; continue; }
    const tm = l.match(tsRe);
    if (tm && buf.filter(Boolean).length) {
      const M = tm[1] ? +tm[1] : curM, D = tm[2] ? +tm[2] : curD;
      const at = year && M && D ? `${year}-${String(M).padStart(2, "0")}-${String(D).padStart(2, "0")} ${String(tm[3]).padStart(2, "0")}:${tm[4]}` : "";
      const b = buf.filter((x) => x !== "返信元");
      while (b.length && !b[0]) b.shift(); // 先頭の空行を除去（名前検出のため）
      let name = "", bodyLines;
      if (b[1] !== undefined && b[0] && b[0].length <= 45 && b[1] && b[1].startsWith(b[0])) {
        name = b[0]; bodyLines = b.slice(2); // 名前2行連続パターン
      } else if (out.length) {
        name = out[out.length - 1].name; bodyLines = b; // 連投（名前省略）→ 直前の発言者
      } else {
        name = b[0] || ""; bodyLines = b.slice(1);
      }
      while (bodyLines.length && (emojiRe.test(bodyLines[bodyLines.length - 1]) || /^\d{1,3}$/.test(bodyLines[bodyLines.length - 1]) || bodyLines[bodyLines.length - 1] === "")) bodyLines.pop();
      const body = bodyLines.join("\n").replace(/\n{3,}/g, "\n\n").trim();
      const cleanName = name.replace(/株式会社.*$/, "").trim();
      if (cleanName && body) {
        out.push({ who: isMeName(cleanName) ? "me" : "client", name: cleanName, at, body, partial: false });
      }
      buf = [];
      continue;
    }
    buf.push(l);
  }
  return { entries: out };
}

// --- Chatwork形式（PCブラウザの範囲コピー想定・汎用） ---
function parseChatworkLog(text) {
  const cleaned = text.replace(/\[rp aid=\d+ to=[\d-]+\]/g, "").replace(/\[To:\d+\]/g, "");
  const lines = cleaned.split(/\r?\n/).map((s) => s.trim());
  const headRe = /^(.{1,40}?)\s+(?:(\d{4})[\/年])?(\d{1,2})[\/月](\d{1,2})日?(?:\([月火水木金土日]\))?\s+(\d{1,2}):(\d{2})$/;
  const out = [];
  let cur = null;
  const push = () => { if (cur && cur.body.length) { out.push({ ...cur, body: cur.body.join("\n").trim(), partial: false }); } cur = null; };
  for (const l of lines) {
    const m = l.match(headRe);
    if (m) {
      push();
      const y = m[2] || String(new Date().getFullYear());
      cur = { who: isMeName(m[1]) ? "me" : "client", name: m[1].trim(),
        at: `${y}-${String(m[3]).padStart(2, "0")}-${String(m[4]).padStart(2, "0")} ${String(m[5]).padStart(2, "0")}:${m[6]}`, body: [] };
    } else if (cur && l) { cur.body.push(l); }
  }
  push();
  return { entries: out.filter((e) => e.body), client: "" };
}

// --- 形式自動判定 ---
function parsePastedLog(text, clientHint) {
  const t = (text || "").trim();
  if (!t) return { entries: [], src: "plain" };
  // Chatwork Web：日付のみの見出し行（例 2026年6月17日）＋末尾時刻行（例 6月17日 14:51）
  if (/^\d{4}年\d{1,2}月\d{1,2}日$/m.test(t) && /^\d{1,2}月\d{1,2}日\s+\d{1,2}:\d{2}$/m.test(t)) {
    const r = parseChatworkWebLog(t);
    if (r.entries.length) return { entries: r.entries, src: "chatwork" };
  }
  if (/さんとの契約詳細|クラウドワークス/.test(t) || /^\d{4}年\d{1,2}月\d{1,2}日\s+\d{1,2}:\d{2}$/m.test(t)) {
    const r = parseCWLog(t, clientHint);
    if (r.entries.length) return { entries: r.entries, src: "cw" };
  }
  if (/のアイコン$/m.test(t) || /ランサーズ/.test(t)) {
    const r = parseLancersLog(t);
    if (r.entries.length) return { entries: r.entries, src: "lancers" };
  }
  { const r = parseChatworkLog(t); if (r.entries.length >= 2) return { entries: r.entries, src: "chatwork" }; }
  { const r = parseCWLog(t, clientHint); if (r.entries.length) return { entries: r.entries, src: "cw" }; }
  { const r = parseLancersLog(t); if (r.entries.length) return { entries: r.entries, src: "lancers" }; }
  // 判定不能：1件のメモとして保存
  const now = new Date();
  const at = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
  return { entries: [{ who: "", name: "貼り付けメモ", at, body: t, partial: false }], src: "plain" };
}

// --- 重複除去マージ（省略コピー→全文への昇格つき） ---
function mergeLogEntries(existing, incoming, src) {
  const list = existing.map((m) => ({ ...m }));
  let added = 0, upgraded = 0;
  for (const inc of incoming) {
    const nb = normBody(inc.body);
    const dup = list.findIndex((m) => {
      const mb = normBody(m.body);
      // 「送信済みにする」で手動記録した自分の発言は、後からChatwork等で取れた実メッセージと本文一致で統合
      if (m.src === "sent" && m.who === inc.who && mb === nb) return true;
      // ランサーズ通知メールの抜粋(partial)は、本文コピペの実メッセージと冒頭一致で統合（時刻ずれ許容）
      if (m.src === "lancersmail" && m.partial && m.who === inc.who && nb && mb && nb.startsWith(mb.slice(0, Math.min(30, mb.length)))) return true;
      const strictAt = !!(m.at && inc.at && m.at === inc.at); // 両方に日時があり一致
      const sameAt = m.at && inc.at ? m.at === inc.at : true;
      if (sameAt && mb === nb) return true;
      // あいまい照合（省略コピー・二重描画の統合）は同一時刻が確定した場合のみ（誤爆防止）
      if (!strictAt) return false;
      if (m.partial && nb.startsWith(mb.slice(0, Math.max(10, mb.length)))) return true;
      if (inc.partial && mb.startsWith(nb.slice(0, Math.max(10, nb.length)))) return true;
      if (m.who === inc.who && mb && nb && (mb.startsWith(nb) || nb.startsWith(mb))) return true;
      return false;
    });
    if (dup >= 0) {
      const exb = normBody(list[dup].body);
      if (list[dup].partial && !inc.partial) {
        list[dup] = { ...list[dup], body: inc.body, partial: false, who: inc.who || list[dup].who, name: inc.name || list[dup].name, at: inc.at || list[dup].at };
        upgraded++;
      } else if (list[dup].src === "sent" && inc.at) {
        // 実メッセージで日時・出所を確定
        list[dup] = { ...list[dup], at: inc.at, src: src, name: inc.name || list[dup].name };
      } else if (!inc.partial && nb.length > exb.length) {
        // 包含関係の重複は長い方（情報が多い方）の本文を採用
        list[dup] = { ...list[dup], body: inc.body };
      }
      continue;
    }
    list.push({ id: uid(), src, ...inc });
    added++;
  }
  // CWの本文コピペが入ったら、CW通知メールのプレースホルダ（本文未取り込みの印）は役目を終えるので除去
  let out = list;
  if ((src === "cw" || src === "chatwork") && added > 0) {
    out = list.filter((m) => m.src !== "cwmail");
  }
  out.sort((a, b) => ((a.at || "9999") < (b.at || "9999") ? -1 : 1));
  return { list: out, added, upgraded };
}

// --- ステータスの確信度（✓一致／?不明／⚠矛盾＋提案） ---
function statusSuggestion(p) {
  if (!p || p.id === INBOX_ID || p.status === "完了") return null;
  const msgs = (p.msgs || []).filter((m) => (m.who === "me" || m.who === "client") && m.at);
  if (!msgs.length) return { mark: "unknown" };
  const last = msgs[msgs.length - 1];
  const days = Math.round((TODAY.getTime() - new Date(last.at.slice(0, 10) + "T00:00:00").getTime()) / 86400000);
  if (!isFinite(days) || days > 30) return { mark: "unknown" };
  // ✕で却下済み（＝返信済み扱い。アイコンリアクション等で返した場合に使う）。新着が来るまで再提案しない
  if (p.sugAckAt && new Date(p.sugAckAt).getTime() >= new Date(last.at).getTime()) return { mark: "ok" };
  const dw = days <= 0 ? "今日" : days === 1 ? "昨日" : `${days}日前に`;
  if (last.who === "client") {
    // 相手待ち/支払い待ちに切り替えた時刻が相手の最新メッセージ以降なら「対応済み」とみなし提案しない
    // （例：PRIZMA等、ステータス変更で自動返信が飛び、自分の送信ログがHelmに残らない運用）
    const settledAfterMsg = p.statusAt && new Date(p.statusAt).getTime() >= new Date(last.at).getTime();
    if (settledAfterMsg && (p.status === "相手待ち" || p.status === "支払い待ち")) return { mark: "ok" };
    if (p.status === "相手待ち") return { mark: "warn", suggest: "進行中", reason: `相手から${dw}メッセージ、まだ未返信` };
    if (p.status === "支払い待ち" && !/(支払|入金|振込|検収)/.test(last.body)) return { mark: "warn", suggest: "進行中", reason: `相手から${dw}メッセージ、まだ未返信` };
    return { mark: "ok" };
  }
  // 自分の最後の発言が「こちらが対応する約束」なら、相手待ちではなく自分のターン
  const commitRe = /(改めて(ご連絡|お送り|ご報告|提出|ご案内)|(完了|でき|出来|上がり)次第[^。]{0,20}(連絡|送り|報告|共有|反映|入れ込み)|(修正|作成|反映|実装|更新|調整)し(、|て)[^。]{0,25}(お送り|提出|ご連絡|ご報告|参ります|まいります)|本日中に(対応|提出|お送り|ご連絡)|(修正|対応|作成)を?進めます)/;
  if ((p.status === "相手待ち" || p.status === "支払い待ち") && commitRe.test(last.body || "")) {
    return { mark: "warn", suggest: "進行中", reason: "「対応します」と返信済み・こちらのターン" };
  }
  if (p.status === "進行中" && (p.tasks || []).filter((t) => !t.done).length === 0 && days >= 1) {
    return { mark: "warn", suggest: "相手待ち", reason: "返信済み・未完了タスクなし" };
  }
  return { mark: "ok" };
}

// --- Claude相談用の文脈テキスト生成 ---
function buildClaudeContext(p) {
  const lines = [];
  lines.push(`【案件】${p.company || "（無題）"}（${p.platform || ""}）`);
  const meta = [`ステータス：${p.status || ""}`];
  if (p.deadline) meta.push(`納期：${p.deadline}`);
  if (Number(p.reward) > 0) meta.push(`報酬：${yen(Number(p.reward))}`);
  lines.push(meta.join("／"));
  const open = (p.tasks || []).filter((t) => !t.done);
  if (open.length) lines.push("未完了タスク：" + open.map((t) => t.title + (t.due ? `（期限${t.due.slice(5).replace("-", "/")}）` : "")).join("、"));
  if (p.note && p.note.trim()) lines.push("メモ：\n" + p.note.trim());
  const msgs = p.msgs || [];
  if (msgs.length) {
    const LIMIT = 8000;
    let used = 0; const chunk = [];
    for (let i = msgs.length - 1; i >= 0; i--) {
      const m = msgs[i];
      const s = `[${fmtLogAt(m.at)}] ${m.who === "me" ? "自分" : (m.name || "相手")}：${m.body}${m.partial ? "（※一部省略コピー）" : ""}`;
      if (used + s.length > LIMIT && chunk.length) { chunk.push("（これより古いログは省略）"); break; }
      used += s.length; chunk.push(s);
    }
    lines.push("\n--- クライアントとのやり取り（時系列） ---");
    chunk.reverse().forEach((s) => lines.push(s));
  }
  lines.push("\n上記の案件について相談します。");
  return lines.join("\n");
}

// 返信不要の即時判定：短い締めの挨拶・お礼のみ（質問・依頼を含まない）
// 返信アシストを見せるべきか（未返信＋締め挨拶でない＋AIが不要判定していない）
function replyNeeded(p) {
  const msgs = p.msgs || [];
  const last = msgs[msgs.length - 1];
  if (!last || last.who !== "client") return false;
  if (isClosingMsg(last.body)) return false;
  if (p.rneed && p.rneed.srcId === last.id && p.rneed.need === false) return false;
  return true;
}

function isClosingMsg(body) {
  const b = (body || "").trim();
  if (!b || b.length > 60) return false;
  if (/[？?]/.test(b)) return false;
  if (/(ください|いただけ|もらえ|でしょうか|ますか|お待ちして)/.test(b)) return false;
  return /(よろしくお願い|ありがとうござ|承知(いた)?しました|了解(いた)?しました|かしこまりました|確認(でき|いたし|し)ました|助かります|問題ないです|問題ございません|大丈夫です)/.test(b);
}

// --- ログからファイル名の言及を抽出（保存漏れチェック用・照合なし版） ---
const FILE_EXT_RE = /[\w\-（）()\[\]々ぁ-んァ-ヶ一-龠ー]+\.(?:jpe?g|png|gif|webp|svg|pdf|xlsx?|docx?|pptx?|zip|rar|html?|css|js|csv|tsv|txt|md|mp4|mov|mp3|wav|ai|psd|fig)\b/gi;
function extractFileMentions(msgs) {
  const seen = new Map(); // name(lower) -> {name, at, who}
  for (const m of msgs || []) {
    if (!m.body) continue;
    const noUrl = m.body.replace(/https?:\/\/[^\s　]+/g, " "); // URL内のファイル名は除外
    const hits = noUrl.match(FILE_EXT_RE) || [];
    for (const h of hits) {
      const k = h.toLowerCase();
      if (!seen.has(k)) seen.set(k, { name: h, at: m.at || "", who: m.who || "" });
    }
  }
  return [...seen.values()].sort((a, b) => ((a.at || "9999") < (b.at || "9999") ? -1 : 1));
}

// --- ログの新着（相手の最新メッセージ）から依頼を検出しタスク候補を作る（Sonnet・承認制） ---
// 粒度ルール：報告タイミングが同じものは1件にまとめ、内訳は詳細(note)へ。1メッセージから原則1件。
async function analyzeIncomingMsg(companyName, recentLog) {
  const sys = 'あなたはフリーランス（高崎・屋号インフォサクセス）の案件管理アシスタントです。クライアントとの直近のやり取りログを読み、(1)いま残っている宿題のタスク化 (2)返信文の下書き を作り、JSONだけを出力します。説明やコードブロック記法は付けないこと。\n{"task":{"has":true|false,"title":"タスク名（25字以内。報告タイミングが同じ複数の指示は1件にまとめた名前にする）","note":"内訳の箇条書き（各行を・で始め改行区切り。※既に完了報告済みの項目は含めない。内訳が1つだけ・不要なら空文字）","due":"YYYY-MM-DD（メッセージに期限・締切が明記されている場合のみ。無ければ空文字）","urgent":true|false},"reply":"返信文の下書き。空文字の条件は後述"}\nタスク判定基準（重要）：ログ全体を時系列で読み、相手からの依頼のうち「その後に自分（高崎）が完了・提出・送付・反映済みと報告していないもの」だけをタスク化する。全て対応済みならhas:false。挨拶・お礼・進捗確認・支払い連絡のみもhas:false。\nurgentの規則：至急・本日中・今日中・ASAPなど緊急性が高い表現があればtrue、通常はfalse。今日は' + dStr(0) + '。\n返信(reply)の規則：ログの最後の発言が相手で、自分がまだ返信していない場合のみ下書きを作る。最後の発言が自分（返信済み）の場合、返信不要な自動通知のみの場合、または「よろしくお願いします」「ありがとうございます」等の締めの挨拶・お礼のみで質問・依頼・確認事項を含まない場合は空文字。文体はログ内の自分の返信と同じトーン・改行リズムを厳密に守る（「お世話になっております。」で始め「引き続きよろしくお願いいたします。」等で締める）。依頼への承諾・要点の復唱を簡潔に。自分の最後の返信より後に相手から複数のメッセージが届いている場合は、その全メッセージに1通でまとめて返信する（各メッセージの内容に漏れなく応答する）。金額・条件など判断が必要な点は断定せず「確認のうえ改めてご連絡いたします」とする。事実の捏造禁止。';
  const out = await callClaude({ system: sys, user: `案件「${companyName || ""}」の直近のやり取り（時系列）:\n\n${recentLog}`, maxTokens: 900 });
  const clean = out.replace(/```json|```/g, "").trim();
  const j = JSON.parse(clean);
  if (!j || !j.task || typeof j.task.has !== "boolean") throw new Error("bad json");
  return j;
}

// ==================== Gmail自動読み取り（Phase 2 完結） ====================
// メールを案件に照合：クライアント名・差出人・件名を、案件名とログの登場人物に突き合わせる
function matchMailToProject(mail, projects) {
  const norm = (s) => (s || "").toLowerCase().replace(/[\s　]/g, "");
  const keys = [mail.client, mail.fromName, (mail.from || "").split("@")[0]].map(norm).filter((s) => s.length >= 2);
  const subj = norm(mail.subject);
  let best = null, bestScore = 0;
  for (const p of projects) {
    if (p.id === INBOX_ID || p.status === "完了") continue;
    const names = new Set([(p.company || "")].concat((p.msgs || []).map((m) => m.name || "")));
    let score = 0;
    for (const raw of names) {
      const n = norm(raw);
      if (n.length < 2) continue;
      for (const k of keys) { if (k && (n.includes(k) || k.includes(n))) score = Math.max(score, 3); }
      if (subj && n.length >= 3 && subj.includes(n)) score = Math.max(score, 2);
    }
    // プラットフォーム整合で加点
    if (score > 0 && mail.kind === "cw" && p.platform === "クラウドワークス") score += 1;
    if (score > 0 && mail.kind === "lancers" && p.platform === "ランサーズ") score += 1;
    if (score > bestScore) { bestScore = score; best = p; }
  }
  return bestScore >= 3 ? best : null;
}

async function copyText(text) {
  try { await navigator.clipboard.writeText(text); return true; } catch {}
  try {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(ta); return ok;
  } catch { return false; }
}

// 内容がコンテナ幅を超えたら自動でループ横スクロール表示するテキスト。
// はみ出さない場合は普通の1行表示。
function MarqueeText({ text, style, gap = 40, seconds = 10 }) {
  const wrapRef = useRef(null);
  const measureRef = useRef(null);
  const [overflow, setOverflow] = useState(false);
  useEffect(() => {
    const check = () => {
      const w = wrapRef.current, m = measureRef.current;
      if (!w || !m) return;
      setOverflow(m.scrollWidth > w.clientWidth + 1);
    };
    check();
    let ro;
    try {
      ro = new ResizeObserver(check);
      if (wrapRef.current) ro.observe(wrapRef.current);
      if (measureRef.current) ro.observe(measureRef.current);
    } catch {}
    return () => { try { ro && ro.disconnect(); } catch {} };
  }, [text]);
  if (!overflow) {
    return (
      <span ref={wrapRef} style={{ ...style, display: "block", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
        <span ref={measureRef} style={{ display: "inline-block" }}>{text}</span>
      </span>
    );
  }
  return (
    <span ref={wrapRef} style={{ ...style, display: "block", overflow: "hidden", whiteSpace: "nowrap", position: "relative", transform: "translateZ(0)", contain: "layout paint" }}>
      <span style={{ display: "inline-block", animation: `helm-marquee ${seconds}s linear infinite`, willChange: "transform" }}>
        <span ref={measureRef} style={{ display: "inline-block", paddingRight: gap }}>{text}</span>
        <span aria-hidden="true" style={{ display: "inline-block", paddingRight: gap }}>{text}</span>
      </span>
    </span>
  );
}

              </a>
            ) : (
              <button style={S.linkTextEmpty} onClick={() => setEditId(l.id)}>
                <Link2 size={14} color={C.ink3} strokeWidth={2.2} style={{ flexShrink: 0 }} />
                <span style={S.linkTextName}>{shown}</span>
              </button>
            )}
            <button style={S.linkEditBtn} onClick={() => setEditId(l.id)} title="編集">
              <Pencil size={14} strokeWidth={2.2} />
            </button>
          </div>
        );
      })}
      <div style={S.linkPasteRow}>
        <input
          style={S.linkPasteInput}
          placeholder="URLを貼り付け"
          value={pasteVal}
          onChange={(e) => setPasteVal(e.target.value)}
          onPaste={onPasteBulk}
          onKeyDown={onKeyBulk}
        />
        <button style={S.linkAddManualBtn} onClick={() => add("")} title="URL以外・手入力で追加">
          <Plus size={16} strokeWidth={2.6} />
        </button>
      </div>
      {pending.length > 0 && (
        <div style={S.pendingLinkWrap}>
          {pending.map((p) => {
            const guess = urlAutoLabel(p.url) || "";
            const isHost = !!guess && guess === (() => { try { return new URL(p.url).hostname.replace(/^www\./, ""); } catch { return ""; } })();
            const prompt = isHost ? "このリンクの名前を入力" : `『${guess}』として追加しますか？`;
            return (
              <div key={p.id} style={S.pendingLinkRow}>
                <div style={S.pendingLinkPrompt}>{prompt}</div>
                <div style={S.pendingLinkUrl} title={p.url}>{p.url}</div>
                <div style={S.pendingLinkForm}>
                  <input
                    style={S.pendingLinkInput}
                    placeholder="ラベル"
                    value={p.label}
                    autoFocus={isHost}
                    onChange={(e) => editPendingLabel(p.id, e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); confirmPending(p.id); } }}
                  />
                  <button style={S.pendingLinkAdd} onClick={() => confirmPending(p.id)}>
                    <Check size={14} strokeWidth={2.8} />追加
                  </button>
                  <button style={S.pendingLinkCancel} onClick={() => cancelPending(p.id)} title="キャンセル">
                    <X size={14} strokeWidth={2.4} />
                  </button>
                </div>
              </div>
            );
          })}
          {pending.length > 1 && (
            <button style={S.pendingLinkAll} onClick={confirmAllPending}>
              <Check size={13} strokeWidth={2.8} />{pending.length}件をまとめて追加
            </button>
          )}
        </div>
      )}
      {editing && (
        <LinkEditModal
          key={editing.id}
          initial={editing}
          onSave={(patch) => updateId(editing.id, patch)}
          onDelete={() => removeId(editing.id)}
          onClose={() => setEditId(null)}
        />
      )}
    </div>
  );
}
