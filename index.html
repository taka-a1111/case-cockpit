// 案件リンク（links[]）のラベル/短縮名を決める。ユーザー指定ラベルを最優先、無ければURLから推定。
// アイコン表示のため、ラベルは短く（CW / Lancers / Coconala / Docs / Sheet / Slide）。
function urlAutoLabel(url) {
  if (!url) return "";
  if (/claude\.ai/.test(url)) return "Claude";
  if (/github\.com/.test(url)) return "GitHub";
  if (/vercel\.app/.test(url)) return "公開";
  if (/chatwork/.test(url)) return "Chatwork";
  if (/crowdworks/.test(url)) return "CW";
  if (/lancers/.test(url)) return "Lancers";
  if (/coconala/.test(url)) return "Coconala";
  if (/docs\.google\.com\/document/.test(url)) return "Docs";
  if (/docs\.google\.com\/spreadsheets/.test(url)) return "Sheet";
  if (/docs\.google\.com\/presentation/.test(url)) return "Slide";
  if (/drive\.google\.com/.test(url)) return "Drive";
  const g = gDocKind(url); if (g) return g;
  try { return new URL(url).hostname.replace(/^www\./, ""); } catch { return url; }
}
function linkLabelOf(l) { return (l && l.label && l.label.trim()) ? l.label.trim() : urlAutoLabel(l && l.url); }
// リンクをどのアイコンで表示するかを返す。ラベル→URLの順で判定。
function linkIconOf(l) {
  const lab = (l && l.label ? l.label : "").toLowerCase();
  const url = (l && l.url ? l.url : "").toLowerCase();
  const has = (kw) => lab.includes(kw) || url.includes(kw);
  if (has("chatwork")) return { Icon: MessageCircle, color: "#FFA940" };
  if (has("claude")) return { Icon: Sparkles, color: "#D97757" };
  if (has("github")) return { Icon: Github, color: "#E8ECF2" };
  if (lab === "cw" || url.includes("crowdworks")) return { Icon: Briefcase, color: "#4CAF50" };
  if (has("lancers")) return { Icon: Briefcase, color: "#00A0DC" };
  if (has("coconala")) return { Icon: Briefcase, color: "#F7A800" };
  if (has("docs.google.com/document") || lab === "docs") return { Icon: FileText, color: "#4285F4" };
  if (has("docs.google.com/spreadsheets") || lab === "sheet") return { Icon: Table, color: "#0F9D58" };
  if (has("docs.google.com/presentation") || lab === "slide") return { Icon: FileText, color: "#F4B400" };
  if (has("drive.google.com")) return { Icon: FileText, color: "#4285F4" };
  if (has("vercel.app") || lab === "公開" || lab === "公開url") return { Icon: Globe, color: "#C0C9D6" };
  return { Icon: Link2, color: C.accent };
}
// リンク編集モーダル。編集中はローカルstateに閉じ込め、閉じる時に親へ確定反映。
// 1文字ごとに親state（Drawerのd等）を更新すると、fast typing → fast close で
// controlled inputが最終文字を落とすことがあるため、必ずこの形にする。
function LinkEditModal({ initial, onSave, onDelete, onClose }) {
  const [label, setLabel] = useState(initial.label || "");
  const [url, setUrl] = useState(initial.url || "");
  const latest = useRef({ label: initial.label || "", url: initial.url || "" });
  const deleted = useRef(false);
  const commit = () => {
    if (deleted.current) { onClose(); return; }
    onSave({ label: latest.current.label, url: latest.current.url });
    onClose();
  };
  const doDelete = () => { deleted.current = true; onDelete(); };
  // アンマウント時にも念のため保存（削除済みでない限り）
  useEffect(() => () => {
    if (deleted.current) return;
    onSave({ label: latest.current.label, url: latest.current.url });
  }, []);
  const onLabel = (e) => { const v = e.target.value; latest.current.label = v; setLabel(v); };
  const onUrl = (e) => { const v = e.target.value; latest.current.url = v; setUrl(v); };
  return (
    <>
      <div style={S.linkModalScrim} onClick={commit} />
      <div style={S.linkModal}>
        <div style={S.linkModalHead}>
          <span style={S.drawerTitle}>リンクを編集</span>
          <button style={S.iconBtn} onClick={commit}><X size={18} /></button>
        </div>
        <div style={S.linkModalBody}>
          <Field label="ラベル">
            <input style={S.input} value={label} placeholder="例：GitHub"
              onChange={onLabel}
              onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) { e.preventDefault(); commit(); } }}
              autoFocus={!initial.url} />
          </Field>
          <Field label="URL">
            <input style={S.input} value={url} type="url" placeholder="https://..."
              onChange={onUrl}
              onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) { e.preventDefault(); commit(); } }}
              autoFocus={!!initial.url && !initial.label} />
          </Field>
        </div>
        <div style={S.linkModalFoot}>
          <button style={S.linkModalDel} onClick={doDelete}>
            <Trash2 size={14} strokeWidth={2.2} />削除
          </button>
          <button style={S.linkModalClose} onClick={commit}>閉じる</button>
        </div>
      </div>
    </>
  );
}

// 内容がコンテナ幅を超えたら自動でループ横スクロール表示するテキスト。
// はみ出さない場合は普通の1行表示。
function MarqueeText({ text, style, gap = 40, seconds = 10 }) {
  const wrapRef = useRef(null);
  const measureRef = useRef(null);
  const [overflow, setOverflow] = useState(false);
  useEffect(() => {
    const check = () => {
      const w = wrapRef.current, m = measureRef.current;
      if (!w || !m) return;
      setOverflow(m.scrollWidth > w.clientWidth + 1);
    };
    check();
    let ro;
    try {
      ro = new ResizeObserver(check);
      if (wrapRef.current) ro.observe(wrapRef.current);
      if (measureRef.current) ro.observe(measureRef.current);
    } catch {}
    return () => { try { ro && ro.disconnect(); } catch {} };
  }, [text]);
  if (!overflow) {
    return (
      <span ref={wrapRef} style={{ ...style, display: "block", overflow: "hidden", whiteSpace: "nowrap", textOverflow: "ellipsis" }}>
        <span ref={measureRef} style={{ display: "inline-block" }}>{text}</span>
      </span>
    );
  }
  return (
    <span ref={wrapRef} style={{ ...style, display: "block", overflow: "hidden", whiteSpace: "nowrap", position: "relative", transform: "translateZ(0)", contain: "layout paint" }}>
      <span style={{ display: "inline-block", animation: `helm-marquee ${seconds}s linear infinite`, willChange: "transform" }}>
        <span ref={measureRef} style={{ display: "inline-block", paddingRight: gap }}>{text}</span>
        <span aria-hidden="true" style={{ display: "inline-block", paddingRight: gap }}>{text}</span>
      </span>
    </span>
  );
}

// 案件詳細のリンク編集フィールド（Claude / GitHub / 公開URL などをワンタップ追加）
function LinksField({ links, onChange }) {
  const list = Array.isArray(links) ? links : [];
  const [editId, setEditId] = useState(null);
  // 常に最新のlistを参照するためのref（LinkEditModalのアンマウント時保存で使う）
  const listRef = useRef(list); useEffect(() => { listRef.current = list; }, [list]);
  const onChangeRef = useRef(onChange); useEffect(() => { onChangeRef.current = onChange; }, [onChange]);
  const updateId = (id, patch) => {
    const next = listRef.current.map((l) => (l.id === id ? { ...l, ...patch } : l));
    onChangeRef.current(next);
  };
  const removeId = (id) => {
    const next = listRef.current.filter((l) => l.id !== id);
    onChangeRef.current(next);
    setEditId(null);
  };
  const add = (label) => {
    const id = uid();
    const next = [...listRef.current, { id, label: label || "", url: "" }];
    onChangeRef.current(next);
    setEditId(id); // 追加直後に編集モーダルを開く（URLをすぐ貼り付けられるように）
  };
  // 貼り付けられたテキストからURLをすべて抽出
  const extractUrls = (text) => {
    if (!text) return [];
    const re = /https?:\/\/[^\s"'<>()「」【】、,]+/g;
    return Array.from(new Set(text.match(re) || [])).map((u) => u.replace(/[.,、。]+$/, ""));
  };
  // 確認待ちのペンディングリンク（貼付け → ラベル確認 → 追加）
  const [pending, setPending] = useState([]);
  const [pasteVal, setPasteVal] = useState("");
  const pushPending = (urls) => {
    const known = new Set(listRef.current.map((l) => (l.url || "").trim()));
    const additions = urls
      .map((u) => u.trim())
      .filter((u) => u && !known.has(u))
      .map((u) => ({ id: uid(), url: u, label: urlAutoLabel(u) || "" }));
    if (!additions.length) return;
    setPending((p) => [...p, ...additions]);
  };
  const confirmPending = (id) => {
    const p = pending.find((x) => x.id === id);
    if (!p) return;
    const lbl = (p.label || "").trim() || urlAutoLabel(p.url) || "";
    onChangeRef.current([...listRef.current, { id: uid(), label: lbl, url: p.url }]);
    setPending((prev) => prev.filter((x) => x.id !== id));
  };
  const confirmAllPending = () => {
    const adds = pending.map((p) => ({ id: uid(), label: (p.label || "").trim() || urlAutoLabel(p.url) || "", url: p.url }));
    onChangeRef.current([...listRef.current, ...adds]);
    setPending([]);
  };
  const cancelPending = (id) => setPending((prev) => prev.filter((x) => x.id !== id));
  const editPendingLabel = (id, label) => setPending((prev) => prev.map((x) => x.id === id ? { ...x, label } : x));
  const onPasteBulk = (e) => {
    const text = (e.clipboardData || window.clipboardData || {}).getData ? e.clipboardData.getData("text") : "";
    const urls = extractUrls(text);
    if (urls.length) {
      e.preventDefault();
      pushPending(urls);
      setPasteVal("");
    }
  };
  const onKeyBulk = (e) => {
    if (e.key !== "Enter") return;
    e.preventDefault();
    const urls = extractUrls(pasteVal);
    const single = pasteVal.trim();
    if (urls.length) pushPending(urls);
    else if (/^https?:\/\//i.test(single)) pushPending([single]);
    setPasteVal("");
  };
  const editing = editId ? list.find((l) => l.id === editId) : null;
  return (
    <div style={S.linksWrap}>
      {list.map((l) => {
        const shown = linkLabelOf(l) || "（未設定）";
        return (
          <div key={l.id} style={S.linkRow}>
            {l.url ? (
              <a href={l.url} target="_blank" rel="noopener noreferrer" style={S.linkText} title={l.url}>
                <Favicon url={l.url} size={16} />
                <span style={S.linkTextName}>{shown}</span>
                <ExternalLink size={12} color={C.ink3} strokeWidth={2.2} style={{ flexShrink: 0 }} />
              </a>
            ) : (
              <button style={S.linkTextEmpty} onClick={() => setEditId(l.id)}>
                <Link2 size={14} color={C.ink3} strokeWidth={2.2} style={{ flexShrink: 0 }} />
                <span style={S.linkTextName}>{shown}</span>
              </button>
            )}
            <button style={S.linkEditBtn} onClick={() => setEditId(l.id)} title="編集">
              <Pencil size={14} strokeWidth={2.2} />
            </button>
          </div>
        );
      })}
      <div style={S.linkPasteRow}>
        <input
          style={S.linkPasteInput}
          placeholder="URLを貼り付け"
          value={pasteVal}
          onChange={(e) => setPasteVal(e.target.value)}
          onPaste={onPasteBulk}
          onKeyDown={onKeyBulk}
        />
        <button style={S.linkAddManualBtn} onClick={() => add("")} title="URL以外・手入力で追加">
          <Plus size={16} strokeWidth={2.6} />
        </button>
      </div>
      {pending.length > 0 && (
        <div style={S.pendingLinkWrap}>
          {pending.map((p) => {
            const guess = urlAutoLabel(p.url) || "";
            const isHost = !!guess && guess === (() => { try { return new URL(p.url).hostname.replace(/^www\./, ""); } catch { return ""; } })();
            const prompt = isHost ? "このリンクの名前を入力" : `『${guess}』として追加しますか？`;
            return (
              <div key={p.id} style={S.pendingLinkRow}>
                <div style={S.pendingLinkPrompt}>{prompt}</div>
                <div style={S.pendingLinkUrl} title={p.url}>{p.url}</div>
                <div style={S.pendingLinkForm}>
                  <input
                    style={S.pendingLinkInput}
                    placeholder="ラベル"
                    value={p.label}
                    autoFocus={isHost}
                    onChange={(e) => editPendingLabel(p.id, e.target.value)}
                    onKeyDown={(e) => { if (e.key === "Enter") { e.preventDefault(); confirmPending(p.id); } }}
                  />
                  <button style={S.pendingLinkAdd} onClick={() => confirmPending(p.id)}>
                    <Check size={14} strokeWidth={2.8} />追加
                  </button>
                  <button style={S.pendingLinkCancel} onClick={() => cancelPending(p.id)} title="キャンセル">
                    <X size={14} strokeWidth={2.4} />
                  </button>
                </div>
              </div>
            );
          })}
          {pending.length > 1 && (
            <button style={S.pendingLinkAll} onClick={confirmAllPending}>
              <Check size={13} strokeWidth={2.8} />{pending.length}件をまとめて追加
            </button>
          )}
        </div>
      )}
      {editing && (
        <LinkEditModal
          key={editing.id}
          initial={editing}
          onSave={(patch) => updateId(editing.id, patch)}
          onDelete={() => removeId(editing.id)}
          onClose={() => setEditId(null)}
        />
      )}
    </div>
  );
}
