// フィルタキーごとの件数（チップ・PCボード共用）
// ドラッグゴースト：行そのものを複製し、元の位置に重ねて縦方向だけ指に追従（Googleタスク風）
function makeRowGhost(el, startY, textOverride) {
  if (!el || !el.getBoundingClientRect) return null;
  const r = el.getBoundingClientRect();
  let g;
  if (textOverride != null) {
    g = document.createElement("div");
    g.textContent = textOverride || "（無題）";
    Object.assign(g.style, { fontWeight: "700", fontSize: "17px", color: "#E8ECF2", padding: "13px 15px",
      whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" });
  } else {
    g = el.cloneNode(true);
    g.style.padding = "8px 10px";
  }
  Object.assign(g.style, {
    position: "fixed", left: r.left + "px", top: r.top + "px", width: r.width + "px",
    margin: "0", zIndex: "9999", pointerEvents: "none", boxSizing: "border-box",
    background: "#000000", border: "1px solid rgba(107,138,255,0.45)", borderRadius: "12px",
    boxShadow: "0 10px 28px rgba(0,0,0,0.6)",
  });
  g.dataset.gy = String(startY || 0);
  document.body.appendChild(g);
  // 生成直後から指の真下（縦中央）に置く
  if (startY) g.style.top = Math.round(startY - r.height / 2) + "px";
  return g;
}
// ゴーストは常に「指の真下・縦中央」に絶対配置する（リスト縮小やスクロールでズレない）
function moveRowGhost(g, y) {
  if (!g) return;
  const h = g.offsetHeight || 44;
  g.style.transform = "none";
  g.style.top = Math.round(y - h / 2) + "px";
}
function removeDragGhost(g) { if (g && g.parentNode) g.parentNode.removeChild(g); }

function focusFilterCount(projects, key) {
  if (key === "all") return projects.filter((p) => p.id !== INBOX_ID && p.status !== "完了").length;
  let c = 0;
  projects.forEach((p) => (p.tasks || []).forEach((t) => { if (!t.done && taskInLane(p, t, key)) c++; }));
  projects.forEach((p) => { if (projectInLane(p, key)) c++; }); // タスク無し案件の案件行も数える
  return c;
}
// 案件一覧上部のフィルタチップ（件数付き）
// ① 案件一覧の1行。リンクチップは長押し(180ms)→ドラッグで同一案件内のみ並び替え可能
function PLRow({ p, dim, onOpen, onReorderLinks }) {
  const ls = p.links || [];
  const [order, setOrder] = useState(null);   // ドラッグ中の見た目上の並び（link idの配列）
  const [dragLid, setDragLid] = useState(null);
  const lpTimer = useRef(null);
  const downInfo = useRef(null);
  const dragRef = useRef(null);
  const suppressClick = useRef(false);
  const wrapRef = useRef(null);
  const lsRef = useRef(ls); lsRef.current = ls;
  const preventScroll = useRef((e) => { e.preventDefault(); }).current;
  useEffect(() => () => { try { document.removeEventListener("touchmove", preventScroll); } catch {} }, []);
  const chipDown = (e, lid) => {
    downInfo.current = { x: e.clientX, y: e.clientY, lid, el: e.currentTarget, pointerId: e.pointerId };
    lpTimer.current = setTimeout(() => {
      const di = downInfo.current; if (!di) return;
      lpTimer.current = null;
      try { di.el.setPointerCapture(di.pointerId); } catch {}
      try { document.addEventListener("touchmove", preventScroll, { passive: false }); } catch {}
      dragRef.current = { lid };
      setDragLid(lid);
      setOrder(lsRef.current.map((l) => l.id));
      try { if (navigator.vibrate) navigator.vibrate(10); } catch {}
    }, 180);
  };
  const chipMove = (e) => {
    if (lpTimer.current && downInfo.current) {
      if (Math.hypot(e.clientX - downInfo.current.x, e.clientY - downInfo.current.y) > 10) { clearTimeout(lpTimer.current); lpTimer.current = null; }
    }
    const dr = dragRef.current; if (!dr) return;
    const wrap = wrapRef.current; if (!wrap) return;
    const chips = Array.from(wrap.querySelectorAll("[data-lid]"));
    let target = null;
    for (const c of chips) {
      const r = c.getBoundingClientRect();
      if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) { target = c.getAttribute("data-lid"); break; }
    }
    if (!target || target === dr.lid) return;
    setOrder((prev) => {
      const arr = prev ? [...prev] : lsRef.current.map((l) => l.id);
      const from = arr.indexOf(dr.lid), to = arr.indexOf(target);
      if (from < 0 || to < 0 || from === to) return prev;
      arr.splice(from, 1); arr.splice(to, 0, dr.lid);
      return arr;
    });
  };
  const chipUp = () => {
    if (lpTimer.current) { clearTimeout(lpTimer.current); lpTimer.current = null; }
    if (dragRef.current) {
      try { document.removeEventListener("touchmove", preventScroll); } catch {}
      setOrder((cur) => {
        if (cur) {
          const base = lsRef.current;
          const changed = cur.length === base.length && cur.some((id, i) => base[i] && base[i].id !== id);
          if (changed) {
            const next = cur.map((id) => base.find((l) => l.id === id)).filter(Boolean);
            if (next.length === base.length) onReorderLinks(p.id, next);
          }
        }
        return null;
      });
      dragRef.current = null;
      setDragLid(null);
      suppressClick.current = true;
      setTimeout(() => { suppressClick.current = false; }, 250);
    }
    downInfo.current = null;
  };
  const openLink = (e, l) => {
    e.stopPropagation();
    if (suppressClick.current || dragRef.current) { e.preventDefault(); return; }
    if (!l.url) { e.preventDefault(); return; }
    if (isAndroidUA()) {
      const iu = claudeIntentUrl(l.url);
      if (iu) { e.preventDefault(); window.location.href = iu; }
    }
  };
  const shownLinks = order ? order.map((id) => ls.find((l) => l.id === id)).filter(Boolean) : ls;
  return (
    <div style={{ ...S.plItem, ...(dim ? { opacity: 0.55 } : {}) }}>
      <button style={S.plName} onClick={() => onOpen(p)}>{p.company || "（無題）"}</button>
      {ls.length > 0 && (
        <div ref={wrapRef} style={S.plLinks}>
          {shownLinks.map((l) => {
            const ic = linkIconOf(l);
            const dragging = dragLid === l.id;
            return (
            <a key={l.id} data-lid={l.id} href={l.url || undefined} target="_blank" rel="noopener noreferrer"
              draggable={false} onDragStart={(e) => e.preventDefault()}
              onContextMenu={(e) => e.preventDefault()}
              style={{ ...S.plLink, ...(l.kind === "reply" ? S.plLinkReply : {}),
                ...(dragging ? S.plLinkDragging : {}),
                ...(dragLid && !dragging ? { opacity: 0.55 } : {}),
                touchAction: dragLid ? "none" : "pan-y" }}
              onPointerDown={(e) => chipDown(e, l.id)} onPointerMove={chipMove} onPointerUp={chipUp} onPointerCancel={chipUp}
              onClick={(e) => openLink(e, l)} title={l.url || ""}>
              {l.url ? <Favicon url={l.url} size={15} /> : <ic.Icon size={14} color={ic.color} strokeWidth={2.2} style={{ flexShrink: 0 }} />}
              {linkLabelOf(l)}
            </a>
            );
          })}
        </div>
      )}
    </div>
  );
}
function ProjectListView({ projects, onOpen, onReorderLinks }) {
  const [showDone, setShowDone] = useState(false);
  const recency = (p) => {
    let m = (typeof p.repliedAt === "number") ? p.repliedAt : 0;
    if (typeof p.createdAt === "number" && p.createdAt > m) m = p.createdAt;
    (p.tasks || []).forEach((t) => { if (typeof t.doneAt === "number" && t.doneAt > m) m = t.doneAt; });
    return m;
  };
  const open = projects.filter((p) => p.id !== INBOX_ID && p.status !== "完了").sort((a, b) => recency(b) - recency(a));
  const doneList = projects.filter((p) => p.id !== INBOX_ID && p.status === "完了").sort((a, b) => recency(b) - recency(a));
  return (
    <div style={S.colWrap}>
      {open.length === 0 && <div style={S.plEmpty}>案件がありません</div>}
      {open.map((p) => <PLRow key={p.id} p={p} onOpen={onOpen} onReorderLinks={onReorderLinks} />)}
      {doneList.length > 0 && (
        <>
          <button style={{ ...S.doneAccordion, marginTop: 10 }} onClick={() => setShowDone((v) => !v)}>
            <ChevronRight size={13} strokeWidth={2.4} style={{ transform: showDone ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
            完了 ({doneList.length}件)
          </button>
          {showDone && doneList.map((p) => <PLRow key={p.id} p={p} dim onOpen={onOpen} onReorderLinks={onReorderLinks} />)}
        </>
      )}
    </div>
  );
}
function FilterChips({ projects, filter, onChange }) {
  const wrapRef = useRef(null);
  // アクティブなチップ（青下線）が画面外に出ないよう、切替のたびに横スクロールを追従させる
  useEffect(() => {
    const wrap = wrapRef.current; if (!wrap) return;
    const btn = wrap.querySelector(`[data-fkey="${filter}"]`); if (!btn) return;
    try {
      const pad = 28;
      const left = btn.offsetLeft, right = left + btn.offsetWidth;
      const go = (x) => { if (wrap.scrollTo) wrap.scrollTo({ left: x, behavior: "smooth" }); else wrap.scrollLeft = x; };
      if (left - pad < wrap.scrollLeft) go(Math.max(0, left - pad));
      else if (right + pad > wrap.scrollLeft + wrap.clientWidth) go(right + pad - wrap.clientWidth);
    } catch {}
  }, [filter]);
  return (
    <div ref={wrapRef} style={S.filterChips}>
      {FOCUS_FILTERS.map((f) => {
        const on = filter === f.key;
        return (
          <button key={f.key} data-fkey={f.key} onClick={() => onChange(f.key)}
            style={{ ...S.filterChip, ...(on ? S.filterChipOn : {}) }}>
            {f.label}
            {f.key !== "registry" && (
              <span style={{ ...S.filterChipCount, ...(on ? { color: C.accent } : {}) }}>{focusFilterCount(projects, f.key)}</span>
            )}
          </button>
        );
      })}
    </div>
  );
}

// ============================================================
// InboxPanel — Chatwork自動対応システムの「対応待ち」パネル
// AGENT_GAS_URL 未設定（httpsで始まらない）の間は何も表示しない。
// ============================================================
function InboxPanel() {
  const [items, setItems] = React.useState(null);   // null=読み込み中
  const [dashUrl, setDashUrl] = React.useState('');
  const [error, setError] = React.useState('');
  const [openId, setOpenId] = React.useState(null); // 編集展開中のカード
  const [drafts, setDrafts] = React.useState({});   // id -> 編集中本文
  const [sending, setSending] = React.useState({}); // id -> true
  const configured = /^https:\/\//.test(AGENT_GAS_URL);

  const load = React.useCallback(async () => {
    if (!configured) return;
    try {
      const res = await fetch(`${AGENT_GAS_URL}?action=list&t=${encodeURIComponent(AGENT_TOKEN)}`);
      const data = await res.json();
      if (!data.ok) throw new Error(data.error || 'error');
      setItems(data.items);
      setDashUrl(data.dash || '');
      setError('');
    } catch (e) {
      setError(String(e.message || e));
      setItems([]);
    }
  }, [configured]);

  React.useEffect(() => {
    if (!configured) return;
    load();
    const onVis = () => { if (!document.hidden) load(); };
    document.addEventListener('visibilitychange', onVis);
    const timer = setInterval(load, 5 * 60 * 1000); // 5分ごとに再取得
    return () => { document.removeEventListener('visibilitychange', onVis); clearInterval(timer); };
  }, [load, configured]);

  const send = async (it) => {
    setSending(s => ({ ...s, [it.id]: true }));
    try {
      const body = drafts[it.id] != null ? drafts[it.id] : it.draft;
      const res = await fetch(AGENT_GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ action: 'send', t: AGENT_TOKEN, id: it.id, body }),
      });
      const r = await res.json();
      if (!r.ok) throw new Error(r.error || 'error');
      setItems(list => list.filter(x => x.id !== it.id));
      setOpenId(null);
    } catch (e) {
      alert('送信に失敗: ' + e.message);
    } finally {
      setSending(s => ({ ...s, [it.id]: false }));
    }
  };

  const copy = (it) => {
    const text = drafts[it.id] != null ? drafts[it.id] : it.draft;
    navigator.clipboard.writeText(text);
  };

  const fmt = (ms) => {
    if (!ms) return '';
    const d = new Date(ms);
    return `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  };

  if (!configured) return null;

  return (
    <div style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 12, padding: 16, color: C.ink, marginBottom: 14 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
        <div style={{ fontSize: 15, fontWeight: 600 }}>
          📥 対応待ち {items && items.length > 0 ? `（${items.length}）` : ''}
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          {dashUrl && (
            <a href={dashUrl} target="_blank" rel="noreferrer" style={{ color: C.ink2, fontSize: 12.5, textDecoration: 'none' }}>📊 台帳</a>
          )}
          <button onClick={load} style={{ background: 'none', border: 'none', color: C.ink2, fontSize: 12.5, cursor: 'pointer' }}>↻ 更新</button>
        </div>
      </div>

      {items === null && <div style={{ color: C.ink3, fontSize: 13, padding: '14px 0' }}>読み込み中…</div>}
      {error && <div style={{ color: C.ink3, fontSize: 13, padding: '14px 0' }}>取得に失敗しました：{error}</div>}
      {items && items.length === 0 && !error && (
        <div style={{ color: C.ink3, fontSize: 13.5, padding: '18px 0', textAlign: 'center' }}>🎉 未処理はありません</div>
      )}

      {items && items.map(it => (
        <div key={it.id} style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 12, marginBottom: 8 }}>
          <div style={{ fontSize: 13.5 }}>
            <b>{it.client_name}</b>
            <span style={{ color: C.ink2 }}>｜{it.room_name}{it.category ? `｜${it.category}` : ''}</span>
            <span style={{ float: 'right', color: C.ink3, fontSize: 12 }}>{fmt(it.created)}</span>
          </div>
          {it.summary && <div style={{ fontSize: 13, color: C.ink2, margin: '6px 0 2px' }}>{it.summary}</div>}

          {openId === it.id && (
            <textarea
              value={drafts[it.id] != null ? drafts[it.id] : it.draft}
              onChange={e => setDrafts(d => ({ ...d, [it.id]: e.target.value }))}
              rows={10}
              style={{
                width: '100%', boxSizing: 'border-box', marginTop: 8, padding: 10,
                background: C.bg, color: C.ink, border: `1px solid ${C.line}`,
                borderRadius: 8, fontSize: 13.5, lineHeight: 1.7, fontFamily: 'inherit',
              }}
            />
          )}

          <div style={{ display: 'flex', gap: 6, marginTop: 8 }}>
            {openId !== it.id ? (
              <button onClick={() => setOpenId(it.id)}
                style={{ flex: 1, padding: '9px 4px', borderRadius: 8, border: 'none', background: C.accent, color: C.bg, fontWeight: 600, fontSize: 12.5, cursor: 'pointer' }}>
                ✅ 確認して送信
              </button>
            ) : (
              <button onClick={() => send(it)} disabled={!!sending[it.id]}
                style={{ flex: 1, padding: '9px 4px', borderRadius: 8, border: 'none', background: C.accent, color: C.bg, fontWeight: 600, fontSize: 12.5, cursor: 'pointer', opacity: sending[it.id] ? 0.5 : 1 }}>
                {sending[it.id] ? '送信中…' : '✅ この内容で送信'}
              </button>
            )}
            <button onClick={() => copy(it)}
              style={{ flex: 1, padding: '9px 4px', borderRadius: 8, border: `1px solid ${C.line}`, background: 'transparent', color: C.ink, fontSize: 12.5, cursor: 'pointer' }}>
              📋 コピー
            </button>
            <a href={`https://www.chatwork.com/#!rid${it.target_room_id}`} target="_blank" rel="noreferrer"
              style={{ flex: 1, padding: '9px 4px', borderRadius: 8, border: `1px solid ${C.line}`, background: 'transparent', color: C.ink, fontSize: 12.5, textAlign: 'center', textDecoration: 'none' }}>
              💬 ルーム
            </a>
          </div>
        </div>
      ))}
    </div>
  );
}

function TasksView({ projects, onToggle, onOpen, onOpenTask, onEditTask, onChangeLane, onChangeDue, onChangeStart, onChangeKind, onAddTask, onReorderTask, onReorderProject, onSortManual, onReorderCommit, onToggleProject, onSetStatus, onOpenReply, onAckSug, activeLane, setActiveLane, singleLane, heldLane, forceNarrow }) {
  const wide = useWideScreen() && !forceNarrow;
  const [adding, setAdding] = useState(null); // 追加中のレーンキー（null=なし）
  const [openDone, setOpenDone] = useState(() => new Set()); // アコーディオンで完了を開いているレーン
  const [dragTid, setDragTid] = useState(null);
  const [dragGid, setDragGid] = useState(null); // ドラッグ中の案件グループ
  const toggleOpenDone = (lane) => setOpenDone((prev) => {
    const next = new Set(prev);
    if (next.has(lane)) next.delete(lane); else next.add(lane);
    return next;
  });

  // 長押し→上下ドラッグでタスクを並べ替え（同一レーン内なら案件をまたいでも移動可）
  const startTaskDrag = (pid, tid, el, pointerId, dragLane, title, sx, sy) => {
    try { el && el.setPointerCapture && pointerId != null && el.setPointerCapture(pointerId); } catch {}
    setDragTid(tid);
    const ghost = makeRowGhost(el, sy || 0);
    const move = (ev) => {
      if (ev.cancelable) ev.preventDefault();
      moveRowGhost(ghost, ev.clientY);
      const elAt = document.elementFromPoint(ev.clientX, ev.clientY);
      const row = elAt && elAt.closest && elAt.closest("[data-tid]");
      if (row) {
        const overTid = row.getAttribute("data-tid");
        const overPid = row.getAttribute("data-pid");
        const laneEl = row.closest && row.closest("[data-lane]");
        const overLane = laneEl ? laneEl.getAttribute("data-lane") : dragLane;
        if (overLane === dragLane && overTid && overTid !== tid) onReorderTask && onReorderTask(tid, overPid, overTid);
        return;
      }
      // 案件名（グループ見出し）の上に来たら、その案件の先頭へ移動（案件またぎ）
      const grp = elAt && elAt.closest && elAt.closest("[data-gpid]");
      if (grp) {
        const overPid = grp.getAttribute("data-gpid");
        const laneEl = grp.closest && grp.closest("[data-lane]");
        const overLane = laneEl ? laneEl.getAttribute("data-lane") : dragLane;
        if (overLane === dragLane && overPid) onReorderTask && onReorderTask(tid, overPid, "__top__");
      }
    };
    const up = () => {
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
      document.removeEventListener("pointercancel", up);
      document.removeEventListener("touchmove", blockScroll);
      removeDragGhost(ghost);
      setDragTid(null);
      onReorderCommit && onReorderCommit();
      const swallow = (ce) => { ce.stopPropagation(); ce.preventDefault(); document.removeEventListener("click", swallow, true); };
      document.addEventListener("click", swallow, true);
      setTimeout(() => document.removeEventListener("click", swallow, true), 450);
    };
    const blockScroll = (ev) => { if (ev.cancelable) ev.preventDefault(); };
    document.addEventListener("touchmove", blockScroll, { passive: false });
    document.addEventListener("pointermove", move, { passive: false });
    document.addEventListener("pointerup", up);
    document.addEventListener("pointercancel", up);
  };

  // 矢印（↑↓）で案件グループを1つ上下へ（同一レーン内・DOM表示順）
  const groupArrow = (pid, dir, ev) => {
    try {
      onSortManual && onSortManual();
      const head = ev.currentTarget.closest("[data-gpid]");
      const laneEl = head ? head.closest("[data-lane]") : null;
      const scope = laneEl || document;
      const els = Array.from(scope.querySelectorAll("[data-gpid]"));
      const i = els.findIndex((el) => el.getAttribute("data-gpid") === pid);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= els.length) return;
      onReorderProject && onReorderProject(pid, els[j].getAttribute("data-gpid"));
      onReorderCommit && onReorderCommit();
    } catch {}
  };
  // 矢印（↑↓）でタスクを1つ上下へ（同一レーン内・案件またぎ可）
  const taskArrow = (tid, dir, ev) => {
    try {
      const row = ev.currentTarget.closest("[data-tid]");
      const laneEl = row ? row.closest("[data-lane]") : null;
      const scope = laneEl || document;
      const els = Array.from(scope.querySelectorAll("[data-tid]"));
      const i = els.findIndex((el) => el.getAttribute("data-tid") === tid);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= els.length) return;
      const nb = els[j];
      onReorderTask && onReorderTask(tid, nb.getAttribute("data-pid"), nb.getAttribute("data-tid"));
      onReorderCommit && onReorderCommit();
    } catch {}
  };

  // 長押し→上下ドラッグで案件グループ（案件名）を並べ替え。序列は案件配列そのものを更新するので全タブに反映される
  const startGroupDrag = (pid, el, pointerId, dragLane, name, sx, sy) => {
    try { el && el.setPointerCapture && pointerId != null && el.setPointerCapture(pointerId); } catch {}
    onSortManual && onSortManual(); // 手動並びへ切替（再ソートで戻らないように）
    setDragGid(pid);
    const ghost = makeRowGhost(el, sy || 0, name);
    // タスク折りたたみでリストが縮み、指の下に別グループが来て即入れ替わるのを防ぐ：
    // 描画後、つかんだ見出しが指の真下に来るようスクロール補正してから並べ替えを許可する
    let ready = false;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try {
        const grpEl = document.querySelector(`[data-gpid="${pid}"]`);
        if (grpEl && sy) {
          const r = grpEl.getBoundingClientRect();
          const delta = (r.top + r.height / 2) - sy;
          if (Math.abs(delta) > 4) window.scrollBy(0, delta);
        }
      } catch {}
      ready = true;
    }));
    const move = (ev) => {
      if (ev.cancelable) ev.preventDefault();
      moveRowGhost(ghost, ev.clientY);
      if (!ready) return;
      const elAt = document.elementFromPoint(ev.clientX, ev.clientY);
      const grp = elAt && elAt.closest && elAt.closest("[data-gpid]");
      if (grp) {
        const overPid = grp.getAttribute("data-gpid");
        const laneEl = grp.closest && grp.closest("[data-lane]");
        const overLane = laneEl ? laneEl.getAttribute("data-lane") : dragLane;
        if (overLane === dragLane && overPid && overPid !== pid) onReorderProject && onReorderProject(pid, overPid);
      }
    };
    const up = () => {
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
      document.removeEventListener("pointercancel", up);
      document.removeEventListener("touchmove", blockScroll);
      removeDragGhost(ghost);
      setDragGid(null);
      onReorderCommit && onReorderCommit();
      const swallow = (ce) => { ce.stopPropagation(); ce.preventDefault(); document.removeEventListener("click", swallow, true); };
      document.addEventListener("click", swallow, true);
      setTimeout(() => document.removeEventListener("click", swallow, true), 450);
    };
    const blockScroll = (ev) => { if (ev.cancelable) ev.preventDefault(); };
    document.addEventListener("touchmove", blockScroll, { passive: false });
    document.addEventListener("pointermove", move, { passive: false });
    document.addEventListener("pointerup", up);
    document.addEventListener("pointercancel", up);
  };

  const all = [];
  projects.forEach((p) => p.tasks.forEach((t) => all.push({ ...t, project: p, _lane: (heldLane && heldLane[t.id] !== undefined ? heldLane[t.id] : laneOf(p, t)) })));
  const laneStatusOf = (lane) => lane === "waiting" ? "相手待ち" : lane === "payment" ? "支払い待ち" : null;
  const openTasksOf = (p) => (p.tasks || []).filter((t) => !t.done);
  const countOf = (lane) => laneTasks(lane, false).length + projects.filter((p) => projectInLane(p, lane)).length;
  const laneTasks = (lane, doneOnly) => all
    .filter((t) => doneOnly ? t._lane === lane : taskInLane(t.project, t, lane))
    .filter((t) => doneOnly ? (t.done && !isArchivedTask(t)) : !t.done)
    .sort((a, b) => (a.done === b.done ? 0 : a.done ? 1 : -1));

  // レーンごとの案件グループを構築（doneOnly=true で完了タスクのみ）。
  // 未完了タスクが無い案件も「すべて」と同じ判定（projectFallbackLane）で案件行として出す
  const buildGroups = (lane, doneOnly) => {
    const items = laneTasks(lane, doneOnly);
    const groups = []; const gmap = new Map();
    items.forEach((t) => {
      if (!gmap.has(t.project.id)) { const g = { project: t.project, tasks: [] }; gmap.set(t.project.id, g); groups.push(g); }
      gmap.get(t.project.id).tasks.push(t);
    });
    if (!doneOnly) {
      projects.forEach((p) => {
        if (gmap.has(p.id)) return;
        if (projectInLane(p, lane)) { const g = { project: p, tasks: [] }; gmap.set(p.id, g); groups.push(g); }
      });
      // すべてタブと同じ並びに統一：ステータス順（進行中→相手待ち→支払い待ち）を最優先、その中は案件の並び順
      const order = new Map(projects.map((p, i) => [p.id, i]));
      const sRank = (p) => (p.status === "相手待ち" ? 1 : p.status === "支払い待ち" ? 2 : 0);
      groups.sort((a, b) => (sRank(a.project) - sRank(b.project)) || ((order.get(a.project.id) ?? 0) - (order.get(b.project.id) ?? 0)));
    }
    return groups;
  };
  const doneCountLane = (lane) => all.filter((t) => t._lane === lane && t.done && !isArchivedTask(t)).length;

  const renderGroups = (lane, groups) => groups.map((g) => (
    <div key={g.project.id} style={S.taskGroup} data-gpid={g.project.id}>
      <GroupHead project={g.project} lane={lane}
        dragActive={dragTid !== null || dragGid !== null}
        onStartDrag={startGroupDrag} onOpen={onOpen} onToggleProject={onToggleProject}
        onArrow={groupArrow} />
      {dragTid === null && dragGid === null && (
        <GroupAssist p={g.project} onSetStatus={onSetStatus} onOpenReply={onOpenReply} onAckSug={onAckSug} />
      )}
      {dragGid === null && g.tasks.length > 0 && (
      <div style={S.taskGroupTasks}>
        {g.tasks.map((t) => (
          <TaskCard key={t.id} t={t} lane={lane}
            onToggle={onToggle} onOpen={onOpen} onOpenTask={onOpenTask} onEditTask={onEditTask}
            dragging={dragTid === t.id} dragActive={dragTid !== null || dragGid !== null}
            onStartDrag={startTaskDrag} onArrow={taskArrow}
            onChangeStart={(start) => onChangeStart(t.project.id, t.id, start)}
            onChangeDue={(due) => onChangeDue(t.project.id, t.id, due)}
            onChangeKind={(kind) => onChangeKind && onChangeKind(t.project.id, t.id, kind)} />
        ))}
      </div>
      )}
    </div>
  ));

  // ===== PC：4レーンを横並び（カンバン） =====
  if (wide && !singleLane) {
    return (
      <div style={S.kanWrap}>
        <div style={S.kanban}>
          {TASK_LANES.map((L) => {
            const groups = buildGroups(L.key);
            const dn = doneCountLane(L.key);
            const isDoneOpen = openDone.has(L.key);
            return (
              <div key={L.key} style={S.kanbanCol} data-lane={L.key}>
                <div style={S.kanColHead}>
                  <span style={{ ...S.laneDot, background: L.color }} />
                  <span style={S.kanColTitle}>{L.label}</span>
                  <span style={S.kanColCount}>{countOf(L.key)}</span>
                  <button style={S.kanAdd} onClick={() => setAdding(adding === L.key ? null : L.key)}><Plus size={15} strokeWidth={2.6} /></button>
                </div>
                {adding === L.key && (
                  <AddTaskInline projects={projects}
                    onAdd={(pid, title) => { onAddTask(pid, L.key, title); setAdding(null); }}
                    onCancel={() => setAdding(null)} />
                )}
                <div style={S.kanColBody}>
                  {groups.length === 0 ? <div style={S.kanEmpty}>なし</div> : renderGroups(L.key, groups)}
                  {dn > 0 && (
                    <>
                      <button style={S.doneAccordion} onClick={() => toggleOpenDone(L.key)}>
                        <ChevronRight size={13} strokeWidth={2.4} style={{ transform: isDoneOpen ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
                        完了 ({dn}件)
                      </button>
                      {isDoneOpen && renderGroups(L.key, buildGroups(L.key, true))}
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ===== スマホ：タブで1レーンずつ =====
  const activeMeta = TASK_LANES.find((L) => L.key === activeLane) || TASK_LANES[0];
  const groups = buildGroups(activeLane);
  const hasAny = groups.length > 0;
  return (
    <div style={S.colWrap}>
      {!singleLane && (
      <div style={S.taskTabs}>
        {TASK_LANES.map((L) => {
          const active = activeLane === L.key;
          return (
            <button key={L.key} data-lane={L.key}
              style={{ ...S.taskTab, ...(active ? S.taskTabOn : {}) }}
              onClick={() => setActiveLane(L.key)}>
              <span>{L.label}</span>
              <span style={{ ...S.taskTabCount, ...(active ? S.taskTabCountOn : {}) }}>{countOf(L.key)}</span>
            </button>
          );
        })}
      </div>
      )}

      <div style={S.laneBar}>
        {!singleLane && <span style={{ ...S.laneDot, background: activeMeta.color }} />}
        {!singleLane && <span style={S.laneBarTitle}>{activeMeta.label}</span>}
        {singleLane && <span style={{ marginRight: "auto" }} />}
        <button style={S.laneBarAdd} onClick={() => setAdding(adding ? null : activeLane)}>
          <Plus size={15} strokeWidth={2.6} /> 追加
        </button>
      </div>

      {adding && (
        <AddTaskInline projects={projects}
          onAdd={(pid, title) => { onAddTask(pid, activeLane, title); setAdding(null); }}
          onCancel={() => setAdding(null)} />
      )}

      <div style={S.swipeArea} data-lane={activeLane}>
        {!hasAny && !adding && <Empty text="このレーンにタスクはありません。" />}
        {renderGroups(activeLane, groups)}
        {doneCountLane(activeLane) > 0 && (
          <>
            <button style={S.doneAccordion} onClick={() => toggleOpenDone(activeLane)}>
              <ChevronRight size={13} strokeWidth={2.4} style={{ transform: openDone.has(activeLane) ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
              完了 ({doneCountLane(activeLane)}件)
            </button>
            {openDone.has(activeLane) && renderGroups(activeLane, buildGroups(activeLane, true))}
          </>
        )}
      </div>
    </div>
  );
}

// 案件グループの見出し（案件名行）。長押し180msでグループごと並べ替えドラッグ、タップで案件詳細
// 各レーンの案件見出し直下に出すアシスト（⚠ステータス提案＋返信アシスト）。全レーン共通。
function GroupAssist({ p, onSetStatus, onOpenReply }) {
  const [copied, setCopied] = useState(false);
  const sug = statusSuggestion(p);
  const lastIsClient = replyNeeded(p);
  const warn = sug && sug.mark === "warn" && sug.suggest;
  if (!warn && !lastIsClient) return null;
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, margin: "2px 0 8px" }}>
      {warn && (
        <div style={S.suggestBar}>
          <AlertTriangle size={13} color="#D9A23B" strokeWidth={2.4} style={{ flexShrink: 0 }} />
          <span style={S.suggestText}>{sug.reason} →「{sug.suggest}」では？</span>
          <button style={S.suggestBtn} onClick={() => onSetStatus && onSetStatus(p.id, sug.suggest)}>{sug.suggest}にする</button>
          <button style={S.suggestX} title="返信済み扱いにする（新着が来るまで再提案しない）" onClick={(e) => { e.stopPropagation(); onAckSug && onAckSug(p.id); }}><X size={13} strokeWidth={2.2} /></button>
        </div>
      )}
      {lastIsClient && p.rsug && (
        <div style={S.cardRsug} onClick={() => onOpenReply && onOpenReply(p.id)} title="タップで返信アシストを開く">
          <Reply size={13} color={C.accent} strokeWidth={2.4} style={{ flexShrink: 0, marginTop: 3 }} />
          <span style={{ ...S.cardRsugText, ...S.cardRsugClamp }}>{p.rsug.text}</span>
          <button style={S.cardRsugCopy} onClick={async (e) => { e.stopPropagation(); const ok = await copyText(p.rsug.text); if (ok) { setCopied(true); setTimeout(() => setCopied(false), 1500); } }}>
            {copied ? <Check size={12} strokeWidth={2.8} /> : <Copy size={12} strokeWidth={2.2} />}{copied ? "OK" : "コピー"}
          </button>
        </div>
      )}
      {lastIsClient && !p.rsug && (
        <button style={{ ...S.cardRsugGen, marginTop: 0 }} onClick={() => onOpenReply && onOpenReply(p.id)}>
          <Reply size={13} strokeWidth={2.4} />返信アシスト
        </button>
      )}
    </div>
  );
}

function GroupHead({ project, lane, dragActive, onStartDrag, onOpen, onToggleProject, onArrow }) {
  const lpTimer = useRef(null);
  const downInfo = useRef(null);
  const gdown = (e) => {
    if (e.target.closest && e.target.closest("input, a, label, [data-gcheck], [data-arrow]")) return; // 完了◯・矢印などは除外
    downInfo.current = { el: e.currentTarget, pointerId: e.pointerId, x: e.clientX, y: e.clientY };
    lpTimer.current = setTimeout(() => {
      if (downInfo.current && onStartDrag) onStartDrag(project.id, downInfo.current.el, downInfo.current.pointerId, lane, project.company, downInfo.current.x, downInfo.current.y);
    }, 180);
  };
  const gmove = (e) => {
    if (!downInfo.current || !lpTimer.current) return;
    if (Math.hypot(e.clientX - downInfo.current.x, e.clientY - downInfo.current.y) > 10) { clearTimeout(lpTimer.current); lpTimer.current = null; }
  };
  const gup = () => { if (lpTimer.current) { clearTimeout(lpTimer.current); lpTimer.current = null; } };
  return (
    <button style={{ ...S.taskGroupHead, touchAction: dragActive ? "none" : "pan-y" }}
      onContextMenu={(e) => e.preventDefault()}
      onPointerDown={gdown} onPointerMove={gmove} onPointerUp={gup} onPointerCancel={gup}
      onClick={() => { if (project.id !== INBOX_ID) onOpen(project); }}>
      {project.id !== INBOX_ID && (
        <span style={S.groupCheck} data-gcheck title="案件を完了"
          onClick={(e) => { e.stopPropagation(); onToggleProject && onToggleProject(project.id); }}>
          <Circle size={18} color="#3A434F" strokeWidth={2.2} />
        </span>
      )}
      <span style={S.taskGroupName}>{project.company}</span>
      <StatusIcon status={project.status} size={15} />
      {!dragActive && onArrow && (
        <ArrowPair onUp={(e) => onArrow(project.id, -1, e)} onDown={(e) => onArrow(project.id, 1, e)} />
      )}
    </button>
  );
}

// 極小の並び替え矢印（↑↓）。ドラッグの代替。DOM表示順で隣と入れ替える
function ArrowPair({ onUp, onDown }) {
  const h = (fn) => (e) => { e.stopPropagation(); e.preventDefault(); fn && fn(e); };
  return (
    <span style={S.arrowPair} data-arrow="1" onPointerDown={(e) => e.stopPropagation()} onClick={(e) => e.stopPropagation()}>
      <span role="button" tabIndex={-1} style={S.arrowBtn} title="上へ" onClick={h(onUp)}><ChevronUp size={14} strokeWidth={2.2} /></span>
      <span role="button" tabIndex={-1} style={S.arrowBtn} title="下へ" onClick={h(onDown)}><ChevronDown size={14} strokeWidth={2.2} /></span>
    </span>
  );
}

// ステータスアイコン（名前の右に表示）。進行中は何も出さない。
function StatusIcon({ status, size = 14 }) {
  if (status === "相手待ち") return <Hourglass size={size} color="#D9A23B" strokeWidth={2.4} style={{ flexShrink: 0 }} />;
  if (status === "支払い待ち") return <Coins size={size} color="#51CF66" strokeWidth={2.4} style={{ flexShrink: 0 }} />;
  return null;
}

// タスクのメタ表示（状態アイコン＋日付）。表示専用：タップは行全体で詳細シートを開く
function TaskMetaChips({ t }) {
  if (t.kind === "reply") return null;
  const judge = taskJudgeDate(t);
  const lab = judge ? dateLabelJP(judge) : null;
  const jn = judge ? daysUntil(judge) : null;
  const chipColor = jn === null ? C.ink3 : (jn < 0 ? "#FF6B6B" : C.ink2); // 赤は超過のみ
  return (
    <div style={S.dueWrap}>
      <span style={{ ...S.dueChip, color: judge ? chipColor : C.ink3 }}>
        <CalendarDays size={12} strokeWidth={2.3} />{lab ? lab.text : "—"}
      </span>
    </div>
  );
}
function TaskCard({ t, lane, onToggle, onOpen, onOpenTask, onEditTask, dragging, dragActive, onStartDrag, onChangeDue, onChangeStart, onChangeKind, onArrow }) {
  // 長押し（400ms）で並べ替えドラッグ開始
  const lpTimer = useRef(null);
  const downInfo = useRef(null);
  const tdown = (e) => {
    if (e.target.closest && e.target.closest("button, input, a, label, [data-arrow]")) return; // 操作系・矢印は除外
    downInfo.current = { el: e.currentTarget, pointerId: e.pointerId, x: e.clientX, y: e.clientY };
    lpTimer.current = setTimeout(() => {
      if (downInfo.current && onStartDrag) onStartDrag(t.project.id, t.id, downInfo.current.el, downInfo.current.pointerId, lane, t.title, downInfo.current.x, downInfo.current.y);
    }, 180);
  };
  const tmove = (e) => {
    if (!downInfo.current || !lpTimer.current) return;
    if (Math.hypot(e.clientX - downInfo.current.x, e.clientY - downInfo.current.y) > 10) { clearTimeout(lpTimer.current); lpTimer.current = null; }
  };
  const tup = () => { if (lpTimer.current) { clearTimeout(lpTimer.current); lpTimer.current = null; } };
  return (
    <div data-tid={t.id} data-pid={t.project.id}
      onContextMenu={(e) => e.preventDefault()}
      style={{ ...S.tcard, ...(t.done ? S.tcardDone : {}), touchAction: dragActive ? "none" : "pan-y" }}
      onPointerDown={tdown} onPointerMove={tmove} onPointerUp={tup} onPointerCancel={tup}
      onClick={(e) => {
        if (e.target.closest && e.target.closest("button, input, a, label")) return;
        if (t.project.id === INBOX_ID) { onEditTask ? onEditTask(t.project.id, t.id) : onOpen(t.project); return; }
        if (t.kind === "reply") { onOpenTask ? onOpenTask(t.project, t.id) : onOpen(t.project); return; }
        onEditTask ? onEditTask(t.project.id, t.id) : (onOpenTask ? onOpenTask(t.project, t.id) : onOpen(t.project));
      }}>
      <button style={S.checkBtn} onClick={(e) => { e.stopPropagation(); onToggle(t.project.id, t.id); }}>
        {t.done ? <CheckCircle2 size={18} color="#51CF66" strokeWidth={2.2} />
                : <Circle size={18} color="#3A434F" strokeWidth={2.2} />}
      </button>
      <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }}>
        <div style={{ ...S.tcardTitle, ...(t.done ? S.trowDone : {}) }}>
          {t.kind === "reply" && <Reply size={13} color="#6B8AFF" strokeWidth={2.6} style={{ marginRight: 5, verticalAlign: "-1px" }} />}
          {t.repeat && <Repeat size={13} color={C.accent} strokeWidth={2.6} style={{ marginRight: 5, verticalAlign: "-1px" }} />}
          {t.title || "（無題）"}
          {t.kind === "waiting" && <Hourglass size={13} color="#D9A23B" strokeWidth={2.4} style={{ marginLeft: 6, verticalAlign: "-1px" }} />}
          {t.kind === "payment" && <Coins size={13} color="#51CF66" strokeWidth={2.4} style={{ marginLeft: 6, verticalAlign: "-1px" }} />}
          {t.kind !== "waiting" && t.kind !== "payment" && t.project.status === "相手待ち" && <Hourglass size={13} color="#D9A23B" strokeWidth={2.4} style={{ marginLeft: 6, verticalAlign: "-1px" }} />}
          {t.kind !== "waiting" && t.kind !== "payment" && t.project.status === "支払い待ち" && <Coins size={13} color="#51CF66" strokeWidth={2.4} style={{ marginLeft: 6, verticalAlign: "-1px" }} />}
        </div>
        {t.kind === "reply" && !t.done && (
          <div style={S.tcardMeta}>
            <span style={{ ...S.dueMini, color: "#6B8AFF" }}>本日中</span>
          </div>
        )}
        <TaskMetaChips t={t} />
      </div>
      {!dragActive && !t.done && onArrow && (
        <ArrowPair onUp={(e) => onArrow(t.id, -1, e)} onDown={(e) => onArrow(t.id, 1, e)} />
      )}
    </div>
  );
}

function AddTaskInline({ projects, onAdd, onCancel }) {
  const [title, setTitle] = useState("");
  const [pid, setPid] = useState(projects[0]?.id || "");
  if (projects.length === 0) return <div style={S.laneEmpty}>先に案件を追加してください</div>;
  const submit = () => { if (title.trim() && pid) onAdd(pid, title.trim()); };
  return (
    <div style={S.addInline}>
      <input autoFocus style={S.addInlineInput} value={title} placeholder="やること"
        onChange={(e) => setTitle(e.target.value)}
        onKeyDown={(e) => { if (e.key === "Enter") submit(); if (e.key === "Escape") onCancel(); }} />
      <select style={S.addInlineSelect} value={pid} onChange={(e) => setPid(e.target.value)}>
        {projects.map((p) => <option key={p.id} value={p.id}>{p.company || "（無題案件）"}</option>)}
      </select>
      <div style={S.addInlineBtns}>
        <button style={S.addInlineCancel} onClick={onCancel}>キャンセル</button>

  );
}

// ==================== 返信アシストシート ====================
// 直近のメッセージ＋返信候補＋コピー。候補が無ければ開いた瞬間に強制生成。
function ReplySheet({ project, onClose, onSaveRsug, onMarkSent }) {
  const wide = useWideScreen();
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [copied, setCopied] = useState(false);
  const autoCopied = useRef(false);
  const text = project.rsug ? project.rsug.text : "";
  const genSeq = useRef(0);
  const [showChoice, setShowChoice] = useState(false);
  const [consultNote, setConsultNote] = useState("");
  const gen = async (model) => {
    if (busy) return;
    genSeq.current++;
    setBusy(true); setErr(""); setShowChoice(false);
    try {
      const draft = await forceReplyDraft(project, model);
      if (draft) { autoCopied.current = false; onSaveRsug(project.id, draft); }
      else setErr("返信案を生成できませんでした。もう一度お試しください");
    } catch (e) {
      setErr(/API 401|API 403/.test(String(e && e.message)) ? "APIキーが無効です。設定を確認してください" : "生成に失敗しました（通信を確認して再試行）");
    }
    setBusy(false);
  };
  const consult = async () => {
    const ok = await copyText(buildClaudeContext(project));
    const link = claudeProjectLinkOf(project);
    setConsultNote(ok ? (link ? "文脈をコピーしました。開いたプロジェクトの新規チャットに貼り付けてください" : "文脈をコピーしました。Claudeの新規チャットに貼り付けてください（リンク欄にプロジェクトURLを登録すると自動で開きます）") : "コピーに失敗しました");
    if (link) {
      const iu = isAndroidUA() ? claudeIntentUrl(link.url) : null;
      if (iu) window.location.href = iu; else window.open(link.url, "_blank", "noopener");
    }
  };
  // 生成が済んだら自動コピー（開いた時点で候補があればそれも自動コピー）
  const [autoNote, setAutoNote] = useState("");
  useEffect(() => {
    if (text && !busy && !autoCopied.current) {
      autoCopied.current = true;
      copyText(text).then((ok) => {
        if (ok) { setCopied(true); setTimeout(() => setCopied(false), 2000); setAutoNote("返信文をコピーしました。リンク先を開いて貼り付けてください"); }
        else setAutoNote("自動コピーできませんでした。コピーボタンを押してください");
      });
    }
  }, [text, busy]);
  const doCopy = async () => {
    if (!text) return;
    const ok = await copyText(text);
    if (ok) { setCopied(true); setTimeout(() => setCopied(false), 1600); }
  };
  // 直近表示：自分の最後の返信以降の相手メッセージを全部（＋直前の文脈少し）
  const allMsgs = project.msgs || [];
  let lastMe = -1;
  for (let i = allMsgs.length - 1; i >= 0; i--) { if (allMsgs[i].who === "me") { lastMe = i; break; } }
  const start = Math.max(0, Math.min(lastMe >= 0 ? lastMe : allMsgs.length - 4, allMsgs.length - 4));
  const recent = allMsgs.slice(start);
  const rlink = replyLinkOf(project);
  const rlinkLabel = (() => { if (!rlink) return ""; try { const li = linkInfo(rlink.url); return (li && li.label) || "リンクを開く"; } catch { return "リンクを開く"; } })();
  return (
    <>
      <div style={S.scrim} onClick={onClose} />
      <div style={wide ? S.taskDrawer : S.taskSheet}>
        <div style={S.drawerHead}>
          <span style={S.drawerGrip} />
          <span style={S.drawerTitle}>返信アシスト — {project.company || "（無題）"}</span>
          <button style={S.iconBtn} onClick={onClose}><X size={18} /></button>
        </div>
        <div style={S.rshBody}>
          <div style={S.rshLabel}>直近のメッセージ</div>
          {recent.length === 0 && <div style={S.rshEmpty}>ログがありません。やり取りを貼り付けるかChatworkリンクを登録してください</div>}
          {recent.map((m) => (
            <div key={m.id} style={{ ...S.logItem, ...(m.who === "me" ? S.logItemMe : {}) }}>
              <div style={S.logMeta}>
                <span>{m.who === "me" ? "自分" : (m.name || "相手")}</span>
                <span>{fmtLogAt(m.at)}</span>
              </div>
              <div style={S.logBody}>{m.body}</div>
            </div>
          ))}
          <div style={{ ...S.rshLabel, marginTop: 12 }}>返信候補</div>
          {busy && <div style={S.rshEmpty}>生成中…</div>}
          {!busy && err && <div style={{ ...S.rshEmpty, color: "#FF8A8A" }}>{err}</div>}
          {!busy && !err && text && !showChoice && (
            <>
              <div style={S.rshDraft}>{text}</div>
              {autoNote && <div style={S.rshNote}>{autoNote}</div>}
            </>
          )}
          {!busy && (showChoice || !text) && (() => {
            const lastM = (project.msgs || [])[(project.msgs || []).length - 1];
            if (lastM && lastM.src === "cwmail") {
              return <div style={{ ...S.rshEmpty, color: "#D9A23B" }}>本文が未取り込みです。クラウドワークスのメッセージ画面を全選択コピーして貼り付けてから、返信案を作成してください。</div>;
            }
            // 重さ判定：自分の最後の返信以降の相手メッセージをまとめて評価
            const pending = recent.filter((m) => m.who === "client").map((m) => m.body).join("\n");
            const heavy = classifyReplyWeight(pending) === "claude";
            return (
              <div style={S.rshChoice}>
                <div style={S.rshJudge}>
                  <span style={{ width: 7, height: 7, borderRadius: "50%", background: heavy ? C.accent : "#51CF66", flexShrink: 0 }} />
                  {heavy ? "重要な判断（金額・方針・構成など）を含む可能性があります" : "定型的な内容と判定しました"}
                </div>
                {heavy ? (
                  <>
                    <button style={S.rshChoiceMain} onClick={consult}>
                      <Sparkles size={14} strokeWidth={2.4} />Claudeで相談する（推奨・プラン内）
                    </button>
                    <div style={S.rshChoiceRow}>
                      <button style={S.rshChoiceSub} onClick={() => gen("claude-opus-4-8")}>Opusで作る（高精度・十数円）</button>
                      <button style={S.rshChoiceSub} onClick={() => gen("claude-sonnet-4-6")}>Sonnetで作る（約1円）</button>
                    </div>
                  </>
                ) : (
                  <>
                    <button style={S.rshChoiceMain} onClick={() => gen("claude-sonnet-4-6")}>
                      <Reply size={14} strokeWidth={2.4} />Sonnetで返信案を作る（推奨・約1円）
                    </button>
                    <div style={S.rshChoiceRow}>
                      <button style={S.rshChoiceSub} onClick={() => gen("claude-opus-4-8")}>Opusで作る</button>
                      <button style={S.rshChoiceSub} onClick={consult}>Claudeで相談</button>
                    </div>
                  </>
                )}
                {consultNote && <div style={S.rshNote}>{consultNote}</div>}
              </div>
            );
          })()}
        </div>
        <div style={S.drawerFoot}>
          <button style={S.rshRegen} onClick={() => setShowChoice(true)} disabled={busy}>
            <Repeat size={14} strokeWidth={2.4} />{busy ? "生成中…" : "作り直す"}
          </button>
          <div style={{ flex: 1 }} />
          <button style={S.rshCopyBtn} onClick={doCopy} disabled={!text || busy}>
            {copied ? <><Check size={15} strokeWidth={2.8} />コピー済</> : <><Copy size={15} strokeWidth={2.2} />コピー</>}
          </button>
          {rlink && (
            <a style={S.rshOpenBtn} href={rlink.url} target="_blank" rel="noopener noreferrer" title={rlink.url}>
              <ExternalLink size={14} strokeWidth={2.4} />{rlinkLabel}
            </a>
          )}
          <button style={S.rshSentBtn} disabled={!text || busy}
            title="この返信文を自分の発言としてログに記録し、返信アシストを消します"
            onClick={() => { if (text && onMarkSent) { onMarkSent(project.id, text); onClose(); } }}>
            <CheckCircle2 size={15} strokeWidth={2.4} />送信済みにする
          </button>
        </div>
      </div>
    </>
  );
}

// ==================== やり取りログ欄（Drawer内） ====================
function LogSection({ d, onChange }) {
  const [paste, setPaste] = useState("");
  const [msg, setMsg] = useState("");
  const [showAll, setShowAll] = useState(false);
  const [importing, setImporting] = useState(false);
  const [open, setOpen] = useState(false);        // デフォルト折りたたみ（タスク欄へのアクセスを妨げない）
  const [expandedId, setExpandedId] = useState(null); // 本文を全文表示中のログid
  const msgs = d.msgs || [];
  const doImport = () => {
    const text = paste.trim(); if (!text || importing) return;
    setImporting(true);
    try {
      const { entries, src } = parsePastedLog(text, d.company);
      const { list, added, upgraded } = mergeLogEntries(msgs, entries, src);
      onChange(list);
      setPaste("");
      const parts = [];
      if (added) {
        const latest = list.length ? list[list.length - 1] : null;
        parts.push(`${added}件を追加しました${latest && latest.at ? `（最新 ${fmtLogAt(latest.at)}）` : ""}`);
      }
      if (upgraded) parts.push(`${upgraded}件を全文に更新`);
      if (!added && !upgraded) parts.push("新しいメッセージはありませんでした（すべて登録済み）");
      if (entries.some((e) => e.partial)) parts.push("※「…」で省略された本文があります。折りたたみを開いてコピーすると全文が入ります");
      if (src === "plain") parts.push("※形式を判定できなかったため1件のメモとして保存しました");
      setMsg(parts.join("。"));
    } finally { setImporting(false); }
  };
  const consult = async () => {
    const ok = await copyText(buildClaudeContext(d));
    const link = claudeProjectLinkOf(d);
    if (link) {
      setMsg(ok ? "案件の文脈をコピーしました。開いたプロジェクトで新規チャットに貼り付けてください" : "コピーに失敗しました");
      const iu = isAndroidUA() ? claudeIntentUrl(link.url) : null;
      if (iu) window.location.href = iu; else window.open(link.url, "_blank", "noopener");
    } else {
      setMsg(ok ? "案件の文脈をコピーしました。Claudeの新規チャットに貼り付けてください（リンク欄にclaude.aiプロジェクトのURLを登録すると自動で開きます）" : "コピーに失敗しました");
    }
  };
  const shown = showAll ? msgs : msgs.slice(-4);
  const lastClient = [...msgs].reverse().find((m) => m.who === "client");
  const weight = lastClient ? classifyReplyWeight(lastClient.body) : null;
  const lastIsClient = msgs.length > 0 && msgs[msgs.length - 1].who === "client";
  return (
    <>
      <div style={{ ...S.subtaskHead, cursor: "pointer" }} onClick={() => setOpen((v) => !v)}>
        <MessageCircle size={19} color={C.ink3} strokeWidth={2} style={S.infoIcon} />
        <span style={S.subtaskHeadLabel}>やり取りログ</span>
        <span style={S.logHeadMeta}>
          {msgs.length > 0 ? `${msgs.length}件・${fmtLogAt(msgs[msgs.length - 1].at)}` : "未登録"}
        </span>
        <ChevronRight size={14} color={C.ink3} strokeWidth={2.4}
          style={{ transform: open ? "rotate(90deg)" : "none", transition: "transform 0.15s", flexShrink: 0 }} />
        <button style={S.logConsultBtn} onClick={(e) => { e.stopPropagation(); consult(); }} title="案件の文脈をコピーしてClaudeで相談">
          <Sparkles size={13} strokeWidth={2.4} />相談
        </button>
      </div>
      {open && <div style={S.logWrap}>
        {lastIsClient && weight && (
          <div style={S.logBadge}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: weight === "claude" ? C.accent : "#51CF66", flexShrink: 0 }} />
            {weight === "claude" ? "内容が重ため：Claudeでの相談がおすすめ" : "Helmの返信アシストで返せそうです"}
          </div>
        )}
        {msgs.length > 4 && !showAll && (
          <button style={S.logShowAll} onClick={() => setShowAll(true)}>すべて表示（{msgs.length}件）</button>
        )}
        {shown.map((m) => (
          <div key={m.id} style={{ ...S.logItem, ...(m.who === "me" ? S.logItemMe : {}) }}>
            <div style={S.logMeta}>
              <span>{m.who === "me" ? "自分" : (m.name || "相手")}</span>
              <span>{fmtLogAt(m.at)}</span>
              {m.partial && <span style={{ color: "#D9A23B" }}>一部省略</span>}
              <button style={S.logDel} title="このログを削除"
                onClick={() => onChange(msgs.filter((x) => x.id !== m.id))}>
                <X size={13} strokeWidth={2.2} />
              </button>
            </div>
            <div
              style={{ ...S.logBody, ...(expandedId === m.id ? {} : S.logBodyClamp), cursor: "pointer" }}
              onClick={() => setExpandedId((v) => (v === m.id ? null : m.id))}
              title={expandedId === m.id ? "タップで折りたたむ" : "タップで全文表示"}>
              {m.body}
            </div>
          </div>
        ))}
        {(() => {
          const files = extractFileMentions(msgs);
          if (!files.length) return null;
          const dl = driveFolderLinkOf(d);
          return (
            <div style={S.fileCheckWrap}>
              <div style={S.fileCheckHead}>
                <FileText size={13} strokeWidth={2.2} />
                <span>ログに出てきたファイル（Driveへの保存を確認）</span>
                {dl && (
                  <a href={dl.url} target="_blank" rel="noopener noreferrer" style={S.fileCheckDrive}>フォルダを開く</a>
                )}
              </div>
              {files.map((f, i) => (
                <div key={i} style={S.fileCheckRow}>
                  <span style={S.fileCheckName}>{f.name}</span>
                  <span style={S.fileCheckMeta}>{fmtLogAt(f.at)}{f.who === "client" ? "・相手から" : f.who === "me" ? "・自分から" : ""}</span>
                </div>
              ))}
              {!dl && <div style={S.fileCheckHint}>リンク欄にDriveの案件フォルダを登録すると、ここから開けます</div>}
            </div>
          );
        })()}
        <textarea style={S.logPaste} value={paste} placeholder="メッセージ画面を全選択コピーして貼り付け（CW／ランサーズ／Chatwork対応。重複は自動で除外）"
          onChange={(e) => setPaste(e.target.value)} />
        {paste.trim() && (
          <button style={S.logImportBtn} onClick={doImport}>取り込む</button>
        )}
        {msg && <div style={S.logMsg}>{msg}</div>}
        {msgs.length > 0 && (
          <button style={S.logExportBtn} onClick={async () => {
            const lines = [`【案件】${d.company || "（無題）"}（${d.platform || ""}）`, `ステータス：${d.status}${d.deadline ? `／納期：${d.deadline}` : ""}`, "", "--- やり取りログ（全文・時系列） ---"];
            msgs.forEach((m) => lines.push(`[${fmtLogAt(m.at)}] ${m.who === "me" ? "自分" : (m.name || "相手")}：`, m.body, ""));
            const ok = await copyText(lines.join("\n"));
            setMsg(ok ? `ログ全文（${msgs.length}件）をコピーしました。Claudeプロジェクトの知識ファイル等に貼り付けできます` : "コピーに失敗しました");
          }}>
            <Copy size={13} strokeWidth={2.2} />ログ全文をコピー（{msgs.length}件）
          </button>
        )}
      </div>}
    </>
  );
}

function Drawer({ draft, focusTaskId, onClose, onSave, onAutoSave, onDelete, confirmDel, onConfirmDelete, onCancelDelete, onOpenReply }) {
  const [d, setD] = useState(draft);
  const [generating, setGenerating] = useState(false);
  const [extracting, setExtracting] = useState(false);
  const [parsing, setParsing] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [parseMsg, setParseMsg] = useState("");
  const [pendingDiff, setPendingDiff] = useState([]); // [{field,label,current,next,display}]
  const [genError, setGenError] = useState("");
  const [extractMsg, setExtractMsg] = useState("");
  const [pendingTasks, setPendingTasks] = useState([]); // [{id,title,on}] 抽出された候補（確認待ち）
  const [pendingGroup, setPendingGroup] = useState(""); // まとめ時の共通タスク名
  const [pendingUrgent, setPendingUrgent] = useState(false); // 抽出元メッセージが急ぎか
  const [mergeMode, setMergeMode] = useState(false);    // 1つのタスクにまとめる
  const [copied, setCopied] = useState(false);
  const [autoSaved, setAutoSaved] = useState(false);
  const [hideDoneTasks, setHideDoneTasks] = useState(true);
  const isNew = !draft.company && draft.tasks.length === 0;
  const set = (k, v) => setD((p) => ({ ...p, [k]: v }));
  const focusTask = focusTaskId ? d.tasks.find((t) => t.id === focusTaskId) : null;
  const dStrLocalD = (off) => { const x = new Date(); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() + off); return `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}-${String(x.getDate()).padStart(2, "0")}`; };

  // 自動保存：編集するたびに少し待ってから保存（保存ボタン不要）
  const firstRender = useRef(true);
  useEffect(() => {
    if (firstRender.current) { firstRender.current = false; return; }
    const empty = !d.company && !d.work && !d.note && !d.summary && !d.received
      && (!d.tasks || d.tasks.length === 0) && !d.deadline && !d.start && !d.reward && !d.replyUrl && !d.replyDraft;
    if (empty) return; // 新規で実質空なら保存しない
    const t = setTimeout(() => { onAutoSave && onAutoSave(d); setAutoSaved(true); setTimeout(() => setAutoSaved(false), 1200); }, 100);
    return () => clearTimeout(t);
  }, [d]);

  // 連続入力の途中でも0.5秒ごとに強制保存（相手端末が長時間"入力途中"の状態しか見えない事故を防ぐ）
  const lastPushedRef = useRef(null);

          </div>

          {/* ===== AIタスク候補（承認制） ===== */}

            <div style={S.tsqBox}>
              <div style={S.tsqHead}>
                <ListPlus size={14} color="#D9A23B" strokeWidth={2.4} />
                依頼らしき内容を検出しました
              </div>
              <div style={S.tsqTitle}>{d.tsq.title}</div>
              {d.tsq.note && <div style={S.tsqNote}>{d.tsq.note}</div>}
              <div style={S.tsqDueTx}>
                いつやる：{d.tsq.urgent ? "今日（緊急）" : "明日"}
                {d.tsq.due ? `／期限：${d.tsq.due.slice(5).replace("-", "/")}` : ""}
              </div>
              <div style={S.tsqBtns}>
                <button style={S.tsqAdd} onClick={() => {
                  const t = task(d.tsq.title, null);
                  t.note = d.tsq.note || "";
                  t.due = d.tsq.due || "";                       // 期限：メッセージに明記があった場合のみ
                  t.start = d.tsq.urgent ? dStr(0) : dStr(1);    // いつやる：緊急=今日、通常=明日
                  setD((p) => ({ ...p, tasks: [...p.tasks, t], tsq: null }));
                }}>タスクに追加</button>
                <button style={S.tsqIgnore} onClick={() => set("tsq", null)}>無視</button>
              </div>
            </div>
          )}

          {/* ===== リンク（Claude / GitHub / 公開URL など） ===== */}
          <div style={S.linkSectionRow}>
            <Link2 size={19} color={C.ink3} strokeWidth={2} style={S.infoIcon} />
            <LinksField links={d.links} onChange={(v) => set("links", v)} />
          </div>

          {/* ===== やり取りログ ===== */}
          {!isNew && d.id !== INBOX_ID && (
            <LogSection d={d} onChange={(v) => set("msgs", v)} />
          )}

          {/* ===== 返信アシスト（返信が必要なときだけ・タップで返信シート） ===== */}
          {!isNew && replyNeeded(d) && (
            <button style={S.drawerReplyBar} onClick={() => onOpenReply && onOpenReply(d.id)}>
              <Reply size={15} strokeWidth={2.4} style={{ flexShrink: 0 }} />
              <span style={{ flex: 1, minWidth: 0, textAlign: "left" }}>返信アシスト{d.rsug ? "（候補あり）" : ""}</span>
              <ChevronRight size={15} strokeWidth={2.4} style={{ flexShrink: 0 }} />
            </button>
          )}
          {!isNew && !replyNeeded(d) && (d.msgs || []).length > 0 && (d.msgs || [])[(d.msgs || []).length - 1].who === "client" && (
            <button style={S.logShowAll} onClick={() => onOpenReply && onOpenReply(d.id)}>返信不要と判定 — それでも返信する場合はここから</button>
          )}

          {/* ===== tasks ===== */}
          <div style={S.subtaskHead}>
            <CornerDownRight size={19} color={C.ink3} strokeWidth={2} style={S.infoIcon} />
            <span style={S.subtaskHeadLabel}>タスク</span>
          </div>
          <div style={S.taskEditList}>
            {d.tasks.filter((t) => !t.done).map((t) => (
              <div key={t.id} data-tid={t.id} style={{ ...S.taskSimpleRow, touchAction: dragTaskId ? "none" : "auto", opacity: dragTaskId === t.id ? 0.5 : 1 }}>
                <button style={S.taskDragHandle} title="ドラッグで並べ替え"
                  onPointerDown={(e) => startTaskReorder(e, t.id)}>
                  <GripVertical size={16} color="#5A6472" strokeWidth={2} />
                </button>
                <button style={S.checkBtn} onClick={() => setTask(t.id, "done", !t.done)} title="タスクを完了">
                  <Circle size={18} color="#3A434F" strokeWidth={2} />
                </button>
                <AutoHeightTextarea style={{ ...S.taskInput, background: "transparent", border: "none", padding: "8px 0", fontSize: 16.5 }} value={t.title}
                  autoFocus={t.id === justAddedId}
                  onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) { e.preventDefault(); e.currentTarget.blur(); } }}
                  placeholder="やること" onChange={(e) => setTask(t.id, "title", e.target.value)} />
                {t.repeat && <Repeat size={13} color={C.accent} strokeWidth={2.6} style={{ flexShrink: 0 }} />}
                <button style={S.iconBtnSm} onClick={() => delTask(t.id)}><Trash2 size={14} color="#8B95A5" /></button>
              </div>
            ))}
            <button style={S.taskAddRow} onClick={addTask}>
              <Plus size={17} strokeWidth={2.6} />タスクを追加
            </button>
            {d.tasks.some((t) => t.done && !isArchivedTask(t)) && (
              <>
                <button style={S.doneAccordion} onClick={() => setHideDoneTasks((v) => !v)}>
                  <ChevronRight size={13} strokeWidth={2.4} style={{ transform: hideDoneTasks ? "none" : "rotate(90deg)", transition: "transform 0.15s" }} />
                  完了 ({d.tasks.filter((t) => t.done && !isArchivedTask(t)).length}件)
                </button>
                {!hideDoneTasks && d.tasks.filter((t) => t.done && !isArchivedTask(t)).map((t) => (
                  <div key={t.id} style={{ ...S.taskSimpleRow, opacity: 0.65 }}>
                    <button style={S.checkBtn} onClick={() => setTask(t.id, "done", !t.done)} title="未完了に戻す">
                      <CheckCircle2 size={18} color="#51CF66" />
                    </button>
                    <AutoHeightTextarea style={{ ...S.taskInput, ...S.trowDone, background: "transparent", border: "none", padding: "8px 0", fontSize: 16.5 }} value={t.title}
                      onKeyDown={(e) => { if (e.key === "Enter" && !e.nativeEvent.isComposing) { e.preventDefault(); e.currentTarget.blur(); } }}
                      placeholder="やること" onChange={(e) => setTask(t.id, "title", e.target.value)} />
                    <button style={S.iconBtnSm} onClick={() => delTask(t.id)}><Trash2 size={14} color="#8B95A5" /></button>
                  </div>
                ))}
              </>
            )}
          </div>
        </div>

        <div style={S.drawerFoot}>
          {!isNew && (
            confirmDel === d.id ? (() => {
              // ③ 「続いている案件」の誤削除防止：完了以外／未完了タスク／納期が今日以降 なら強い警告
              const openTasks = (d.tasks || []).filter((t) => !t.done).length;
              const warns = [];
              if (d.status !== "完了") warns.push(`ステータス「${d.status}」`);
              if (openTasks > 0) warns.push(`未完了タスク${openTasks}件`);
              if (d.deadline && d.deadline >= dStr(0)) warns.push(`納期 ${d.deadline.slice(5).replace("-", "/")}`);
              return (
              <div style={{ ...S.delConfirm, ...(warns.length ? { flexWrap: "wrap" } : {}) }}>
                {warns.length > 0 && (
                  <span style={S.delWarnText}>
                    <AlertTriangle size={13} strokeWidth={2.4} style={{ verticalAlign: "-2px", marginRight: 4 }} />
                    {warns.join("・")}
                  </span>
                )}
                <span style={S.delText}>{warns.length ? "本当に削除しますか？" : "削除しますか？"}</span>
                <button style={S.delYes} onClick={() => onConfirmDelete(d.id)}>削除</button>
                <button style={S.delNo} onClick={onCancelDelete}>戻る</button>
              </div>
              );
            })() : (
              <button style={S.delBtn} onClick={() => onDelete(d.id)}><Trash2 size={15} />削除</button>
            )
          )}
          <div style={{ flex: 1 }} />
          <button style={S.saveBtn} onClick={closeWithSave}>閉じる</button>
        </div>
      </aside>
    </>
  );
}

}

function SettingsModal({ onClose, sync, syncState, onSaveSync, onSyncPush, onSyncPull, onDiagnose }) {
  const [key, setKey] = useState("");
  const [saved, setSaved] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [diag, setDiag] = useState("");
  const [diagBusy, setDiagBusy] = useState(false);

  // 同期設定の編集用ローカルコピー（on/offのみ）
  const [sOn, setSOn] = useState(!!(sync && sync.on));
  const [syncSaved, setSyncSaved] = useState(false);

  useEffect(() => {
    (async () => {
      try { const r = await window.storage.get("cockpit:apikey"); setKey((r && r.value) || ""); } catch {}
      setLoaded(true);
    })();
  }, []);

  const save = async () => {
    try { await window.storage.set("cockpit:apikey", key.trim()); setSaved(true); setTimeout(() => setSaved(false), 1600); } catch {}
  };

  const saveSyncCfg = async () => {
    await onSaveSync({ on: sOn });
    setSyncSaved(true); setTimeout(() => setSyncSaved(false), 1600);
  };

  const syncStatusText = () => {
    if (!syncState) return "";
    if (syncState.status === "syncing") return "同期中…";
    if (syncState.status === "ok") return "同期OK" + (syncState.at ? "（" + new Date(syncState.at).toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" }) + "）" : "") + (syncState.msg ? " " + syncState.msg : "");
    if (syncState.status === "error") return "エラー: " + (syncState.msg || "");
    return "";
  };
  const syncStatusColor = syncState?.status === "error" ? "#FF6B6B" : syncState?.status === "ok" ? "#51CF66" : C.ink3;

  const [resetting, setResetting] = useState(false);
  const resetSample = async () => {
    if (!resetting) { setResetting(true); return; }
    try { await window.storage.set(STORE_KEY, JSON.stringify(normalizeProjects(makeSample()))); } catch {}
    if (typeof window !== "undefined" && window.location && window.location.reload) window.location.reload();
  };

  return (
    <>
      <div style={S.scrim} onClick={onClose} />
      <div style={S.modal}>
        <div style={S.modalHead}>
          <span style={S.drawerTitle}>設定</span>
          <button style={S.iconBtn} onClick={onClose}><X size={18} /></button>
        </div>
        <div style={S.modalBody}>
          <div style={S.settingNote}>
            返信案の生成・タスク抽出に使います。ブラウザでこのHTMLを直接開いた場合は、ご自身のAnthropic APIキーが必要です（Claudeアプリ内のプレビューでは未入力でも動作します）。
          </div>
          <Field label="Anthropic APIキー">
            <input style={S.input} type="password" value={key} placeholder="sk-ant-..."
              onChange={(e) => setKey(e.target.value)} />
          </Field>
          <div style={S.settingWarn}>キーはこのブラウザ内にのみ保存され、Anthropic API以外には送信されません。共用端末では入力しないでください。</div>
          <button style={S.saveBtn} onClick={save} disabled={!loaded}>{saved ? "保存しました" : "保存"}</button>

          <div style={S.settingDivider} />

          {/* ===== 端末間の同期（Supabase） ===== */}
          <Field label="端末間の同期（Supabase）">
            <div style={S.settingNote}>
              スマホとPCで同じデータをリアルタイム共有します。設定は不要（アプリに組込み済み）。トグルをONにするだけで、以降の変更は自動で反映されます。
            </div>
          </Field>
          <label style={S.syncToggleRow} onClick={() => setSOn((v) => !v)}>
            <span style={{ ...S.syncCheck, ...(sOn ? S.syncCheckOn : {}) }}>{sOn && <Check size={13} strokeWidth={3} color="#fff" />}</span>
            <span style={S.syncToggleLabel}>同期を有効にする</span>
          </label>
          <button style={S.saveBtn} onClick={saveSyncCfg}>{syncSaved ? "保存しました" : "同期設定を保存"}</button>
          <div style={S.syncBtnRow}>
            <button style={S.syncSubBtn} onClick={onSyncPull} disabled={!sOn}><Download size={14} strokeWidth={2.3} />クラウドから取得</button>
            <button style={S.syncSubBtn} onClick={onSyncPush} disabled={!sOn}><Upload size={14} strokeWidth={2.3} />クラウドへ保存</button>
          </div>
          <button style={{ ...S.syncSubBtn, width: "100%", justifyContent: "center", marginTop: 8 }}
            disabled={diagBusy}
            onClick={async () => { setDiagBusy(true); setDiag("診断中…"); try { const r = await onDiagnose(); setDiag(r); } catch (e) { setDiag("診断に失敗しました: " + String(e.message || e)); } finally { setDiagBusy(false); } }}>
            {diagBusy ? "診断中…" : "接続を診断"}
          </button>
          {diag && <pre style={S.diagBox}>{diag}</pre>}
          {syncState && syncState.status !== "idle" && (
            <div style={{ ...S.syncStatus, color: syncStatusColor }}>{syncStatusText()}</div>
          )}
          <div style={S.settingWarn}>複数端末で同時に編集すると、後から保存した内容で上書きされます。</div>

          <div style={S.settingDivider} />
          <div style={S.settingNote}>サンプルデータに戻します。この端末・ブラウザに保存中の案件・タスクはすべて消えます。</div>
          <button style={{ ...S.resetBtn, ...(resetting ? S.resetBtnConfirm : {}) }} onClick={resetSample}>
            {resetting ? "本当にリセットしますか？（もう一度タップ）" : "サンプルデータに戻す（リセット）"}
          </button>

          <div style={S.settingDivider} />
          <div style={S.settingNote}>
            この端末で動いているHelmの版数：<b style={{ color: C.ink }}>{BUILD_TAG}</b><br />
            PC・スマホで同じ版数か確認してください。違う場合は下のボタンで強制更新できます。
          </div>
          <button style={S.syncSubBtn} onClick={async () => {
            try { if (typeof caches !== "undefined") { const ks = await caches.keys(); await Promise.all(ks.map((k) => caches.delete(k))); } } catch {}
            try { if (navigator.serviceWorker) { const rs = await navigator.serviceWorker.getRegistrations(); await Promise.all(rs.map((r) => r.unregister())); } } catch {}
            try { window.location.reload(true); } catch { window.location.reload(); }
          }}>
            <Download size={14} strokeWidth={2.3} />強制更新（キャッシュを消して再読み込み）
          </button>
        </div>
      </div>
    </>
  );
}

/* ============================================================
   カレンダービュー（タスク期限・案件納期を月表示）
   ============================================================ */
function CalendarView({ projects, onOpen, forceNarrow }) {
  const wide = useWideScreen() && !forceNarrow;
  const now = new Date();
  const [ym, setYm] = useState({ y: now.getFullYear(), m: now.getMonth() });
  const pad = (n) => String(n).padStart(2, "0");
  const key = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
  const todayKey = key(now.getFullYear(), now.getMonth(), now.getDate());
  const [selected, setSelected] = useState(todayKey);

  const byDate = {};
  const push = (k, item) => { (byDate[k] = byDate[k] || []).push(item); };
  projects.forEach((p) => {
    (p.tasks || []).forEach((t) => {
      if (t.done) return;
      if (t.kind === "reply") { if (t.due) push(t.due, { kind: "task", label: t.title, color: C.accent, project: p }); return; }
      const dates = [...new Set([t.start, t.due].filter(Boolean))];
      dates.forEach((dk) => push(dk, { kind: "task", label: t.title, color: C.accent, project: p }));
    });
    if (p.deadline && p.id !== INBOX_ID && p.status !== "完了") push(p.deadline, { kind: "deadline", label: "納期", color: "#FF6B6B", project: p });
  });

  const startDow = new Date(ym.y, ym.m, 1).getDay();
  const daysInMonth = new Date(ym.y, ym.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let dd = 1; dd <= daysInMonth; dd++) cells.push(dd);
  while (cells.length % 7 !== 0) cells.push(null);

  const prevM = () => setYm((s) => (s.m === 0 ? { y: s.y - 1, m: 11 } : { y: s.y, m: s.m - 1 }));
  const nextM = () => setYm((s) => (s.m === 11 ? { y: s.y + 1, m: 0 } : { y: s.y, m: s.m + 1 }));
  const goToday = () => { setYm({ y: now.getFullYear(), m: now.getMonth() }); setSelected(todayKey); };

  const WD = ["日", "月", "火", "水", "木", "金", "土"];
  const selItems = byDate[selected] || [];
  const sd = selected ? new Date(selected + "T00:00:00") : null;
  const selLabel = sd ? `${sd.getMonth() + 1}月${sd.getDate()}日（${WD[sd.getDay()]}）` : "";

  // 横スワイプで月を切り替え
  const sw = useRef({ x: 0, y: 0 });
  const onCalTouchStart = (e) => { const t = e.touches[0]; sw.current = { x: t.clientX, y: t.clientY }; };
  const onCalTouchEnd = (e) => {
    const t = (e.changedTouches && e.changedTouches[0]); if (!t) return;
    const dx = t.clientX - sw.current.x, dy = t.clientY - sw.current.y;
    if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy) * 1.3) { e.stopPropagation(); dx < 0 ? nextM() : prevM(); }
  };

  // 今月を起点に前後の月ボタンを並べる（Googleカレンダー風）。押すとその月へ
  const stripRef = useRef(null);
  const monthStrip = [];
  for (let i = -3; i <= 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
    monthStrip.push({ y: d.getFullYear(), m: d.getMonth() });
  }
  useEffect(() => {
    const el = stripRef.current && stripRef.current.querySelector('[data-on="1"]');
    if (el && el.scrollIntoView) el.scrollIntoView({ inline: "center", block: "nearest" });
  }, [ym]);

  return (
    <div style={S.colWrap}>
      <div style={wide ? S.calRow : { display: "contents" }}>
      <div style={{ ...S.calBlock, ...(wide ? S.calLeft : {}) }}>
      <div style={S.calGrid} onTouchStart={onCalTouchStart} onTouchEnd={onCalTouchEnd}>
        {WD.map((w, i) => (
          <div key={w} style={{ ...S.calWd, color: i === 0 ? "#FF6B6B" : i === 6 ? C.ink3 : C.ink3 }}>{w}</div>
        ))}
        {cells.map((dd, i) => {
          if (dd === null) return <div key={i} style={S.calCellEmpty} />;
          const k = key(ym.y, ym.m, dd);
          const items = byDate[k] || [];
          const isToday = k === todayKey;
          const isSel = k === selected;
          const dow = i % 7;
          const holiday = isHoliday(k);
          const dots = [...new Set(items.map((it) => it.color))].slice(0, 4);
          return (
            <button key={i} onClick={() => setSelected(k)}
              style={{ ...S.calCell, ...(isSel ? S.calCellSel : {}) }}>
              <span style={{ ...S.calDay, color: isToday ? "#fff" : (dow === 0 || holiday) ? "#FF6B6B" : C.ink, ...(isToday ? S.calDayToday : {}) }}>{dd}</span>
              <span style={S.calDots}>
                {dots.map((c, j) => <span key={j} style={{ ...S.calDot, background: c }} />)}
              </span>
            </button>
          );
        })}
      </div>
      <div style={S.calMonthStrip} ref={stripRef}>
        {monthStrip.map((mm) => {
          const on = mm.y === ym.y && mm.m === ym.m;
          const label = mm.m === 0 ? `${mm.y}年1月` : `${mm.m + 1}月`;
          return (
            <button key={`${mm.y}-${mm.m}`} data-on={on ? "1" : "0"}
              style={{ ...S.calMonthBtn, ...(on ? S.calMonthBtnOn : {}) }}
              onClick={() => setYm({ y: mm.y, m: mm.m })}>{label}</button>
          );
        })}
      </div>
      </div>

      <div style={{ ...S.calDetail, ...(wide ? S.calRight : {}) }}>
        <div style={S.calDetailHead}>
          <CalendarDays size={15} color={C.accent} strokeWidth={2.2} />
          <span style={S.calDetailDate}>{selLabel}</span>
          <span style={S.calDetailCount}>{selItems.length}件</span>
        </div>
        {selItems.length === 0 && <div style={S.calDetailEmpty}>予定はありません。</div>}
        {selItems.map((it, j) => (
          <button key={j} style={S.calDetailItem} onClick={() => it.project.id !== INBOX_ID && onOpen(it.project)}>
            <span style={{ ...S.calDetailBar, background: it.color }} />
            <span style={S.calDetailCol}>
              <span style={S.calDetailLabel}>{it.label}</span>
              {it.project && it.project.id !== INBOX_ID && it.project.company &&
                <span style={S.calDetailProject}>{it.project.company}</span>}
            </span>
            <span style={{ ...S.calDetailKind, color: it.color }}>{it.kind === "deadline" ? "納期" : "タスク"}</span>
          </button>
        ))}
      </div>
      </div>
    </div>
  );
}

/* ============================================================
   小物コンポーネント
   ============================================================ */
function useWideScreen(bp = 820) {
  const get = () => (typeof window !== "undefined" ? window.innerWidth >= bp : false);
  const [w, setW] = useState(get);
  useEffect(() => { const on = () => setW(get()); window.addEventListener("resize", on); return () => window.removeEventListener("resize", on); }, []);
  return w;
}
function SubtaskSheet({ project, task, focus, onClose, onUpdate, onToggle, onDelete }) {
  const [confirm, setConfirm] = useState(false);

function RepeatModal({ value, onApply, onClose }) {
  const todayDow = new Date(TODAY).getDay();
  const todayD = new Date(TODAY).getDate();
  const todayM = new Date(TODAY).getMonth() + 1;
  const [r, setR] = useState(value || null);
  const stop = (e) => e.stopPropagation();
  const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, Number(v) || lo));

    if (freq === "daily") setR({ freq: "daily" });
    else if (freq === "weekly") setR({ freq: "weekly", days: (r && Array.isArray(r.days) && r.days.length) ? r.days : [todayDow] });
    else if (freq === "monthly") setR({ freq: "monthly", day: (r && r.day) || todayD });

  const FREQS = [["daily", "毎日"], ["weekly", "毎週"], ["monthly", "毎月"], ["yearly", "毎年"]];

          <div style={S.repeatDowRow}>

              const on = (r.days || []).includes(i);

function CalendarModal({ value, onChange, onClose }) {
  const now = new Date();
  const base = value ? new Date(value + "T00:00:00") : now;
  const [ym, setYm] = useState({ y: base.getFullYear(), m: base.getMonth() });
  const pad = (n) => String(n).padStart(2, "0");
  const key = (y, m, d) => `${y}-${pad(m + 1)}-${pad(d)}`;
  const todayKey = key(now.getFullYear(), now.getMonth(), now.getDate());
  const startDow = new Date(ym.y, ym.m, 1).getDay();
  const daysInMonth = new Date(ym.y, ym.m + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < startDow; i++) cells.push(null);
  for (let dd = 1; dd <= daysInMonth; dd++) cells.push(dd);
  while (cells.length % 7 !== 0) cells.push(null);
  const prevM = () => setYm((s) => (s.m === 0 ? { y: s.y - 1, m: 11 } : { y: s.y, m: s.m - 1 }));
  const nextM = () => setYm((s) => (s.m === 11 ? { y: s.y + 1, m: 0 } : { y: s.y, m: s.m + 1 }));
  const pick = (k) => { onChange(k); onClose(); };
  const stop = (e) => e.stopPropagation();
  return (
    <div style={S.calModalScrim} onPointerDown={(e) => { stop(e); onClose(); }} onClick={stop}>
      <div style={S.calModalCard} onPointerDown={stop} onClick={stop}>
        <div style={S.calModalHead}>
          <span style={S.calModalTitle}>{ym.y}年 {ym.m + 1}月</span>
          <div style={S.calModalNav}>
            <button style={S.calModalNavBtn} onClick={prevM}><ChevronLeft size={22} /></button>
            <button style={S.calModalNavBtn} onClick={nextM}><ChevronRight size={22} /></button>
          </div>
        </div>
        <div style={S.calModalGrid}>
          {WD_JP.map((w, i) => (
            <div key={w} style={{ ...S.calModalWd, color: i === 0 ? "#FF6B6B" : C.ink3 }}>{w}</div>
          ))}
          {cells.map((dd, i) => {
            if (dd === null) return <div key={i} />;
            const k = key(ym.y, ym.m, dd);
            const isToday = k === todayKey;
            const isSel = k === value;
            const dow = i % 7;
            const holiday = isHoliday(k);
            return (
              <button key={i} onClick={() => pick(k)}
                style={{ ...S.calModalCell,
                  ...(isToday && !isSel ? S.calModalCellToday : {}),
                  ...(isSel ? S.calModalCellSel : {}),
                  color: isSel ? "#fff" : (dow === 0 || holiday) ? "#FF6B6B" : C.ink }}>
                {dd}
              </button>
            );
          })}
        </div>
        <div style={S.calModalQuick}>
          <button style={S.calModalQuickBtn} onClick={() => pick(dStr(0))}>今日</button>
          <button style={S.calModalQuickBtn} onClick={() => pick(dStr(1))}>明日</button>
          <button style={S.calModalQuickBtn} onClick={() => pick(dStr(3))}>3日後</button>
        </div>
        <div style={S.calModalFoot}>
          <button style={S.calModalClear} onClick={() => { onChange(""); onClose(); }}>削除</button>
        </div>
      </div>
    </div>
  );
}
