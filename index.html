/* window.storage を localStorage で代替（ブラウザ単体で永続化） */
window.storage = {
  get: (k) => { try { const v = localStorage.getItem(k); return Promise.resolve(v != null ? { key: k, value: v, shared: false } : null); } catch(e){ return Promise.resolve(null); } },
  set: (k, v) => { try { localStorage.setItem(k, String(v)); } catch(e){} return Promise.resolve({ key: k, value: v, shared: false }); },
  delete: (k) => { try { localStorage.removeItem(k); } catch(e){} return Promise.resolve({ key: k, deleted: true, shared: false }); },
  list: (p) => { let keys = []; try { keys = Object.keys(localStorage).filter(k => !p || k.startsWith(p)); } catch(e){} return Promise.resolve({ keys, prefix: p, shared: false }); }
};

// helm_state から現在のデータを取得
async function sbFetch() {
  const { data, error } = await supabase.from("helm_state")
    .select("projects, rev").eq("id", SUPABASE_ROW_ID).single();
  if (error) throw new Error(error.message || "取得に失敗しました");
  const rev = Number(data && data.rev) || 0;
  const projects = Array.isArray(data && data.projects) ? data.projects : [];
  return { rev, data: projects };
}

// helm_state を楽観ロック付きで更新。base(=期待するrev)が現在rev と一致しなければ conflict。
async function sbSave(projects, base) {
  const nextRev = (base || 0) + 1;
  const { data, error } = await supabase.from("helm_state")
    .update({ projects, rev: nextRev, updated_at: new Date().toISOString() })
    .eq("id", SUPABASE_ROW_ID)
    .eq("rev", base || 0)
    .select("rev").maybeSingle();
  if (error) throw new Error(error.message || "保存に失敗しました");
  if (!data) {
    // 0 rows updated → 別端末が先に更新済み。最新を返して呼び出し側で adopt。
    const fresh = await sbFetch();
    return { conflict: true, rev: fresh.rev, data: fresh.data };
  }
  return { conflict: false, rev: Number(data.rev) || nextRev };
}

const dStr = (offset = 0) => {

const fmtYMD = (d) => `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
// 毎月 day 日の「from 以降で最初の」日付を返す（月末は自動調整）
const nextMonthly = (day, fromStr) => {
  const base = fromStr ? (() => { const p = String(fromStr).split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); })() : new Date(TODAY);
  base.setHours(0, 0, 0, 0);
  const mk = (y, m) => { const last = new Date(y, m + 1, 0).getDate(); return new Date(y, m, Math.min(day, last)); };
  let y = base.getFullYear(), m = base.getMonth();
  let occ = mk(y, m);
  if (occ < base) { m++; if (m > 11) { m = 0; y++; } occ = mk(y, m); }
  return fmtYMD(occ);
};
// 繰り返し設定 r から「from 以降で最初の」発生日を返す（汎用）
// r = {freq:"daily"} | {freq:"weekly",days:[dow]} | {freq:"monthly",day:N} | {freq:"yearly",month:M,day:N} | {freq:"custom",days:[dow...]}
const nextRepeat = (r, fromStr) => {
  if (!r || !r.freq) return "";
  const from = fromStr ? (() => { const p = String(fromStr).split("-").map(Number); return new Date(p[0], p[1] - 1, p[2]); })() : new Date(TODAY);
  from.setHours(0, 0, 0, 0);
  if (r.freq === "daily") return fmtYMD(from);
  if (r.freq === "weekly" || r.freq === "custom") {
    const days = (Array.isArray(r.days) && r.days.length) ? r.days : [new Date(TODAY).getDay()];
    for (let i = 0; i < 7; i++) {
      const d = new Date(from); d.setDate(d.getDate() + i);
      if (days.includes(d.getDay())) return fmtYMD(d);
    }
    return fmtYMD(from);
  }
  if (r.freq === "monthly") return nextMonthly(r.day || 1, fromStr);
  if (r.freq === "yearly") {
    const month = Math.min(12, Math.max(1, r.month || 1)), day = Math.min(31, Math.max(1, r.day || 1));
    const mk = (y) => { const last = new Date(y, month, 0).getDate(); return new Date(y, month - 1, Math.min(day, last)); };
    let occ = mk(from.getFullYear());
    if (occ < from) occ = mk(from.getFullYear() + 1);
    return fmtYMD(occ);
  }
  return "";
};

};

/* ---------- 日付ユーティリティ ---------- */
function daysUntil(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr); d.setHours(0, 0, 0, 0);
  return Math.round((d - TODAY) / 86400000);
}
function dueMeta(dateStr) {
  const n = daysUntil(dateStr);
  if (n === null) return { n, color: "#8B95A5", text: "期限なし", urgent: false };
  if (n < 0)  return { n, color: "#FF6B6B", text: `${Math.abs(n)}日超過`, urgent: true };
  if (n === 0) return { n, color: "#FF6B6B", text: "今日", urgent: true };
  if (n === 1) return { n, color: "#FF6B6B", text: "明日", urgent: true };
  if (n <= 3) return { n, color: "#FF6B6B", text: `あと${n}日`, urgent: true };
  if (n <= 7) return { n, color: "#C0C9D6", text: `あと${n}日`, urgent: false };
  return { n, color: "#C0C9D6", text: `あと${n}日`, urgent: false };
}

// 一覧用の日付ラベル：今日／N日前（期限切れ）／M月D日（曜）
const WD_JP = ["日", "月", "火", "水", "木", "金", "土"];
function dateLabelJP(dateStr) {
  const n = daysUntil(dateStr);
  if (n === null) return null;
  if (n === 0) return { text: "今日", overdue: false, today: true };
  if (n === 1) return { text: "明日", overdue: false };
  if (n < 0) return { text: `${-n}日前`, overdue: true };
  const parts = String(dateStr).split("-").map(Number);
  if (parts.length < 3 || parts.some(isNaN)) return { text: `あと${n}日`, overdue: false };
  const dt = new Date(parts[0], parts[1] - 1, parts[2]);
  return { text: `${parts[1]}月${parts[2]}日（${WD_JP[dt.getDay()]}）`, overdue: false };
}

// 保存済みやり取りログの掃除：CWのサムネイル行(Loading_40x40)を除去し、
// 同時刻・同発言者で本文が同一/包含関係の重複を1件に統合（長い方を残す）
function cleanMsgs(msgs) {
  const cleaned = msgs.map((m) => ({
    ...m,
    body: (m.body || "").split("\n").filter((l) => !/^Loading_\d+x\d+$/.test(l.trim())).join("\n").trim(),
  })).filter((m) => m.body);
  const out = [];
  const nrm = (s) => (s || "").replace(/\s+/g, " ").trim();
  for (const m of cleaned) {
    const nb = nrm(m.body);
    const i = out.findIndex((x) => x.at === m.at && x.who === m.who && (() => {
      const xb = nrm(x.body);
      if (xb === nb) return true;
      const minLen = Math.min(xb.length, nb.length);
      return minLen >= 20 && (xb.startsWith(nb) || nb.startsWith(xb)); // 短文の誤統合を防止
    })());
    if (i >= 0) { if (nb.length > nrm(out[i].body).length) out[i] = { ...out[i], body: m.body }; continue; }
    out.push(m);
  }
  return out;
}

      tasks: (p.tasks || []).map((t) => ({ ...t, lane: t.lane || laneFromDue(t.due), kind: t.kind || "task", msg: t.msg ?? "", start: t.start ?? "", note: t.note ?? "", repeat: t.repeat ?? null, doneAt: t.doneAt ?? (t.done ? Date.now() : null) })),
    };
    // ★リンク一元化：案件links＋返信先URL＋全タスクlinks を案件へ寄せ、重複URLは1本化。返信先は kind:reply。タスクからlinksは除去。
    const merged = []; const seen = new Set();
    const pushLink = (l, isReply) => {
      const url = (l && l.url ? String(l.url) : "").trim();
      const label = (l && l.label ? String(l.label) : "").trim();
      if (!url && !label) return;
      const k = url.toLowerCase();
      if (url && seen.has(k)) { if (isReply) { const ex = merged.find((m) => (m.url || "").toLowerCase() === k); if (ex) ex.kind = "reply"; } return; }
      if (url) seen.add(k);
      const o = { id: (l && l.id) || uid(), label, url };
      if (isReply || (l && l.kind === "reply")) o.kind = "reply";
      merged.push(o);
    };
    if (base.replyUrl && base.replyUrl.trim()) pushLink({ label: "返信", url: base.replyUrl }, true);
    (Array.isArray(p.links) ? p.links : []).forEach((l) => pushLink(l, l && l.kind === "reply"));
    (p.tasks || []).forEach((t) => (Array.isArray(t.links) ? t.links : []).forEach((l) => pushLink(l, false)));
    base.links = merged;
    base.tasks = base.tasks.map((t) => { const { links, ...rest } = t; return rest; });
    const rep = merged.find((m) => m.kind === "reply");
    base.replyUrl = rep ? rep.url : "";
    return base;
  });
  if (!list.some((p) => p.id === INBOX_ID)) list = [...list, makeInbox()];
  return list;
}
// 未対応の返信タスク
const replyTasksOf = (p) => (p.tasks || []).filter((t) => t.kind === "reply" && !t.done);
// タスクの判定用の日付：いつやるか（start／実施日）を優先、なければ期限（due）
const taskJudgeDate = (t) => t.start || t.due || "";
// タスクがToDoのどのレーンに入るか：タスクのkind（waiting/payment）が最優先、
// 振り分け：タスクのkind → タスク自身の日付 → 案件ステータス → 案件の「いつやる」継承 → 明後日以降
function laneOf(project, task) {
  if (!project) return "later";
  if (project.status === "完了") return null;
  // タスク単体の相手待ち/支払い待ちが最優先
  if (task.kind === "waiting") return "waiting";
  if (task.kind === "payment") return "payment";
  // タスク自身に日付（いつやる/期限）があれば、案件ステータスより日付を優先して振り分け
  const own = taskJudgeDate(task);
  if (own) {
    const n = daysUntil(own);
    if (n !== null) {
      if (n <= 0) return "today";
      if (n === 1) return "tomorrow";
      return "later";
    }
  }
  // 日付なしタスク：案件ステータスに従う
  if (project.status === "相手待ち") return "waiting";
  if (project.status === "支払い待ち") return "payment";
  // 進行中の日付なしタスク：案件の「いつやる」を引き継ぐ
  if (project.start) {
    const n = daysUntil(project.start);
    if (n !== null) {
      if (n <= 0) return "today";
      if (n === 1) return "tomorrow";
    }
  }
  return "later";
}
// 完了から30日経過したタスクはアーカイブ（一覧に出さない。データは残る）
const ARCHIVE_MS = 30 * 24 * 3600 * 1000;
const isArchivedTask = (t) => !!(t && t.done && t.doneAt && (Date.now() - t.doneAt > ARCHIVE_MS));
// 確認日到来：日付が今日以前か（待ちタスクを今日タブへ浮上させる条件）
const dueArrived = (dateStr) => { if (!dateStr) return false; const n = daysUntil(dateStr); return n !== null && n <= 0; };
// タスクが指定レーンに表示されるか。相手待ち/支払い待ちのタスクでも、日付（確認日）が到来していれば今日にも出る
function taskInLane(project, task, lane) {
  const l = laneOf(project, task);
  if (l === lane) return true;
  return lane === "today" && (l === "waiting" || l === "payment") && dueArrived(taskJudgeDate(task));
}
// 案件行（未完了タスクなし案件）が指定レーンに表示されるか。待ち案件でも「いつやる」到来で今日にも出る
function projectInLane(p, lane) {
  const l = projectFallbackLane(p);
  if (l === lane) return true;
  return lane === "today" && (l === "waiting" || l === "payment") && dueArrived(p.start || p.deadline);
}
// 未完了タスクが1つも無い案件のレーン判定。「すべて」の区分けと各タブの表示・件数を一致させるために使う
function projectFallbackLane(p) {
  if (!p || p.id === INBOX_ID || p.status === "完了") return null;
  if ((p.tasks || []).some((t) => !t.done)) return null; // 未完了タスクがあればタスク側で判定
  if (p.status === "相手待ち") return "waiting";
  if (p.status === "支払い待ち") return "payment";
  const n = daysUntil(p.start || p.deadline); // 案件startは廃止。旧データはstart優先、以後は納期で判定
  if (n !== null && n <= 0) return "today";
  if (n === 1) return "tomorrow";
  return "later";
}
// 案件の締切候補（納期＋未完了タスクの実施日/期限）を日数の配列で返す
const dueDaysList = (p) => {
  const arr = [];
  const dl = daysUntil(p.deadline); if (dl !== null) arr.push(dl);
  (p.tasks || []).forEach((t) => {
    if (!t.done && t.kind !== "reply") { const n = daysUntil(taskJudgeDate(t)); if (n !== null) arr.push(n); }
  });
  return arr;
};
// 締切候補を「名前＋日数」で返す（一覧でタスク名を出すため）
const dueItemsOf = (p) => {
  const arr = [];
  const dl = daysUntil(p.deadline); if (dl !== null) arr.push({ n: dl, label: "納期", isDeadline: true, byStart: false });
  (p.tasks || []).forEach((t) => {
    if (!t.done && t.kind !== "reply") {
      const n = daysUntil(taskJudgeDate(t));
      if (n !== null) arr.push({ n, label: t.title || "（無題のタスク）", isDeadline: false, byStart: !!t.start, tid: t.id });
    }
  });
  return arr.sort((a, b) => a.n - b.n);
};

/* Claude呼び出し。APIキーがあればブラウザ直アクセス（HTML版）、なければプロキシ（Claudeアプリ版） */
async function callClaude({ system, user, maxTokens = 1000, model = "claude-sonnet-4-6" }) {
  let apiKey = "";
  try { const r = await window.storage.get("cockpit:apikey"); apiKey = (r && r.value) || ""; } catch {}
  const headers = { "Content-Type": "application/json" };
  if (apiKey) {
    headers["x-api-key"] = apiKey;
    headers["anthropic-version"] = "2023-06-01";
    headers["anthropic-dangerous-direct-browser-access"] = "true";
  }
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers,
    body: JSON.stringify({ model, max_tokens: maxTokens, system, messages: [{ role: "user", content: user }] }),
  });
  if (!res.ok) throw new Error("API " + res.status);
  const data = await res.json();
  return (data.content || []).filter((b) => b.type === "text").map((b) => b.text).join("\n").trim();
}

              body: (mail.subject ? `【${mail.subject}】\n` : "") + (mail.body || ""), partial: false, src: "gmail" };
          }
          if (entry && entry.body) (byPid[p.id] = byPid[p.id] || []).push(entry);
        }
        if (!Object.keys(byPid).length) return;
        let changed = false;
        const next = (projectsRef.current || []).map((p) => {
          const inc = byPid[p.id];
          if (!inc) return p;
          const merged = mergeLogEntries(p.msgs || [], inc, inc[0].src);
          if (merged.added > 0 || merged.upgraded > 0) { changed = true; return { ...p, msgs: merged.list }; }
          return p;
        });
        if (changed && !stopped && !editingRef2.current) persist(next);
      } catch {}
    };
    gmailPullRef.current = pull;
    const t0 = setTimeout(pull, 7000); // フォールバック（通常は同期完了フックで先に走る）
    const iv = setInterval(pull, 10 * 60 * 1000);
    const onVis = () => { if (document.visibilityState === "visible") pull(); };
    document.addEventListener("visibilitychange", onVis);
    return () => { stopped = true; clearTimeout(t0); clearInterval(iv); document.removeEventListener("visibilitychange", onVis); };
  }, []);

  // タスク候補の自動解析：相手の最新メッセージが未解析なら1件ずつAIで判定（承認制・編集中はスキップ）
  const tsqBusy = useRef(false);
  const tsqDead = useRef(false); // APIキー未設定等の恒久エラー時は停止
  useEffect(() => {
    const run = async () => {
      if (tsqBusy.current || tsqDead.current || editingRef2.current) return;
      const ps = projectsRef.current || [];
      const target = ps.find((p) => {
        if (p.id === INBOX_ID || p.status === "完了") return false;
        const cm = [...(p.msgs || [])].reverse().find((m) => m.who === "client" && m.id);
        return cm && cm.id !== (p.tsqSeen || ""); // 未処理候補があっても新着が来たら再解析して上書き
      });
      if (!target) return;
      const cm = [...(target.msgs || [])].reverse().find((m) => m.who === "client" && m.id);
      // 締めの挨拶のみ → API不要で「返信不要」確定。本文未取り込み(CW通知プレースホルダ)は解析不能
      if (isClosingMsg(cm.body) || cm.src === "cwmail") {
        persist((projectsRef.current || []).map((p) => p.id !== target.id ? p : {
          ...p, tsqSeen: cm.id, tsq: null, rsug: null,
          rneed: { srcId: cm.id, need: cm.src === "cwmail" },
        }));
        return;
      }
      tsqBusy.current = true;
      try {
        const recentLog = (target.msgs || []).slice(-12)
          .map((m) => `[${fmtLogAt(m.at)}] ${m.who === "me" ? "自分" : (m.name || "相手")}：${(m.body || "").slice(0, 600)}`)
          .join("\n\n");
        const j = await analyzeIncomingMsg(target.company, recentLog);
        if (editingRef2.current) return; // 解析中に編集が始まったら破棄（次回やり直し）
        const t = j.task || {};
        const cur = projectsRef.current || [];
        persist(cur.map((p) => p.id !== target.id ? p : {
          ...p, tsqSeen: cm.id,
          tsq: t.has && t.title ? { srcId: cm.id, title: String(t.title).slice(0, 40), note: String(t.note || ""), due: /^\d{4}-\d{2}-\d{2}$/.test(t.due || "") ? t.due : "", urgent: !!t.urgent } : null,
          rsug: (j.reply && String(j.reply).trim() && classifyReplyWeight(cm.body || "") !== "claude") ? { srcId: cm.id, text: String(j.reply).trim() } : null,
          rneed: { srcId: cm.id, need: !!(j.reply && String(j.reply).trim()) },
        }));
      } catch (e) {
        const msg = String((e && e.message) || e);
        if (/API 401|API 403/.test(msg)) { tsqDead.current = true; return; } // キー不正は停止
        if (/bad json|JSON/.test(msg)) {
          // 解析不能：見た印だけ付けて先へ進む
          const cur = projectsRef.current || [];
          persist(cur.map((p) => p.id !== target.id ? p : { ...p, tsqSeen: cm.id }));
        }
        // ネットワーク等は何もしない（次回リトライ）
      } finally { tsqBusy.current = false; }
    };
    const t0 = setTimeout(run, 8000);
    const iv = setInterval(run, 25000);
    return () => { clearTimeout(t0); clearInterval(iv); };
  }, []);

  // PWA化：manifestリンクとService Worker（キャッシュしない＝古い版を残さない）を登録
  useEffect(() => {
    try {
      if (typeof document !== "undefined" && !document.querySelector('link[rel="manifest"]')) {
        const l = document.createElement("link"); l.rel = "manifest"; l.href = "/manifest.json"; document.head.appendChild(l);
      }
      if (typeof navigator !== "undefined" && navigator.serviceWorker) {
        navigator.serviceWorker.register("/sw.js").catch(() => {});
      }
    } catch {}
  }, []);
  // UIの「閉じる／戻る」ボタンやスクリムから呼ぶ：履歴も1つ戻して状態と同期させる
  const goBack = () => { if (trap.current > 0) { try { window.history.back(); } catch { closeOneRef.current(); } } else { closeOneRef.current(); } };

  /* ---- 同期設定・状態 ---- */
  const [sync, setSync] = useState({ on: true });
  const [syncState, setSyncState] = useState({ status: "idle", at: null, msg: "" });
  const pushTimer = useRef(null);
  const pushMaxWaitTimer = useRef(null); // 連続入力中でも定期的に push を走らせる最大待機タイマー
  const revRef = useRef(0);        // 直近にサーバと一致したリビジョン（楽観ロックの基準）
  const dirtyRef = useRef(false);  // ローカルに未送信の変更があるか
  const syncRef = useRef(sync);    // イベント内で最新の同期設定を参照
  const projectsRef = useRef(projects);
  const pullingRef = useRef(false);
  const pushingRef = useRef(false); // クラウド保存が実行中か（多重送信を防ぐ）
  const pullSuppressRef = useRef(0); // この時刻まではpullを抑制（push直後の往復取得で自分の保存を壊さない）
  const lastEditRef = useRef(0);     // 最後にローカル編集した時刻（直近の編集はローカルを正とし、pullで上書きしない）
  useEffect(() => { syncRef.current = sync; }, [sync]);
  useEffect(() => { projectsRef.current = projects; }, [projects]);

  const saveMeta = async () => { try { await window.storage.set(META_KEY, JSON.stringify({ rev: revRef.current })); } catch {} };

  // サーバのデータを正として取り込む
  const adopt = async (data, rev) => {
    const norm = normalizeProjects(data);
    setProjects(norm); projectsRef.current = norm;
    revRef.current = rev; dirtyRef.current = false;
    try { await window.storage.set(STORE_KEY, JSON.stringify(norm)); } catch {}
    saveMeta();
  };

  const lastPushedJsonRef = useRef(""); // 直近pushしたJSONの完全一致比較用（無駄通信の抑止）
  // Supabase保存。楽観ロック（rev）で他端末との整合性を担保。
  const runPush = async (cfg) => {
    const s = cfg || syncRef.current;
    if (!s.on) return;
    if (pushingRef.current) return;
    const nowJson = JSON.stringify(projectsRef.current);
    if (nowJson === lastPushedJsonRef.current) { dirtyRef.current = false; return; }
    pushingRef.current = true;
    setSyncState((v) => ({ ...v, status: "syncing" }));
    let failed = false;
    try {
      const res = await sbSave(projectsRef.current, revRef.current);
      if (res.conflict && res.data) {
        await adopt(res.data, res.rev);
        lastPushedJsonRef.current = "";
        setSyncState({ status: "ok", at: Date.now(), msg: "別の端末の変更を反映しました" });
      } else {
        revRef.current = res.rev; dirtyRef.current = false; saveMeta();
        lastPushedJsonRef.current = nowJson;

      }

      setSyncState({ status: "error", at: Date.now(), msg: String(e.message || e) });

      pushingRef.current = false;

        pushTimer.current = setTimeout(() => runPush(), failed ? 2500 : 200);

  };

  const schedulePush = (cfg) => {
    const s = cfg || syncRef.current;

    pushTimer.current = setTimeout(() => runPush(s), 100);

    }
  };

  // Supabase から現在値を取得し、サーバが新しければ取り込む（手動リトライ・フォールバック用）
  const cloudPull = async (cfg, opts) => {
    const s = cfg || syncRef.current;
    const force = opts && opts.force;
    if (!s.on) return;
    if (pullingRef.current) return;
    if (pushingRef.current) return;
    if (!force && Date.now() - lastEditRef.current < 3000) return;
    if (dirtyRef.current && !force) return;
    pullingRef.current = true;
    try {
      const remote = await sbFetch();
      if (remote && remote.data && !dirtyRef.current) {
        const remoteReal = remote.data.some((p) => p && p.id !== INBOX_ID);
        const remoteCount = remote.data.filter((p) => p && p.id !== INBOX_ID).length;
        const localCount = projectsRef.current.filter((p) => p && p.id !== INBOX_ID).length;
        const shrunk = !force && remoteCount + 1 < localCount;
        if (remote.rev > revRef.current && remoteReal && !shrunk) {
          await adopt(remote.data, remote.rev);
        } else if (remote.rev !== revRef.current && !shrunk) {
          revRef.current = remote.rev; saveMeta();
        }
      }
    } catch (e) {
      setSyncState({ status: "error", at: Date.now(), msg: String(e.message || e) });
    } finally { pullingRef.current = false; }
  };

  /* ---- ブラウザの「引っ張って更新」を抑制（下スワイプで誤更新しないように） ---- */
  useEffect(() => {
    if (typeof document === "undefined") return;
    const html = document.documentElement, body = document.body;
    const prevH = html.style.overscrollBehaviorY, prevB = body.style.overscrollBehaviorY;
    html.style.overscrollBehaviorY = "contain";
    body.style.overscrollBehaviorY = "contain";
    return () => { html.style.overscrollBehaviorY = prevH; body.style.overscrollBehaviorY = prevB; };
  }, []);

  /* ---- load ---- */
  useEffect(() => {
    (async () => {
      // 同期設定を読む（保存された on/off のみ。デフォルトは on）
      let cfg = { on: true };
      try { const sr = await window.storage.get(SYNC_KEY); if (sr && sr.value) { const j = JSON.parse(sr.value); if (typeof j.on === "boolean") cfg.on = j.on; } } catch {}
      setSync(cfg); syncRef.current = cfg;
      try { const mr = await window.storage.get(META_KEY); if (mr && mr.value) { const m = JSON.parse(mr.value); revRef.current = Number(m.rev) || 0; } } catch {}
      // 並び替えモードを復元（ローカル→あればSupabase prefsが後で上書き）
      try { const pr = await window.storage.get("cockpit:prefs:v1"); if (pr && pr.value) { const j = JSON.parse(pr.value); if (j.sortMode) { setSortModeRaw(j.sortMode); sortModeRef.current = j.sortMode; } } } catch {}
      (async () => {
        try {
          const { data } = await supabase.from("helm_state").select("prefs").eq("id", SUPABASE_ROW_ID).single();
          const m = data && data.prefs && data.prefs.sortMode;
          if (m && m !== sortModeRef.current) { setSortModeRaw(m); sortModeRef.current = m; }
        } catch {}
      })();

      // まずローカルキャッシュで即表示（待たせない）
      let data = null;
      try { const r = await window.storage.get(STORE_KEY); if (r && r.value) data = JSON.parse(r.value); } catch {}
      if (!data) {
        data = normalizeProjects(makeSample());
        try { await window.storage.set(STORE_KEY, JSON.stringify(data)); } catch {}
      }
      const localNorm = normalizeProjects(data);
      setProjects(localNorm); projectsRef.current = localNorm;
      setLoading(false);

      // Supabase と突き合わせる
      if (cfg.on) {
        setSyncState({ status: "syncing", at: null, msg: "" });
        try {
          const remote = await sbFetch();
          const remoteReal = !!(remote && remote.data && remote.data.some((p) => p && p.id !== INBOX_ID));
          if (remote && remote.data) {
            if (remote.rev > revRef.current && remoteReal) {
              await adopt(remote.data, remote.rev);
            } else if (!remoteReal) {
              schedulePush(cfg); // サーバ空→ローカルを初期データとして送る
            } else {
              revRef.current = remote.rev; saveMeta();
            }
          } else {
            schedulePush(cfg);
          }
          setSyncState({ status: "ok", at: Date.now(), msg: "" });
        } catch (e) {
          setSyncState({ status: "error", at: Date.now(), msg: String(e.message || e) });
        }
      }
      // 同期の取り込みが済んだので、Chatwork/Gmailの新着も即取得（従来は固定4〜7秒待ちだった）
      setTimeout(() => {
        try { cwPullRef.current && cwPullRef.current(); } catch {}
        try { gmailPullRef.current && gmailPullRef.current(); } catch {}
      }, 300);
    })();
  }, []);

  // Supabase realtime：他端末の更新を即座に反映（ポーリング不要）。
  // 復帰時にも念のため cloudPull を1回走らせて、購読が切れていた期間の変更を拾う。
  useEffect(() => {
    const onVis = () => { if (document.visibilityState === "visible") cloudPull(); };
    const onFocus = () => cloudPull();
    document.addEventListener("visibilitychange", onVis);
    window.addEventListener("focus", onFocus);
    const channel = supabase.channel("helm_state_realtime")
      .on("postgres_changes",
        { event: "UPDATE", schema: "public", table: "helm_state", filter: `id=eq.${SUPABASE_ROW_ID}` },
        (payload) => {
          try {
            // prefs（並び替えモード等）の同期
            const rp = payload && payload.new && payload.new.prefs;
            if (rp && rp.sortMode && rp.sortMode !== sortModeRef.current) {
              setSortModeRaw(rp.sortMode); sortModeRef.current = rp.sortMode;
              try { window.storage.set("cockpit:prefs:v1", JSON.stringify({ sortMode: rp.sortMode })); } catch {}
            }
            const remoteRev = Number(payload && payload.new && payload.new.rev) || 0;
            const remoteProjects = Array.isArray(payload && payload.new && payload.new.projects) ? payload.new.projects : null;
            if (!remoteProjects) return;
            // 自分の直近pushが往復してきた場合はスキップ
            if (JSON.stringify(remoteProjects) === lastPushedJsonRef.current) {
              revRef.current = remoteRev; saveMeta(); return;
            }
            // 直近3秒に自分が編集していれば見送り（次回pushで自分の変更が優先されるため）
            if (Date.now() - lastEditRef.current < 3000) return;
            if (dirtyRef.current) return;
            if (remoteRev > revRef.current) adopt(remoteProjects, remoteRev);
          } catch (e) {
            setSyncState({ status: "error", at: Date.now(), msg: String(e.message || e) });
          }
        })

    return () => {
      document.removeEventListener("visibilitychange", onVis);
      window.removeEventListener("focus", onFocus);
      try { supabase.removeChannel(channel); } catch {}
    };
  }, []);

  // 据え置き：変更前後でレーン/並び順位が変わった項目を「元の位置」に一時固定（ビュー切替で解除）
  const statusRankH = (p) => (p.status === "相手待ち" ? 1 : p.status === "支払い待ち" ? 2 : 0);
  const computeHeld = (prev, next) => {
    const prevById = {}; prev.forEach((p) => (prevById[p.id] = p));
    setHeld((h) => {
      let projRank = h.projRank, taskLane = h.taskLane, changed = false;
      next.forEach((np) => {
        const op = prevById[np.id]; if (!op) return;
        if (statusRankH(op) !== statusRankH(np) && projRank[np.id] === undefined) { projRank = { ...projRank, [np.id]: statusRankH(op) }; changed = true; }
        const otById = {}; (op.tasks || []).forEach((t) => (otById[t.id] = t));
        (np.tasks || []).forEach((nt) => {
          const ot = otById[nt.id]; if (!ot) return;
          const ol = laneOf(op, ot), nl = laneOf(np, nt);
          if (ol !== nl && taskLane[nt.id] === undefined) { taskLane = { ...taskLane, [nt.id]: ol }; changed = true; }
        });
      });
      return changed ? { projRank, taskLane } : h;
    });
  };
  const persist = async (next) => {
    computeHeld(projectsRef.current || [], next);
    setProjects(next); projectsRef.current = next; dirtyRef.current = true;
    try { await window.storage.set(STORE_KEY, JSON.stringify(next)); } catch {}
    schedulePush();
  };

  // ビュー／フィルタを切り替えたら据え置きを解除して正しいレーンへ整列
  useEffect(() => { setHeld({ taskLane: {}, projRank: {} }); }, [view, focusFilter]);

  // 共有ピッカーで選ばれた案件に、共有内容（リンク／本文）を反映して案件を開く
  const applyShare = (project) => {
    // 先にトーク履歴として解釈を試みる（CW/ランサーズ/Chatwork形式ならログ欄へ・重複自動除外）
    const shareText = (shareIntent && shareIntent.text) || "";
    if (shareText.length >= 40) {
      const parsed = parsePastedLog(shareText, project.company);
      if (parsed.src !== "plain" && parsed.entries.length > 0) {
        const merged = mergeLogEntries(project.msgs || [], parsed.entries, parsed.src);
        const next = projects.map((p) => (p.id === project.id ? { ...p, msgs: merged.list } : p));
        persist(next);
        setShareIntent(null);
        setFocusTaskId(null);
        setEditing(next.find((p) => p.id === project.id) || null);
        return;
      }
    }
    const cls = classifyShare(shareIntent);
    const patch = {};
    if (cls.links.length) {
      const existing = Array.isArray(project.links) ? project.links : [];
      patch.links = [...existing, ...cls.links.map((l) => ({ id: uid(), label: l.label, url: l.url }))];
    }
    if (cls.kind === "text" && cls.body) {
      const prev = (project.received || "").trim();
      patch.received = prev ? prev + "\n\n---\n" + cls.body : cls.body;
    }
    const next = projects.map((p) => (p.id === project.id ? { ...p, ...patch } : p));
    persist(next);
    setShareIntent(null);
    setFocusTaskId(null);
    setEditing(next.find((p) => p.id === project.id) || null);
  };

  // 同期設定の保存
  const saveSync = async (cfg) => {
    setSync(cfg); syncRef.current = cfg;
    try { await window.storage.set(SYNC_KEY, JSON.stringify(cfg)); } catch {}
  };
  // 手動: クラウドへ保存（競合時はサーバ版を取り込む）
  const syncPush = async () => {
    const s = syncRef.current;
    if (!s.on) return;
    setSyncState({ status: "syncing", at: null, msg: "" });
    try {
      const res = await sbSave(projectsRef.current, revRef.current);
      if (res.conflict && res.data) { await adopt(res.data, res.rev); setSyncState({ status: "ok", at: Date.now(), msg: "別の端末の変更を反映しました" }); }
      else { revRef.current = res.rev; dirtyRef.current = false; saveMeta(); setSyncState({ status: "ok", at: Date.now(), msg: "保存しました" }); }
    } catch (e) { setSyncState({ status: "error", at: Date.now(), msg: String(e.message || e) }); }
  };
  // 手動: クラウドから取得（サーバを正として取り込む）
  const syncPull = async () => {
    const s = syncRef.current;
    if (!s.on) return;
    setSyncState({ status: "syncing", at: null, msg: "" });
    try {
      const remote = await sbFetch();
      if (remote && remote.data) await adopt(remote.data, remote.rev);
      setSyncState({ status: "ok", at: Date.now(), msg: "取得しました" });
    } catch (e) { setSyncState({ status: "error", at: Date.now(), msg: String(e.message || e) }); }
  };
  // 接続診断：Supabase の疎通と件数を報告
  const syncDiagnose = async () => {
    try {
      const remote = await sbFetch();
      const serverCount = remote.data.filter((p) => p && p.id !== INBOX_ID).length;
      const localCount = projectsRef.current.filter((p) => p && p.id !== INBOX_ID).length;
      const s = syncRef.current;
      const lines = [];
      lines.push("✅ Supabaseに接続できました");
      lines.push(`この端末のHelm版数：${BUILD_TAG}（PC・スマホで同じか確認）`);
      lines.push(`サーバの案件数：${serverCount}件（サーバrev=${remote.rev}）`);
      lines.push(`この端末の案件数：${localCount}件（ローカルrev=${revRef.current}）`);
      lines.push(`同期トグル：${s.on ? "有効" : "⚠ 無効（オンにしてください）"}`);
      return lines.join("\n");
    } catch (e) {
      return "❌ 接続できません：" + String(e.message || e) + "\nネットワーク・Supabaseのステータスを確認してください。";
    }
  };

  /* ---- mutations ---- */
  const saveProject = (draft) => {
    const exists = projects.some((p) => p.id === draft.id);
    const next = exists
      ? projects.map((p) => (p.id === draft.id ? draft : p))
      : [{ ...draft, createdAt: Date.now() }, ...projects];
    persist(next); setEditing(null);
  };
  // 自動保存（ドロワーを閉じずに保存。関数型更新で連続保存の重複を防ぐ）
  const saveProjectQuiet = (draft) => {
    setProjects((prev) => {
      const exists = prev.some((p) => p.id === draft.id);
      const next = exists
        ? prev.map((p) => (p.id === draft.id ? draft : p))
        : [{ ...draft, createdAt: Date.now() }, ...prev];
      projectsRef.current = next; dirtyRef.current = true; // ★最新を即時反映してから送る
      try { window.storage.set(STORE_KEY, JSON.stringify(next)); } catch {}
      schedulePush();
      return next;
    });
  };
  const removeProject = (id) => {
    const idx = projects.findIndex((p) => p.id === id);
    const removed = idx >= 0 ? projects[idx] : null;
    persist(projects.filter((p) => p.id !== id)); setConfirmDel(null); goBack();
    if (removed && removed.id !== INBOX_ID) {
      setUndoDel({ project: removed, index: idx });
      if (undoTimer.current) clearTimeout(undoTimer.current);
      undoTimer.current = setTimeout(() => setUndoDel(null), 8000);
    }
  };
  const undoRemove = () => {
    const u = undoDel; if (!u) return;
    if (undoTimer.current) { clearTimeout(undoTimer.current); undoTimer.current = null; }
    const cur = projectsRef.current || projects;
    if (!cur.some((p) => p.id === u.project.id)) {
      const next = [...cur];
      next.splice(Math.min(u.index, next.length), 0, u.project);
      persist(next);
    }
    setUndoDel(null);
  };
  const toggleTask = (pid, tid) => {
    const next = projects.map((p) => p.id !== pid ? p : {
      ...p, tasks: p.tasks.map((t) => {
        if (t.id !== tid) return t;
        // 繰り返しタスク：完了にしたら次回の発生日へ送って未完了のまま継続表示
        if (!t.done && t.repeat && t.repeat.freq) {
          const nx = nextRepeat(t.repeat, dStr(1));
          if (nx) return { ...t, done: false, start: nx };
        }
        const nowDone = !t.done;
        return { ...t, done: nowDone, doneAt: nowDone ? Date.now() : null };
      }),
    });
    persist(next);
    // 最後の未完了タスクを消化 →「相手待ちにしますか？」の提案トースト
    if (pid !== INBOX_ID) {
      const op = projects.find((p) => p.id === pid);
      const np = next.find((p) => p.id === pid);
      if (op && np && np.status === "進行中") {
        const before = (op.tasks || []).filter((t) => !t.done).length;
        const after = (np.tasks || []).filter((t) => !t.done).length;
        if (before > 0 && after === 0) {
          setStatusPrompt({ pid, company: np.company || "（無題）" });
          if (spTimer.current) clearTimeout(spTimer.current);
          spTimer.current = setTimeout(() => setStatusPrompt(null), 10000);
        }
      }
    }
  };
  const changeKind = (pid, tid, kind) =>
    persist(projects.map((p) => p.id !== pid ? p : {
      ...p, tasks: p.tasks.map((t) => t.id !== tid ? t : { ...t, kind }),
    }));
  const toggleProjectDone = (pid) =>
    persist(projects.map((p) => p.id !== pid ? p : { ...p, status: p.status === "完了" ? "進行中" : "完了" }));
  const setProjectStatus = (pid, status) =>
    persist(projects.map((p) => p.id !== pid ? p : { ...p, status, statusAt: new Date().toISOString() }));
  // ① 案件一覧のリンク並び替え（project.linksを共有しているので詳細ドロワーも同順になる）
  const reorderLinks = (pid, links) =>
    persist(projects.map((p) => p.id !== pid ? p : { ...p, links }));
  // カードから返信案を消す／その場で生成する
  const clearRsug = (pid) =>
    persist((projectsRef.current || []).map((p) => p.id !== pid ? p : { ...p, rsug: null }));
  // サジェストの✕却下＝返信済み扱い（アイコンリアクション運用向け）。新着メッセージが来るまで再提案しない
  const ackSug = (pid) =>
    persist((projectsRef.current || []).map((p) => p.id !== pid ? p : { ...p, sugAckAt: new Date().toISOString() }));
  const markSent = (pid, text) => {
    const now = new Date();
    const at = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, "0")}-${String(now.getDate()).padStart(2, "0")} ${String(now.getHours()).padStart(2, "0")}:${String(now.getMinutes()).padStart(2, "0")}`;
    persist((projectsRef.current || []).map((p) => p.id !== pid ? p : {
      ...p,
      msgs: [...(p.msgs || []), { id: uid(), who: "me", name: "高崎", at, body: text, src: "sent", partial: false }],
      rsug: null,
    }));
  };
  const saveRsug = (pid, text) => {
    const p = (projectsRef.current || []).find((x) => x.id === pid);
    const cm = p ? [...(p.msgs || [])].reverse().find((m) => m.who === "client" && m.id) : null;
    persist((projectsRef.current || []).map((x) => x.id !== pid ? x : { ...x, rsug: { srcId: cm ? cm.id : "", text } }));
  };
  const changeLane = (pid, tid, lane) => {
    if (lane === "waiting" || lane === "payment") {
      const status = lane === "waiting" ? "相手待ち" : "支払い待ち";
      persist(projects.map((p) => p.id !== pid ? p : { ...p, status }));
      return;
    }
    const x = new Date(); x.setHours(0, 0, 0, 0); x.setDate(x.getDate() + (lane === "today" ? 0 : lane === "tomorrow" ? 1 : 2));
    const start = `${x.getFullYear()}-${String(x.getMonth() + 1).padStart(2, "0")}-${String(x.getDate()).padStart(2, "0")}`;
    persist(projects.map((p) => p.id !== pid ? p : {
      ...p, status: (p.status === "相手待ち" || p.status === "支払い待ち") ? "進行中" : p.status,
      tasks: p.tasks.map((t) => t.id === tid ? { ...t, start, lane } : t),
    }));
  };
  const changeDue = (pid, tid, due) =>
    persist(projects.map((p) => p.id !== pid ? p : {
      ...p, tasks: p.tasks.map((t) => t.id === tid ? { ...t, due } : t),
    }));
  const changeStart = (pid, tid, start) =>
    persist(projects.map((p) => p.id !== pid ? p : {
      ...p, tasks: p.tasks.map((t) => t.id === tid ? { ...t, start } : t),
    }));
  const addTaskToLane = (pid, lane, title) => {
    const start = lane === "today" ? dStr(0) : lane === "tomorrow" ? dStr(1) : "";
    const kind = lane === "waiting" ? "waiting" : lane === "payment" ? "payment" : "task";
    persist(projects.map((p) => p.id !== pid ? p : {
      ...p, tasks: [...p.tasks, { id: uid(), title, done: false, due: "", start, lane, kind, note: "", repeat: null, links: [] }],
    }));
  };
  const setDeadline = (pid, deadline) =>
    persist(projects.map((p) => p.id !== pid ? p : { ...p, deadline }));
  // ドラッグでタスクを別案件カードへ移動（末尾に追加）
  const moveTaskToProject = (tid, destPid) => {
    setProjects((prev) => {
      let moved = null, srcPid = null;
      for (const p of prev) { const f = p.tasks.find((t) => t.id === tid); if (f) { moved = f; srcPid = p.id; break; } }
      if (!moved || !destPid || srcPid === destPid) return prev;
      return prev.map((p) => {
        if (p.id === srcPid) return { ...p, tasks: p.tasks.filter((t) => t.id !== tid) };
        if (p.id === destPid) return { ...p, tasks: [...p.tasks, moved] };
        return p;
      });
    });
  };
  const updateTask = (pid, tid, patch) =>
    persist(projects.map((p) => p.id !== pid ? p : {
      ...p, tasks: p.tasks.map((t) => t.id === tid ? { ...t, ...patch } : t),
    }));
  // 並び替え：ドラッグ中は表示のみ更新（保存しない）、離した時に保存
  const reorderVisual = (dragId, overId) => {
    if (dragId === overId) return;
    setProjects((prev) => {
      const from = prev.findIndex((p) => p.id === dragId);
      const to = prev.findIndex((p) => p.id === overId);
      if (from < 0 || to < 0) return prev;
      const arr = [...prev];
      const [m] = arr.splice(from, 1);
      arr.splice(to, 0, m);
      return arr;
    });
  };
  const commitOrder = () => {
    setProjects((prev) => {
      projectsRef.current = prev; dirtyRef.current = true; // ★並び替え結果を即時反映してから送る
      try { window.storage.set(STORE_KEY, JSON.stringify(prev)); } catch {}
      schedulePush();
      return prev;
    });
  };
  // タスクの並び替え：案件内・案件またぎの両方に対応。ドラッグ中は表示のみ、離した時にcommitOrderで保存
  const reorderTaskVisual = (dragTid, overPid, overTid) => {
    if (dragTid === overTid) return;
    setProjects((prev) => {
      let srcPid = null;
      for (const p of prev) { if (p.tasks.some((t) => t.id === dragTid)) { srcPid = p.id; break; } }
      if (!srcPid) return prev;
      if (srcPid === overPid) {
        return prev.map((p) => {
          if (p.id !== srcPid) return p;
          const from = p.tasks.findIndex((t) => t.id === dragTid);
          const to = overTid === "__top__" ? 0 : p.tasks.findIndex((t) => t.id === overTid);
          if (from < 0 || to < 0) return p;
          const a = [...p.tasks]; const [m] = a.splice(from, 1); a.splice(to, 0, m);
          return { ...p, tasks: a };
        });
      }
      // 案件またぎ：移動元から取り出し、移動先の overTid の位置へ挿入
      let moved = null;
      const removed = prev.map((p) => {
        if (p.id !== srcPid) return p;
        const from = p.tasks.findIndex((t) => t.id === dragTid);
        if (from < 0) return p;
        const a = [...p.tasks]; const [m] = a.splice(from, 1); moved = m;
        return { ...p, tasks: a };
      });
      if (!moved) return prev;
      return removed.map((p) => {
        if (p.id !== overPid) return p;
        const a = [...p.tasks];
        const to = overTid === "__top__" ? 0 : a.findIndex((t) => t.id === overTid);
        a.splice(to < 0 ? a.length : to, 0, moved);
        return { ...p, tasks: a };
      });
    });
  };

  /* ---- derived ---- */
  const active = useMemo(() => projects.filter((p) => p.status !== "完了" && p.id !== INBOX_ID), [projects]);
  const kpi = useMemo(() => {
    const needReply = active.reduce((s, p) => s + replyTasksOf(p).length, 0);
    const weekDue = active.reduce((s, p) => s + dueDaysList(p).filter((n) => n >= 0 && n <= 7).length, 0);
    const overdue = active.reduce((s, p) => s + dueDaysList(p).filter((n) => n < 0).length, 0);
    const revenue = active.reduce((s, p) => s + (Number(p.reward) || 0), 0);
    return { needReply, weekDue, overdue, inProgress: active.length, revenue };
  }, [active]);

  if (loading) return (
    <div style={S.shell}>
      <Fonts />
      <div style={{ ...S.center, color: "#8B95A5", fontFamily: F.body }}>読み込み中…</div>
    </div>
  );

  return (
    <div style={S.shell}>
      <Fonts />

      {/* ===== Header ===== */}
      <header ref={headerRef} style={S.header}>
        <div style={{ ...S.brand, cursor: "pointer" }} onClick={() => { if (typeof window !== "undefined") window.location.reload(); }} title="タップで再読み込み">
          <div style={S.brandMark}>H</div>
          <div style={S.brandDate}>{(() => { const d = new Date(); return `${d.getMonth() + 1}月${d.getDate()}日（${WD_JP[d.getDay()]}）`; })()}</div>
        </div>
        {wide && (
          <div style={S.headerKpi} title="進行中の案件の見込み合計">
            <Coins size={16} color="#E8ECF2" strokeWidth={2.2} />
            <span style={S.headerKpiLabel}>進行中の見込み</span>
            <span style={S.headerKpiValue}>{kpi.revenue ? yenMan(kpi.revenue) : "—"}</span>
          </div>
        )}
        <nav style={S.tabs}>
          <button onClick={() => setShowSearch(true)} title="検索（Ctrl+K）" aria-label="検索"
            style={S.tab}>
            <Search size={22} strokeWidth={2} />
          </button>
          {!triPane && [
            ["focus", "フォーカス", LayoutDashboard],
            ["calendar", "カレンダー", CalendarDays],
          ].map(([k, label, Icon]) => (
            <button key={k} onClick={() => go(k)} title={label} aria-label={label}
              style={{ ...S.tab, ...(view === k ? S.tabOn : {}) }}>
              <Icon size={22} strokeWidth={view === k ? 2.4 : 2} />
            </button>
          ))}
        </nav>
        <button style={S.iconBtnHeader} onClick={() => setShowSettings(true)} title="設定（APIキー）" aria-label="設定">
          <Settings size={18} strokeWidth={2} />
        </button>
      </header>

      {/* ===== Body ===== */}
      <main style={{ ...S.main, ...(triPane ? S.mainTri : {}) }} onTouchStart={onMainTouchStart} onTouchEnd={onMainTouchEnd}>
        {triPane ? (
          <div style={S.triRow}>
            <div style={S.triCol}>
              <FilterChips projects={projects} filter={focusFilter} onChange={setFocusFilter} />
              {focusFilter === "registry" && <ProjectListView projects={projects} onOpen={openProject} onReorderLinks={reorderLinks} />}
              {focusFilter === "all" && <FocusView kpi={kpi} projects={active} allProjects={projects} onOpen={openProject} onSetDeadline={setDeadline} onAddTask={addTaskToLane} onUpdateTask={updateTask} onReorder={reorderVisual} onReorderCommit={commitOrder} onEditTask={(pid, tid, focus) => setEditTask({ pid, tid, focus })} onToggleTask={toggleTask} onToggleProject={toggleProjectDone} onReorderTask={reorderTaskVisual} onMoveTask={moveTaskToProject} sortMode={sortMode} setSortMode={setSortMode} onSetStatus={setProjectStatus} onOpenReply={(pid) => setReplyFor(pid)} onClearRsug={clearRsug} onAckSug={ackSug} heldRank={held.projRank} />}
              {focusFilter !== "all" && focusFilter !== "registry" && <TasksView singleLane projects={projects} onToggle={toggleTask} onOpen={openProject} onOpenTask={openProjectTask} onEditTask={(pid, tid) => setEditTask({ pid, tid, focus: "title" })} onChangeLane={changeLane} onChangeDue={changeDue} onChangeStart={changeStart} onChangeKind={changeKind} onAddTask={addTaskToLane} onReorderTask={reorderTaskVisual} onReorderProject={reorderVisual} onSortManual={() => setSortMode("manual")} onReorderCommit={commitOrder} onToggleProject={toggleProjectDone} onSetStatus={setProjectStatus} onOpenReply={(pid) => setReplyFor(pid)} onAckSug={ackSug} activeLane={focusFilter} setActiveLane={setFocusFilter} heldLane={held.taskLane} />}
            </div>
            <div style={S.triCol}>
              <TasksView forceNarrow projects={projects} onToggle={toggleTask} onOpen={openProject} onOpenTask={openProjectTask} onEditTask={(pid, tid) => setEditTask({ pid, tid, focus: "title" })} onChangeLane={changeLane} onChangeDue={changeDue} onChangeStart={changeStart} onChangeKind={changeKind} onAddTask={addTaskToLane} onReorderTask={reorderTaskVisual} onReorderProject={reorderVisual} onSortManual={() => setSortMode("manual")} onReorderCommit={commitOrder} onToggleProject={toggleProjectDone} onSetStatus={setProjectStatus} onOpenReply={(pid) => setReplyFor(pid)} onAckSug={ackSug} activeLane={paneLane} setActiveLane={setPaneLane} heldLane={held.taskLane} />
            </div>
            <div style={S.triCol}>
              <CalendarView projects={projects} onOpen={openProject} forceNarrow />
            </div>
          </div>
        ) : (
          <>
            {view === "focus" && <FilterChips projects={projects} filter={focusFilter} onChange={setFocusFilter} />}
            {view === "focus" && focusFilter === "registry" && <ProjectListView projects={projects} onOpen={openProject} onReorderLinks={reorderLinks} />}
            {view === "focus" && focusFilter === "all" && <FocusView kpi={kpi} projects={active} allProjects={projects} onOpen={openProject} onSetDeadline={setDeadline} onAddTask={addTaskToLane} onUpdateTask={updateTask} onReorder={reorderVisual} onReorderCommit={commitOrder} onEditTask={(pid, tid, focus) => setEditTask({ pid, tid, focus })} onToggleTask={toggleTask} onToggleProject={toggleProjectDone} onReorderTask={reorderTaskVisual} onMoveTask={moveTaskToProject} sortMode={sortMode} setSortMode={setSortMode} onSetStatus={setProjectStatus} onOpenReply={(pid) => setReplyFor(pid)} onClearRsug={clearRsug} onAckSug={ackSug} heldRank={held.projRank} />}
            {view === "focus" && focusFilter !== "all" && focusFilter !== "registry" && <TasksView singleLane projects={projects} onToggle={toggleTask} onOpen={openProject} onOpenTask={openProjectTask} onEditTask={(pid, tid) => setEditTask({ pid, tid, focus: "title" })} onChangeLane={changeLane} onChangeDue={changeDue} onChangeStart={changeStart} onChangeKind={changeKind} onAddTask={addTaskToLane} onReorderTask={reorderTaskVisual} onReorderProject={reorderVisual} onSortManual={() => setSortMode("manual")} onReorderCommit={commitOrder} onToggleProject={toggleProjectDone} onSetStatus={setProjectStatus} onOpenReply={(pid) => setReplyFor(pid)} onAckSug={ackSug} activeLane={focusFilter} setActiveLane={setFocusFilter} heldLane={held.taskLane} />}
            {view === "calendar" && <CalendarView projects={projects} onOpen={openProject} />}
          </>
        )}
      </main>

      {shareIntent && <SharePicker intent={shareIntent} projects={projects} onPick={applyShare} onClose={goBack} />}
      {showSearch && <SearchModal projects={projects} recentIds={recentIds}
        onPick={(p) => { setShowSearch(false); setEditing(p); pushRecent(p.id); }}
        onClose={goBack} />}
      {showSettings && <SettingsModal onClose={goBack}
        sync={sync} syncState={syncState} onSaveSync={saveSync} onSyncPush={syncPush} onSyncPull={syncPull} onDiagnose={syncDiagnose} />}

      {/* ===== Drawer ===== */}
      {editing && (
        <Drawer
          draft={editing}
          focusTaskId={focusTaskId}
          onClose={goBack}
          onSave={saveProject}
          onAutoSave={saveProjectQuiet}
          onDelete={(id) => setConfirmDel(id)}
          confirmDel={confirmDel}
          onConfirmDelete={removeProject}
          onCancelDelete={() => setConfirmDel(null)}
          onOpenReply={(pid) => setReplyFor(pid)}
        />
      )}

      {/* ===== サブタスク単体の編集シート ===== */}
      {editTask && (() => {
        const p = projects.find((x) => x.id === editTask.pid);
        const t = p && p.tasks.find((x) => x.id === editTask.tid);
        if (!p || !t) return null;
        return (
          <SubtaskSheet project={p} task={t} focus={editTask.focus}
            onClose={goBack}
            onUpdate={(patch) => updateTask(editTask.pid, editTask.tid, patch)}
            onToggle={() => toggleTask(editTask.pid, editTask.tid)}
            onDelete={() => { removeTaskFromProject(editTask.pid, editTask.tid); goBack(); }} />
        );
      })()}

      {/* ===== ③ 削除の「元に戻す」トースト ===== */}
      {undoDel && (
        <div style={S.undoToast}>
          <span style={S.undoToastText}>「{undoDel.project.company || "（無題）"}」を削除しました</span>
          <button style={S.undoToastBtn} onClick={undoRemove}>元に戻す</button>
        </div>
      )}

      {/* ===== 全タスク完了→相手待ち提案トースト ===== */}
      {statusPrompt && (
        <div style={{ ...S.undoToast, bottom: undoDel ? 86 : 24 }}>
          <span style={S.undoToastText}>「{statusPrompt.company}」のタスクが全て完了</span>
          <button style={S.undoToastBtn}
            onClick={() => { setProjectStatus(statusPrompt.pid, "相手待ち"); setStatusPrompt(null); if (spTimer.current) clearTimeout(spTimer.current); }}>
            相手待ちにする
          </button>
          <button style={S.suggestX}
            onClick={() => { setStatusPrompt(null); if (spTimer.current) clearTimeout(spTimer.current); }}>
            <X size={13} strokeWidth={2.2} />
          </button>
        </div>
      )}

      {/* ===== 返信アシストシート ===== */}
      {replyFor && (() => {
        const p = projects.find((x) => x.id === replyFor);
        if (!p) return null;
        return <ReplySheet project={p} onClose={goBack} onSaveRsug={saveRsug} onMarkSent={markSent} />;
      })()}

      {/* ===== 右下フローティング＋ボタン（Googleカレンダー方式） ===== */}
      {!editing && !showSettings && !confirmDel && !editTask && !replyFor && (
        <button style={S.fab} onClick={() => setEditing(blankDraft())} title="案件を追加" aria-label="案件を追加">
          <Plus size={26} strokeWidth={2.6} />
        </button>
      )}
    </div>
  );
}

/* ============================================================
   フォーカス（ダッシュボード）
   ============================================================ */
function FocusView({ kpi, projects, allProjects, onOpen, onSetDeadline, onAddTask, onUpdateTask, onReorder, onReorderCommit, onEditTask, onToggleTask, onToggleProject, onReorderTask, onMoveTask, sortMode, setSortMode, onSetStatus, onOpenReply, onClearRsug, onAckSug, heldRank }) {
  const [openCard, setOpenCard] = useState(null);
  const [openMsg, setOpenMsg] = useState(null);

  const [dragId, setDragId] = useState(null);
  const [dragTaskId, setDragTaskId] = useState(null);
  // タスク行の長押しドラッグ：行の上＝並べ替え／別案件カードの上＝その案件へ移動
  const startTaskDrag = (pid, tid, el, pointerId, title, sx, sy) => {
    try { el && el.setPointerCapture && pointerId != null && el.setPointerCapture(pointerId); } catch {}
    setDragTaskId(tid);
    const ghost = makeRowGhost(el, sy || 0);
    const move = (ev) => {
      if (ev.cancelable) ev.preventDefault();
      moveRowGhost(ghost, ev.clientY);
      const elAt = document.elementFromPoint(ev.clientX, ev.clientY);
      if (!elAt) return;
      const row = elAt.closest && elAt.closest("[data-tid]");
      if (row) {
        const overTid = row.getAttribute("data-tid");
        const overPid = row.getAttribute("data-pid");
        if (overTid && overTid !== tid) onReorderTask && onReorderTask(tid, overPid, overTid);
        return;
      }
      const card = elAt.closest && elAt.closest("[data-pid]");
      if (card) {
        const overPid = card.getAttribute("data-pid");
        if (overPid) onMoveTask && onMoveTask(tid, overPid);
      }
    };
    const up = () => {
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
      document.removeEventListener("pointercancel", up);
      document.removeEventListener("touchmove", blockScroll);
      removeDragGhost(ghost);
      setDragTaskId(null);
      onReorderCommit && onReorderCommit();
      const swallow = (ce) => { ce.stopPropagation(); ce.preventDefault(); document.removeEventListener("click", swallow, true); };
      document.addEventListener("click", swallow, true);
      setTimeout(() => document.removeEventListener("click", swallow, true), 450);
    };
    const blockScroll = (ev) => { if (ev.cancelable) ev.preventDefault(); };
    document.addEventListener("touchmove", blockScroll, { passive: false });
    document.addEventListener("pointermove", move, { passive: false });
    document.addEventListener("pointerup", up);
    document.addEventListener("pointercancel", up);
  };
  const wide = useWideScreen();

  // 矢印（↑↓）で案件を1つ上下へ。表示中のカードのDOM順で隣と入れ替える
  const arrowMove = (pid, dir, ev) => {
    try {
      setSortMode("manual");
      const card = ev.currentTarget.closest("[data-pid]");
      const scope = card ? card.parentElement : document;
      const els = Array.from(scope.querySelectorAll("[data-pid]"));
      const i = els.findIndex((el) => el.getAttribute("data-pid") === pid);
      const j = i + dir;
      if (i < 0 || j < 0 || j >= els.length) return;
      onReorder && onReorder(pid, els[j].getAttribute("data-pid"));
      onReorderCommit && onReorderCommit();
    } catch {}
  };

  const startDrag = (pid, el, pointerId, sx, sy) => {
    try { el && el.setPointerCapture && pointerId != null && el.setPointerCapture(pointerId); } catch {}
    setSortMode("manual"); // 並べ替えたら手動順に切替（再ソートで戻らないように）
    setDragId(pid);
    const srcP = projects.find((pp) => pp.id === pid);
    const ghost = makeRowGhost(el, sy || 0, srcP ? srcP.company : "");
    // 折りたたみでリストが縮み、指の下に別カードが来て即入れ替わるのを防ぐ：
    // 描画後、つかんだカードが指の真下に来るようスクロール補正してから並べ替えを許可する
    let ready = false;
    requestAnimationFrame(() => requestAnimationFrame(() => {
      try {
        const cardEl = document.querySelector(`[data-pid="${pid}"]`);
        if (cardEl && sy) {
          const r = cardEl.getBoundingClientRect();
          const delta = (r.top + r.height / 2) - sy;
          if (Math.abs(delta) > 4) window.scrollBy(0, delta);
          const r2 = cardEl.getBoundingClientRect();
          if (ghost) { ghost.style.height = r2.height + "px"; ghost.style.top = Math.round(sy - r2.height / 2) + "px"; }
        }
      } catch {}
      ready = true;
    }));
    const move = (ev) => {
      if (ev.cancelable) ev.preventDefault();
      moveRowGhost(ghost, ev.clientY);
      if (!ready) return;
      const x = ev.clientX, y = ev.clientY;
      const elAt = document.elementFromPoint(x, y);
      const card = elAt && elAt.closest && elAt.closest("[data-pid]");
      if (card) {
        const overId = card.getAttribute("data-pid");
        if (overId && overId !== pid) onReorder && onReorder(pid, overId);
      }
    };
    const up = () => {
      document.removeEventListener("pointermove", move);
      document.removeEventListener("pointerup", up);
      document.removeEventListener("pointercancel", up);
      document.removeEventListener("touchmove", blockScroll);
      removeDragGhost(ghost);
      setDragId(null);
      onReorderCommit && onReorderCommit();
      // ドラッグ直後の click を1回だけ無効化（詳細が開くのを防ぐ）
      const swallow = (ce) => { ce.stopPropagation(); ce.preventDefault(); document.removeEventListener("click", swallow, true); };
      document.addEventListener("click", swallow, true);
      setTimeout(() => document.removeEventListener("click", swallow, true), 450);
    };
    const blockScroll = (ev) => { if (ev.cancelable) ev.preventDefault(); };
    document.addEventListener("touchmove", blockScroll, { passive: false });
    document.addEventListener("pointermove", move, { passive: false });
    document.addEventListener("pointerup", up);
    document.addEventListener("pointercancel", up);
  };

  // 返信タスク（案件ごと複数あり得る）
  const replyEntries = projects.flatMap((p) => replyTasksOf(p).map((t) => ({ p, t })));

  // 案件一覧（進行中のみ）。並び替えモードで順序を切り替え
  const dueOf = (p) => { const n = daysUntil(p.deadline); return n === null ? Infinity : n; };
  let cardList = projects.filter((p) => p.id !== INBOX_ID && p.status !== "完了");
  const doneList = (allProjects || projects).filter((p) => p.id !== INBOX_ID && p.status === "完了");
  const [showDone, setShowDone] = useState(false);
  // ステータス順を最優先：進行中→相手待ち→支払い待ち（各グループ内は上のソート順を維持）
  const statusRank = (p) => (p.status === "相手待ち" ? 1 : p.status === "支払い待ち" ? 2 : 0);
  const heldRankOf = (p) => (heldRank && heldRank[p.id] !== undefined ? heldRank[p.id] : statusRank(p));
  cardList = [...cardList].sort((a, b) => heldRankOf(a) - heldRankOf(b));

  const minDue = (p) => { const a = dueDaysList(p); return a.length ? Math.min(...a) : Infinity; };
  const lists = {
    weekDue: projects.filter((p) => p.status !== "完了" && p.id !== INBOX_ID && dueDaysList(p).some((n) => n >= 0 && n <= 7))
      .sort((a, b) => minDue(a) - minDue(b)),
    overdue: projects.filter((p) => p.status !== "完了" && p.id !== INBOX_ID && dueDaysList(p).some((n) => n < 0))
      .sort((a, b) => minDue(a) - minDue(b)),
    progress: [...projects].sort((a, b) => (Number(b.reward) || 0) - (Number(a.reward) || 0)),
  };

  const cards = [
    { key: "progress", label: "進行中の見込み", value: kpi.revenue ? yenMan(kpi.revenue) : "—", unit: "", color: "#E8ECF2", Icon: Coins, wide: true, count: kpi.inProgress },
  ];

  const titleOf = { reply: "本日中に返信", weekDue: "7日以内が締切の案件", overdue: "期限を過ぎている案件", progress: "進行中の案件" };
  const panelColor = cards.find((c) => c.key === openCard)?.color || C.accent;
  const panelList = openCard === "reply" ? replyEntries : (openCard ? lists[openCard] : []);
  const panelCount = (openCard === "weekDue" || openCard === "overdue")
    ? panelList.reduce((s, p) => s + dueItemsOf(p).filter((it) => openCard === "overdue" ? it.n < 0 : (it.n >= 0 && it.n <= 7)).length, 0)
    : panelList.length;

  return (
    <div style={S.colWrap}>
      <div style={{ display: "contents" }}>
      {!wide && (
      <div style={S.kpiRow}>
        {cards.map((c) => {
          const opened = openCard === c.key;
          return (
            <button key={c.key} onClick={() => { if (c.noPanel) return; setOpenCard(opened ? null : c.key); }}
              style={{ ...S.kpiCard, ...S.kpiCardBtn, display: "flex", alignItems: "center", gap: 10,
                ...(c.hot && !opened ? { boxShadow: `inset 0 0 0 1.5px ${c.color}33` } : {}),
                ...(opened ? { borderColor: c.color, background: c.color + "1A", boxShadow: `0 0 0 2px ${c.color}` } : {}) }}>
              <c.Icon size={17} color={c.color} strokeWidth={2.2} />
              <span style={{ ...S.kpiLabel, ...(opened ? { color: C.ink, fontWeight: 700 } : {}) }}>{c.label}</span>
              <span style={{ flex: 1 }} />
              <span style={{ ...S.kpiValue, color: c.color, fontSize: 18, lineHeight: 1 }}>
                {c.value}<span style={S.kpiUnit}>{c.unit}</span>
              </span>
              {opened && <span style={{ ...S.kpiHint, color: c.color, fontWeight: 700, marginLeft: 6 }}>▲</span>}
            </button>
          );
        })}
      </div>
      )}

      {openCard && (
        <div style={{ ...S.replyPanel, borderColor: panelColor }}>
          <div style={S.replyPanelHead}>
            <span style={{ ...S.replyPanelDot, background: panelColor }} />
            <span style={S.replyPanelTitle}>{titleOf[openCard]}</span>
            <span style={S.replyPanelNum}>{panelCount}件</span>
            <button style={S.replyPanelClose} onClick={() => setOpenCard(null)}><X size={17} /></button>
          </div>
          {panelList.length === 0 && <div style={S.replyPanelEmpty}>該当する項目はありません。</div>}

          {openCard === "reply" && replyEntries.map(({ p, t }) => (
            <div key={t.id} style={S.replyItemWrap}>
              <div style={S.replyItem}>
                <button style={S.replyItemMain} onClick={() => onOpen(p)}>
                  <span style={S.replyItemCol}>
                    <span style={S.replyItemName}>{p.company}</span>
                    <span style={S.replyItemSub}>{t.title}</span>
                  </span>
                  <span style={{ ...S.replyItemDue, color: "#6B8AFF" }}>本日中</span>
                </button>
                {p.replyUrl && (() => { const li = linkInfo(p.replyUrl); return (
                  <a href={p.replyUrl} target="_blank" rel="noopener noreferrer"
                    style={{ ...S.replyItemLink, color: li.color, background: li.color + "22" }} title={li.label}>
                    <ExternalLink size={13} strokeWidth={2.4} />{li.short}
                  </a>
                ); })()}
              </div>
              {t.msg && (
                <button style={S.msgToggle} onClick={() => setOpenMsg(openMsg === t.id ? null : t.id)}>
                  <ChevronRight size={13} strokeWidth={2.4}
                    style={{ transform: openMsg === t.id ? "rotate(90deg)" : "none", transition: "transform 0.12s" }} />
                  {openMsg === t.id ? "元のメッセージを閉じる" : "届いたメッセージを見る"}
                </button>
              )}
              {openMsg === t.id && t.msg && (
                <div style={S.msgQuote}>
                  <span style={S.msgQuoteLabel}>{p.company} からの原文</span>
                  <div style={S.msgQuoteText}>{t.msg}</div>
                  <button style={S.msgOpenProject} onClick={() => onOpen(p)}>この案件を開いて返信する →</button>
                </div>
              )}
            </div>
          ))}

          {openCard !== "reply" && panelList.map((p) => {
            const dm = dueMeta(p.deadline);
            const _dd = dueDaysList(p);
            const nd = _dd.length ? Math.min(..._dd) : null;
            const dueItems = (openCard === "weekDue" || openCard === "overdue")
              ? dueItemsOf(p).filter((it) => openCard === "overdue" ? it.n < 0 : (it.n >= 0 && it.n <= 7))
              : [];
            const dDays = (n) => n < 0 ? `${-n}日超過` : n === 0 ? "今日" : `あと${n}日`;
            return (
              <div key={p.id} style={S.replyItem}>
                <button style={S.replyItemMain} onClick={() => onOpen(p)}>
                  {p.id !== INBOX_ID && (
                    <span onClick={(e) => { e.stopPropagation(); onToggleProject && onToggleProject(p.id); }} style={S.replyItemCheck} title="案件を完了"><Circle size={18} color={C.ink3} strokeWidth={2} /></span>
                  )}
                  <span style={S.replyItemCol}>
                    <span style={S.replyItemName}>{p.company}</span>
                    {openCard === "progress" && (
                      <span style={S.replyItemMetaRow}>
                        <span style={S.replyItemReward}>{yenMan(p.reward)}</span>
                        <span style={{ ...S.replyItemDueSub, color: dm.n < 0 ? "#FF6B6B" : "#C0C9D6" }}>{dm.text}</span>
                      </span>
                    )}
                    {dueItems.length > 0 && (
                      <span style={S.dueTaskList}>
                        {dueItems.map((it, idx) => (
                          <span key={idx} style={{ ...S.dueTaskRow, ...(it.tid ? { cursor: "pointer" } : {}) }}
                            onClick={it.tid ? (e) => { e.stopPropagation(); onEditTask && onEditTask(p.id, it.tid, "title"); } : undefined}>
                            {it.tid
                              ? <span onClick={(e) => { e.stopPropagation(); onToggleTask && onToggleTask(p.id, it.tid); }} style={S.dueTaskCheck} title="タスクを完了"><Circle size={16} color={C.ink3} strokeWidth={2} /></span>
                              : <span style={S.dueTaskCheck}>{it.isDeadline ? "📅" : ""}</span>}
                            <span style={S.dueTaskName}>{it.label}</span>
                            <span style={{ ...S.dueTaskDays, color: it.n < 0 ? "#FF6B6B" : "#C0C9D6" }}>{dDays(it.n)}</span>
                          </span>
                        ))}
                      </span>
                    )}
                  </span>
                </button>
                {p.replyUrl && (() => { const li = linkInfo(p.replyUrl); return (
                  <a href={p.replyUrl} target="_blank" rel="noopener noreferrer"
                    style={{ ...S.replyItemLink, color: li.color, background: li.color + "22" }} title={li.label}>
                    <ExternalLink size={13} strokeWidth={2.4} />{li.short}
                  </a>
                ); })()}
              </div>
            );
          })}
        </div>
      )}
      </div>

      <section>
        {cardList.length === 0 && <Empty text="進行中の案件がありません。" />}
        <div style={S.swipeArea}>
          {cardList.length > 0 && (
            <div style={S.grid}>
              {(() => {
                // PCの「すべて」は 今日/明日/明後日以降/相手待ち/支払い待ち を色バーで区切る。スマホは従来通り（相手待ち/支払い待ちのみバー）
                const openT = (p) => (p.tasks || []).filter((t) => !t.done && !isArchivedTask(t));
                const laneP = (p) => {
                  const lanes = openT(p).map((t) => (taskInLane(p, t, "today") ? "today" : laneOf(p, t)));
                  if (lanes.includes("today")) return "today";
                  if (lanes.includes("tomorrow")) return "tomorrow";
                  if (lanes.length === 0) {
                    if (projectInLane(p, "today")) return "today";
                    return projectFallbackLane(p) || "later";
                  }
                  // 自分でやるタスク（日付なし=later含む）が1つでもあれば日付区分。無ければ相手待ち＞支払い待ち
                  if (lanes.includes("later")) return "later";
                  if (lanes.includes("waiting")) return "waiting";
                  if (lanes.includes("payment")) return "payment";
                  return "later";
                };
                const groups = wide
                  ? [
                      { key: "today",    label: "今日",       color: "#6B8AFF", items: cardList.filter((p) => laneP(p) === "today"), bar: true },
                      { key: "tomorrow", label: "明日",       color: "#9AA4B2", items: cardList.filter((p) => laneP(p) === "tomorrow"), bar: true },
                      { key: "later",    label: "明後日以降", color: "#9AA4B2", items: cardList.filter((p) => laneP(p) === "later"), bar: true },
                      { key: "waiting", label: "相手待ち",   color: "#D9A23B", items: cardList.filter((p) => laneP(p) === "waiting"), bar: true },
                      { key: "payment", label: "支払い待ち", color: "#51CF66", items: cardList.filter((p) => laneP(p) === "payment"), bar: true },
                    ]
                  : [
                      { key: "進行中",     label: "進行中",     color: "#C0C9D6", items: cardList.filter((p) => { const l = laneP(p); return l !== "waiting" && l !== "payment"; }), bar: false },
                      { key: "相手待ち",   label: "相手待ち",   color: "#D9A23B", items: cardList.filter((p) => laneP(p) === "waiting"), bar: true },
                      { key: "支払い待ち", label: "支払い待ち", color: "#51CF66", items: cardList.filter((p) => laneP(p) === "payment"), bar: true },
                    ];
                return groups.map((g) => {
                  if (g.items.length === 0) return null;
                  return (
                    <div key={g.key} style={{ ...S.focusGroup, borderLeft: `3px solid ${g.color}55` }}>
                      <div style={{ ...S.focusGroupBar, background: g.color + "1A", border: `1px solid ${g.color}33`, color: g.color, marginTop: 0 }}>
                        <span>{g.label}</span>
                        <span style={{ ...S.focusGroupCount, color: g.color }}>{g.items.length}</span>
                      </div>
                      {g.items.map((p) => <ProjectCard key={p.id} p={p} onOpen={onOpen} onSetDeadline={onSetDeadline} onUpdateTask={onUpdateTask} onEditTask={onEditTask} onToggleTask={onToggleTask} onToggleProject={onToggleProject} onDragHandle={startDrag} dragging={dragId === p.id} dragActive={dragId !== null} onTaskDrag={startTaskDrag} taskDragId={dragTaskId} onSetStatus={onSetStatus} onOpenReply={onOpenReply} onClearRsug={onClearRsug} onArrow={arrowMove} onAckSug={onAckSug} />)}
                    </div>
                  );
                });
              })()}
            </div>
          )}
        </div>
        {doneList.length > 0 && (
          <div style={S.doneSection}>
            <button style={S.doneAccordion} onClick={() => setShowDone((v) => !v)}>
              <ChevronRight size={13} strokeWidth={2.4} style={{ transform: showDone ? "rotate(90deg)" : "none", transition: "transform 0.15s" }} />
              完了 ({doneList.length}件)
            </button>
            {showDone && (
              <div style={S.doneGrid}>
                {doneList.map((p) => (
                  <ProjectCard key={p.id} p={p} onOpen={onOpen} onSetDeadline={onSetDeadline} onUpdateTask={onUpdateTask} onEditTask={onEditTask} onToggleTask={onToggleTask} onToggleProject={onToggleProject} />
                ))}
              </div>
            )}
          </div>
        )}
      </section>
    </div>
  );
}

          {open > 0 && <span style={S.taskCount}><Circle size={10} strokeWidth={2.4} />{open}</span>}

}

/* ============================================================
   案件ビュー（フィルタ + カード）
   ============================================================ */
function ProjectsView({ projects, onOpen }) {
  const [fPlat, setFPlat] = useState("すべて");
  const [fStatus, setFStatus] = useState("すべて");
  const [fReply, setFReply] = useState(false);
  const [hideDone, setHideDone] = useState(true);

  const filtered = projects
    .filter((p) => p.id !== INBOX_ID)
    .filter((p) => !hideDone || p.status !== "完了")
    .filter((p) => fPlat === "すべて" || p.platform === fPlat)
    .filter((p) => fStatus === "すべて" || p.status === fStatus)
    .filter((p) => !fReply || replyTasksOf(p).length > 0)
    .sort((a, b) => {
      const an = daysUntil(a.deadline), bn = daysUntil(b.deadline);
      if (an === null && bn === null) return 0;
      if (an === null) return 1; if (bn === null) return -1;
      return an - bn;
    });

  const doneCount = projects.filter((p) => p.id !== INBOX_ID && p.status === "完了").length;

  return (
    <div style={S.colWrap}>
      <div style={S.filterBar}>
        <FilterSelect value={fPlat} onChange={setFPlat} options={["すべて", ...Object.keys(PLATFORMS)]} />
        <FilterSelect value={fStatus} onChange={setFStatus} options={["すべて", ...STATUSES]} />
        <button onClick={() => setFReply((v) => !v)}
          style={{ ...S.replyFilter, ...(fReply ? S.replyFilterOn : {}) }}>
          <Reply size={13} strokeWidth={2.4} /> 要返信のみ
        </button>
        {doneCount > 0 && (
          <button onClick={() => setHideDone((v) => !v)}
            style={{ ...S.replyFilter, ...(hideDone ? S.replyFilterOn : {}) }}>
            <CheckCircle2 size={13} strokeWidth={2.4} /> 完了を隠す
          </button>
        )}
        <span style={S.resultCount}>{filtered.length}件</span>
      </div>

      {filtered.length === 0 && <Empty text="条件に合う案件がありません。" />}
      <div style={S.grid}>
        {filtered.map((p) => <ProjectCard key={p.id} p={p} onOpen={onOpen} onSetDeadline={onSetDeadline} onUpdateTask={onUpdateTask} />)}
      </div>
    </div>
  );
}

function ProjectCard({ p, onOpen, onSetDeadline, onUpdateTask, onEditTask, onToggleTask, onToggleProject, onDragHandle, dragging, dragActive, onTaskDrag, taskDragId, onSetStatus, onOpenReply, onClearRsug, onArrow, onAckSug }) {
  // ステータスの確信度（✓一致／?不明／⚠矛盾）と提案バー
  const sug = statusSuggestion(p);
  const [sugDismiss, setSugDismiss] = useState(false);
  // カード上の返信アシスト（未返信＝最後の発言が相手のときだけ表示）
  const [rsugCopied, setRsugCopied] = useState(false);
  const pcLastIsClient = replyNeeded(p);
  // タスク行の長押し（300ms）でドラッグ開始
  const tLp = useRef(null); const tDown = useRef(null);
  const tRowDown = (e, tid) => {
    e.stopPropagation();
    if (e.target.closest && e.target.closest("button, input, a, label")) return;
    tDown.current = { el: e.currentTarget, pointerId: e.pointerId, x: e.clientX, y: e.clientY, tid };
    clearTimeout(tLp.current);
    tLp.current = setTimeout(() => {
      tLp.current = null;
      if (tDown.current && onTaskDrag) {
        const tk = (p.tasks || []).find((x) => x.id === tDown.current.tid);
        onTaskDrag(p.id, tDown.current.tid, tDown.current.el, tDown.current.pointerId, tk ? tk.title : "", tDown.current.x, tDown.current.y);
      }
    }, 180);
  };
  const tRowMove = (e) => { if (tLp.current && tDown.current && Math.hypot(e.clientX - tDown.current.x, e.clientY - tDown.current.y) > 10) { clearTimeout(tLp.current); tLp.current = null; } };
  const tRowUp = () => { if (tLp.current) { clearTimeout(tLp.current); tLp.current = null; } };
  const replyN = replyTasksOf(p).length;
  const dl = p.deadline ? dateLabelJP(p.deadline) : null;
  const st = null; // 案件の「いつやる」は廃止（納期のみ表示）
  // ステータス別のカード色（相手待ち＝琥珀／支払い待ち＝緑）
  const statusTint = null; // カンバンの列でステータスが明示されているため、背景色分けは無効化
  const lpTimer = useRef(null);
  const downInfo = useRef(null);
  const openTasks = p.tasks.filter((t) => !t.done && t.kind !== "reply");
  const showTasks = openTasks;
  const moreTasks = 0;
  const stop = (e) => e.stopPropagation();
  const openPicker = (e) => { e.stopPropagation(); const inp = e.currentTarget.querySelector("input"); try { inp && inp.showPicker && inp.showPicker(); } catch {} };
  const draggable = !!onDragHandle;
  // カード本体をどこでも長押し→ドラッグ開始（タスク行・ボタン等はそれぞれ pointerdown を止めるので対象外）
  const cardDown = (e) => {
    if (!draggable) return;
    downInfo.current = { x: e.clientX, y: e.clientY, pointerId: e.pointerId, el: e.currentTarget };
    clearTimeout(lpTimer.current);
    lpTimer.current = setTimeout(() => {
      lpTimer.current = null;
      if (downInfo.current) onDragHandle(p.id, downInfo.current.el, downInfo.current.pointerId, downInfo.current.x, downInfo.current.y);
    }, 220);
  };
  const cardMove = (e) => {
    if (lpTimer.current && downInfo.current) {
      if (Math.abs(e.clientX - downInfo.current.x) > 10 || Math.abs(e.clientY - downInfo.current.y) > 10) {
        clearTimeout(lpTimer.current); lpTimer.current = null;
      }
    }
  };
  const cardUp = () => { if (lpTimer.current) { clearTimeout(lpTimer.current); lpTimer.current = null; } };
  return (
    <div data-pid={p.id}
      onContextMenu={(e) => e.preventDefault()}
      style={{ ...S.card, ...(statusTint ? { background: statusTint.bg, borderColor: statusTint.border } : {}), ...(dragging ? S.cardDragging : {}), ...(dragActive && !dragging ? S.cardDragOther : {}), touchAction: dragActive ? "none" : "pan-y" }}
      role="button" tabIndex={0}
      onPointerDown={cardDown} onPointerMove={cardMove} onPointerUp={cardUp} onPointerCancel={cardUp}
      onClick={() => onOpen(p)}>
